name: Sand Game Pro - Build & Deploy

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [main, master]
  release:
    types: [published]

# Erlaubt nur einen gleichzeitigen Deploy-Lauf pro Ref.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

env:
  GAME_VERSION: '2.1'

jobs:
  validate:
    name: Lint & JS-Syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install HTMLHint
        run: npm install -g htmlhint

      - name: Run HTMLHint
        run: htmlhint --format compact sand_game.html || true

      # Schneidet das <script>-Block aus der Single-File-App heraus und prüft die
      # JavaScript-Syntax mit `node --check`. Schlägt der Check fehl, bricht der
      # Build ab (kein kaputtes Spiel wird deployt).
      - name: Validate embedded JavaScript
        run: |
          node -e "
            const fs = require('fs');
            const html = fs.readFileSync('sand_game.html', 'utf8');
            const lines = html.split('\n');
            const start = lines.findIndex(l => l.includes('<script>'));
            let end = -1;
            for (let i = lines.length - 1; i >= 0; i--) { if (lines[i].includes('</script>')) { end = i; break; } }
            if (start < 0 || end < 0 || end <= start) { console.error('Kein <script>-Block gefunden'); process.exit(1); }
            fs.writeFileSync('extracted.js', lines.slice(start + 1, end).join('\n'));
          "
          node --check extracted.js
          echo "JavaScript-Syntax OK"

  build:
    name: Build & Package
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create build artifact
        run: |
          mkdir -p build
          cp sand_game.html build/index.html
          {
            echo "Build completed at $(date -u)"
            echo "Commit: ${{ github.sha }}"
            echo "Branch: ${{ github.ref_name }}"
            echo "Version: ${{ env.GAME_VERSION }}"
          } > build/BUILD_INFO.txt

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sand-game-pro
          path: build/
          retention-days: 30
          if-no-files-found: error

  release:
    name: Attach Release Asset
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: sand-game-pro
          path: release-artifacts/

      - name: Create release archive
        run: |
          cd release-artifacts
          zip -r ../sand-game-pro-${{ github.event.release.tag_name }}.zip .

      # Ersetzt das archivierte actions/upload-release-asset@v1 durch die
      # offizielle GitHub-CLI, die den Asset zuverlässig an das Release hängt.
      - name: Upload release asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "sand-game-pro-${{ github.event.release.tag_name }}.zip" \
            --repo "${{ github.repository }}" --clobber

  pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: sand-game-pro
          path: public/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        