<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sand Game Pro · Advanced Simulation v2.0</title>
  <style>
    :root {
          --bg: #0a0a0c;
          --panel: rgba(20, 20, 25, 0.85);
          --accent: #4cc9f0;
          --accent-hover: #3ab0d6;
          --text: #e0e0e0;
          --border: rgba(255, 255, 255, 0.1);
          --sun: #ffd700;
          --moon: #a8c7ff;
        }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      user-select: none;
    }
    canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      background: #000;
      image-rendering: pixelated;
      cursor: crosshair;
      touch-action: none;
      z-index: 1;
    }
    .ui {
      position: fixed;
      left: 20px;
      top: 20px;
      z-index: 10;
      width: 340px;
      max-height: calc(100vh - 40px);
      background: var(--panel);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      overflow-y: auto;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }
    .ui.hidden {
      transform: translateX(-380px);
      opacity: 0;
      pointer-events: none;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .title h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
    .title p { font-size: 11px; color: #888; }
    
    .section-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #666;
      margin: 10px 0 6px 0;
      border-bottom: 1px solid var(--border);
      padding-bottom: 4px;
    }

    .grid-mats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
    }
    button {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 5px 3px;
      border-radius: 6px;
      font-size: 10px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    button:hover { background: rgba(255,255,255,0.1); }
    button.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
      font-weight: 600;
    }

    .control-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 12px;
    }
    input[type="range"] {
      flex: 1;
      margin-left: 10px;
      accent-color: var(--accent);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-top: 10px;
    }
    .actions button { padding: 7px; font-size: 11px; }

    .stats {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 10;
      background: var(--panel);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 11px;
      color: #888;
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
    }

    .kbd-hint {
      margin-top: 12px;
      font-size: 10px;
      color: #555;
      line-height: 1.4;
    }
    .kbd {
      background: #222;
      padding: 1px 4px;
      border-radius: 3px;
      color: #aaa;
    }

    .sun-cycle-indicator {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10;
      background: var(--panel);
      padding: 8px 14px;
      border-radius: 12px;
      font-size: 11px;
      color: #aaa;
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sun-cycle-indicator.day { border-color: var(--sun); }
    .sun-cycle-indicator.night { border-color: var(--moon); }
    .sun-icon { font-size: 16px; }

    .info-panel {
      position: fixed;
      bottom: 20px;
      left: 20px;
      z-index: 10;
      background: var(--panel);
      padding: 8px 14px;
      border-radius: 12px;
      font-size: 11px;
      color: #aaa;
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      max-width: 300px;
      display: none;
    }
    .info-panel.visible { display: block; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<canvas id="c"></canvas>

<div class="ui" id="ui">
  <div class="header">
    <div class="title">
      <h1>Sand Pro v2.0</h1>
      <p>Physik & Chemie Simulation</p>
    </div>
    <button id="toggleUI">Ausblenden</button>
  </div>

  <div class="section-title">Pulver</div>
  <div class="grid-mats" id="matGridPowder"></div>
  <div class="section-title">Flüssigkeiten</div>
  <div class="grid-mats" id="matGridLiquid"></div>
  <div class="section-title">Gase</div>
  <div class="grid-mats" id="matGridGas"></div>
  <div class="section-title">Feststoffe</div>
  <div class="grid-mats" id="matGridSolid"></div>
  <div class="section-title">Spezial</div>
  <div class="grid-mats" id="matGridSpecial"></div>

  <div class="section-title">Einstellungen</div>
  <div class="control-row">
    <label>Grid-Auflösung (Zellen/Breite)</label>
    <input type="range" id="gridR" min="50" max="500" value="200">
  </div>
  <div class="control-row">
    <label>Pinselgröße</label>
    <input type="range" id="brushR" min="1" max="40" value="5">
  </div>
  <div class="control-row">
    <label>Simulations-Ticks/Frames</label>
    <input type="range" id="speedR" min="1" max="15" value="5">
  </div>
  <div class="control-row">
    <label>Photosynthese-Aktivität</label>
    <input type="range" id="photoR" min="0" max="100" value="70">
  </div>
  <div class="control-row">
    <label>Sonnenzyklus</label>
    <button id="sunCycleBtn" style="padding: 4px 8px;">❌ Deaktiviert</button>
  </div>
  <div class="control-row">
    <label>Zyklus-Geschwindigkeit</label>
    <input type="range" id="sunSpeedR" min="1" max="100" value="30">
  </div>

  <div class="section-title">Aktionen</div>
  <div class="actions">
    <button id="pauseBtn">Pause</button>
    <button id="clearBtn">Leeren</button>
    <button id="rainBtn">Regen</button>
    <button id="fireBtn">Feuerregen</button>
    <button id="windBtn">Wind</button>
    <button id="seedBtn">Ökosystem</button>
  </div>

  <div class="kbd-hint">
    <span class="kbd">1-9</span> Material | <span class="kbd">Space</span> Pause | <span class="kbd">C</span> Leeren | <span class="kbd">H</span> UI | <span class="kbd">Rechtsklick</span> Radierer
  </div>
</div>

<div class="stats" id="st">0 FPS | 0 Partikel</div>
<div class="info-panel" id="info"></div>
<div class="sun-cycle-indicator" id="sunCycleIndicator" style="display:none;">
  <span class="sun-icon">☀️</span>
  <span id="sunCycleText">Tag</span>
  <span id="sunCycleProgress">(0%)</span>
</div>

// pH color interpolation helper
function phColor(ph, baseColor) {
  let [r, g, b] = baseColor;
  if (ph < 3) {
    r = Math.min(255, r + (3 - ph) * 30);
    g = Math.max(0, g - (3 - ph) * 40);
  } else if (ph > 11) {
    r = Math.max(0, r - (ph - 11) * 20);
    g = Math.min(255, g + (ph - 11) * 20);
    b = Math.min(255, b + (ph - 11) * 30);
  }
  return [r, g, b];
}

/**
 * ENGINE STATE
 */
let W, H, N;
let grid, tempGrid, ageGrid, colorSeedGrid;
let phGrid, soluteGrid, electricalGrid, radiationGrid;
let canvas, ctx, img, pix;
let curMat = SAND, bsz = 5, spd = 5, paused = false;
let targetGridWidth = 500; // Maximaler Startwert für Grid-Größe
let rainActive = false, fireActive = false, windActive = false, windDir = 1;
let myceliumGrid = null; // Für Myzel-Netzwerk-Tracking
