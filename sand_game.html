      b = 46 - ageDark * 0.4 + ringMod * 0.4 + baseNoise * 0.5;
      // Herbst/Stress leicht rötlicher
      const autumn = getAutumnColorFactor();
      if (autumn > 0.3) { r += autumn * 20; }
    }

    if (matId === CLOUD) {
      // weiche, leicht graue Wolke; Ränder (junge Zellen) heller
      const fade = Math.min(1, ageGrid[i] / 1200);
      r = 228 - fade * 30 + baseNoise * 0.4;
      g = 232 - fade * 28 + baseNoise * 0.4;
      b = 240 - fade * 20 + baseNoise * 0.4;
      // bei Nacht dunkler
      if (sunCycleEnabled) { const dim = 1 - getSunlightIntensity() * 0.5; r *= (1 - 0.25 * (1 - getSunlightIntensity())); g *= (1 - 0.25 * (1 - getSunlightIntensity())); b *= (1 - 0.2 * (1 - getSunlightIntensity())); }
    }

    if (matId === SEAWEED) {
      const health = (plantHealthGrid[i] || 60) / 100;
      const sway = Math.sin(tick * 0.06 + (colorSeedGrid[i] % 100) * 0.1) * 12;
      r = 30 + sway * 0.3 + baseNoise * 0.5;
      g = 120 * health + 40 + sway + baseNoise * 0.5;
      b = 70 + sway * 0.4 + baseNoise * 0.5;
    }

    if (matId === FLOWER_TULIP) {
      // sattes Rot mit dunklerem Kern (Pixel-Art-Look)
      r = 225 + baseNoise; g = 40 + baseNoise; b = 60 + baseNoise * 0.5;
    }
    if (matId === FLOWER_POPPY) {
      r = 235 + baseNoise; g = 70 + baseNoise; b = 30 + baseNoise * 0.5;
    }

    if (matId === PLANT_FLOWER) {
      const sat = 0.8;
      const val = 0.9;
      // Simple HSV to RGB
      const c = val * sat;
      const x = c * (1 - Math.abs((hue / 60) % 2 - 1));
      const m = val - c;
      let fr, fg, fb;
      if (hue < 60) { fr = c; fg = x; fb = 0; }
      else if (hue < 120) { fr = x; fg = c; fb = 0; }
      else if (hue < 180) { fr = 0; fg = c; fb = x; }
      else if (hue < 240) { fr = 0; fg = x; fb = c; }
      else if (hue < 300) { fr = x; fg = 0; fb = c; }
      else { fr = c; fg = 0; fb = x; }
      r = fr * 255 + m * 255;
      g = fg * 255 + m * 255;
      b = fb * 255 + m * 255;
    }
    
    if (matId === STEAM) {
      const alpha = Math.max(0.3, 1 - ageGrid[i] / 100);
      r = 200 + (1 - alpha) * 55;
      g = 210 + (1 - alpha) * 45;
      b = 225 + (1 - alpha) * 30;
    }
    
    if (matId === SMOKE) {
      const alpha = Math.max(0.2, 1 - ageGrid[i] / 120);
      const v = 70 + (1 - alpha) * 40;
      r = v; g = v; b = v;
    }
    
    if (matId === URANIUM) {
      const pulse = Math.sin(tick * 0.05 + seed) * 30;
      g = 180 + pulse;
    }
    
    if (matId === CLONE) {
      const pulse = Math.sin(tick * 0.08) * 40;
      r = 255; g = pulse; b = 255;
    }
    
    if (matId === BACTERIA) {
      const pulse = Math.sin(tick * 0.1 + seed * 0.5) * 20;
      g = 255;
      r = 80 + pulse;
    }
    
    // Apply night dimming
    if (nightFactor > 0) {
      r = Math.max(0, r - nightFactor * 60);
      g = Math.max(0, g - nightFactor * 60);
      b = Math.max(0, b - nightFactor * 40);
    }

    pix[ci]   = Math.max(0, Math.min(255, r));
    pix[ci+1] = Math.max(0, Math.min(255, g));
    pix[ci+2] = Math.max(0, Math.min(255, b));
    pix[ci+3] = 255;
  }
  
  ctx.putImageData(img, 0, 0);
}

/**
 * INITIALIZATION
 */
function resize() {
  // Use user-settable grid width, calculate height based on aspect ratio
  // Maximales Spielfeld: 1080x720 (777.600 Zellen)
  const newW = Math.max(50, Math.min(1080, targetGridWidth));
  const aspectRatio = window.innerHeight / window.innerWidth;
  const newH = Math.max(50, Math.min(720, Math.floor(newW * aspectRatio)));
  
  // Nur resize wenn sich die Größe tatsächlich geändert hat
  if (newW === W && newH === H) return;
  
  // Preserve existing data if resizing
  const oldGrid = grid, oldTemp = tempGrid, oldAge = ageGrid;
  const oldPh = phGrid, oldRad = radiationGrid;
  const oldPlantType = plantTypeGrid, oldPlantStage = plantStageGrid;
  const oldPlantHealth = plantHealthGrid, oldPlantSap = plantSapGrid;
  const oldSoilNutrient = soilNutrientGrid, oldPlantWater = plantWaterGrid;
  const oldPlantId = plantIdGrid, oldVelX = velXGrid, oldVelY = velYGrid;
  const oldElectrical = electricalGrid, oldNitrogen = nitrogenGrid;
  const oldPhosphorus = phosphorusGrid, oldPotassium = potassiumGrid;
  const oldMycelium = myceliumGrid;
  const oldColorSeed = colorSeedGrid;
  const oldW = W, oldH = H;
  
  W = newW;
  H = newH;
  N = W * H;
  canvas.width = W;
  canvas.height = H;
  
  grid = new Uint8Array(N);
  tempGrid = new Float32Array(N).fill(20);
  ageGrid = new Uint16Array(N);
  colorSeedGrid = new Uint16Array(N);
  phGrid = new Float32Array(N).fill(7.0);
  radiationGrid = new Float32Array(N);
  
  // === Biologie-Erweiterung: Neue Grid-Systeme ===
  plantTypeGrid = new Uint8Array(N);
  plantStageGrid = new Uint8Array(N);
  plantHealthGrid = new Uint8Array(N);
  plantSapGrid = new Uint8Array(N);
  soilNutrientGrid = new Float32Array(N);
  plantWaterGrid = new Uint8Array(N);
  plantIdGrid = new Uint32Array(N);
  
  // === IMPULS-FELDER Phase 3.3 ===
  velXGrid = new Float32Array(N);
  velYGrid = new Float32Array(N);
  
  // === ELEKTROLYSE-GRID Phase 4.2 ===
  electricalGrid = new Float32Array(N);
  
  // === N-P-K NÄHRSTOFFSYSTEM Phase 5.1 ===
  nitrogenGrid = new Uint8Array(N);
  phosphorusGrid = new Uint8Array(N);
  potassiumGrid = new Uint8Array(N);
  
  // === MYKORRIZA-GRID Phase 5.3 ===
  myceliumGrid = new Uint8Array(N);
  
  // Grid-Größe in UI aktualisieren
  const gridSlider = document.getElementById("gridR");
  if (gridSlider) {
    gridSlider.max = "1080";
    gridSlider.value = Math.min(W, 1080);
  }
  
  // Initialisiere Bodennährstoffe für DIRT-Zellen
  for (let i = 0; i < N; i++) {
    if (grid[i] === DIRT) {
      soilNutrientGrid[i] = 50 + rng() * 30; // 50-80 Nährstoffe
      nitrogenGrid[i] = Math.floor(40 + rng() * 40); // 40-80 Stickstoff
      phosphorusGrid[i] = Math.floor(20 + rng() * 30); // 20-50 Phosphor
      potassiumGrid[i] = Math.floor(30 + rng() * 35); // 30-65 Kalium
    }
  }
  
  // Initialisiere Spatial Hash Grid
  spatialHashInit();
  
  // Copy old data to new grid
  if (oldGrid && oldGrid.length > 0) {
    const newW2 = W, oldW2 = Math.min(oldW, W);
    const copyH = Math.min(oldH, H);
    for (let y = 0; y < copyH; y++) {
      for (let x = 0; x < oldW2; x++) {
        const oldIdx = y * oldW + x;
        const newIdx = y * newW2 + x;
        grid[newIdx] = oldGrid[oldIdx];
        tempGrid[newIdx] = oldTemp ? oldTemp[oldIdx] : 20;
        ageGrid[newIdx] = oldAge ? oldAge[oldIdx] : 0;
        colorSeedGrid[newIdx] = oldColorSeed ? oldColorSeed[oldIdx] : 0;
        phGrid[newIdx] = oldPh ? oldPh[oldIdx] : 7.0;
        radiationGrid[newIdx] = oldRad ? oldRad[oldIdx] : 0;
        plantTypeGrid[newIdx] = oldPlantType ? oldPlantType[oldIdx] : 0;
        plantStageGrid[newIdx] = oldPlantStage ? oldPlantStage[oldIdx] : 0;
        plantHealthGrid[newIdx] = oldPlantHealth ? oldPlantHealth[oldIdx] : 50;
        plantSapGrid[newIdx] = oldPlantSap ? oldPlantSap[oldIdx] : 50;
        soilNutrientGrid[newIdx] = oldSoilNutrient ? oldSoilNutrient[oldIdx] : 0;
        plantWaterGrid[newIdx] = oldPlantWater ? oldPlantWater[oldIdx] : 50;
        plantIdGrid[newIdx] = oldPlantId ? oldPlantId[oldIdx] : 0;
        velXGrid[newIdx] = oldVelX ? oldVelX[oldIdx] : 0;
        velYGrid[newIdx] = oldVelY ? oldVelY[oldIdx] : 0;
        electricalGrid[newIdx] = oldElectrical ? oldElectrical[oldIdx] : 0;
        nitrogenGrid[newIdx] = oldNitrogen ? oldNitrogen[oldIdx] : 0;
        phosphorusGrid[newIdx] = oldPhosphorus ? oldPhosphorus[oldIdx] : 0;
        potassiumGrid[newIdx] = oldPotassium ? oldPotassium[oldIdx] : 0;
        myceliumGrid[newIdx] = oldMycelium ? oldMycelium[oldIdx] : 0;
      }
    }
  }
  
  for (let i = 0; i < N; i++) {
    if (colorSeedGrid[i] === 0) {
      colorSeedGrid[i] = Math.floor(rng() * 1000);
    }
  }
  
  // BUGFIX: nach Resize alle übernommenen Partikel reaktivieren.
  aclSeedAllOccupied();

  img = ctx.createImageData(W, H);
  pix = img.data;
}

function buildUI() {
  const containers = {
    powder: document.getElementById("matGridPowder"),
    liquid: document.getElementById("matGridLiquid"),
    gas: document.getElementById("matGridGas"),
    solid: document.getElementById("matGridSolid"),
    special: document.getElementById("matGridSpecial")
  };
  
  // Clear containers
  for (const key in containers) containers[key].innerHTML = "";
  
  for (const id in MATS) {
    if (id == EMPTY) continue;
    const m = MATS[id];
    const btn = document.createElement("button");
    btn.textContent = m.name;
    btn.title = `${m.name}\nDichte: ${m.density} | Schmelzpunkt: ${m.melting}°C | Siedepunkt: ${m.boiling}°C\nEntzündung: ${Math.round(m.flammability * 100)}% | pH: ${m.ph}`;
    if (m.id === curMat) btn.classList.add("active");
    btn.onclick = () => {
      curMat = m.id;
      buildUI();
    };
    
    let containerKey;
    switch (m.type) {
      case TYPE.POWDER: containerKey = "powder"; break;
      case TYPE.LIQUID: containerKey = "liquid"; break;
      case TYPE.GAS: containerKey = "gas"; break;
      case TYPE.SOLID: containerKey = "solid"; break;
      default: containerKey = "special";
    }
    
    containers[containerKey].appendChild(btn);
  }
}

// Input handling
let isDrawing = false, isErasing = false;
let lastPointerX = 0, lastPointerY = 0, hasPointer = false;

// ============================================================================
// PIXEL-ART STAMP-SYSTEM für biologische Materialien
// Beim Malen werden NICHT Zellen flächig gefüllt (das gäbe einen 'Strich'),
// sondern diskrete, geformte Pflanzen/Pilze/Bäume als kleine Pixel-Bilder
// gestempelt – ein größerer Pinsel = ein Feld aus mehreren Pflanzen.
// ============================================================================
function stampCell(px, py, mat, opts) {
  if (px < 0 || px >= W || py < 0 || py >= H) return;
  const idx = py * W + px;
  // Nur in Luft oder (optional) in weichen Untergrund stempeln, nichts Festes überschreiben.
  const cur = grid[idx];
  const overwriteOk = cur === EMPTY || cur === WATER || cur === DIRT || cur === SAND ||
        cur === SAND_WET || cur === SAND_DARK || cur === POLLEN || cur === SPORE ||
        (opts && opts.force);
  if (!overwriteOk) return;
  grid[idx] = mat;
  tempGrid[idx] = (MATS[mat] && MATS[mat].temp) || 20;
  ageGrid[idx] = (opts && opts.age) || 0;
  phGrid[idx] = (MATS[mat] && MATS[mat].ph) || 7.0;
  if (opts) {
    if (opts.type !== undefined) plantTypeGrid[idx] = opts.type;
    if (opts.stage !== undefined) plantStageGrid[idx] = opts.stage;
    if (opts.health !== undefined) plantHealthGrid[idx] = opts.health;
    if (opts.pid !== undefined) plantIdGrid[idx] = opts.pid;
    if (opts.sap !== undefined) plantSapGrid[idx] = opts.sap;
  }
  aclAddNeighbors(px, py, 1);
}
// Findet die Bodenhöhe (oberste feste/Erd-Oberfläche) unter (x,*); -1 = kein Boden.
function groundYat(x) {
  for (let y = 0; y < H; y++) {
    const m = grid[y * W + x];
    if (m === DIRT || m === SAND || m === SAND_WET || m === SAND_DARK ||
        m === STONE || m === WALL || m === GRAVEL || m === TREE_WOOD) return y;
  }
  return -1;
}
// --- Blume stempeln (Stiel + Blüte + Blätter) ---
function stampFlower(bx, by, flowerMat) {
  const pid = nextPlantId++;
  const h = 3 + Math.floor(rng() * 3); // Stielhöhe 3-5
  // Stiel von by nach oben
  for (let k = 0; k < h; k++) {
    stampCell(bx, by - k, PLANT_STEM, {type:1, stage:3, health:80, pid, sap:60});
  }
  // ein bis zwei Blätter seitlich am Stiel
  const lf = 1 + Math.floor(rng() * (h - 1));
  stampCell(bx + (rng() < 0.5 ? -1 : 1), by - lf, LEAF_OAK, {type:1, health:75, pid});
  // Blütenkopf oben
  const topY = by - h;
  if (flowerMat === FLOWER_DANDELION) {
    // runder gelber Kopf
    stampCell(bx, topY, flowerMat, {type:1, stage:4, health:85, pid});
    stampCell(bx - 1, topY, flowerMat, {type:1, stage:4, health:85, pid});
    stampCell(bx + 1, topY, flowerMat, {type:1, stage:4, health:85, pid});
    stampCell(bx, topY - 1, flowerMat, {type:1, stage:4, health:85, pid});
  } else if (flowerMat === FLOWER_TULIP) {
    // becherförmige Tulpe
    stampCell(bx - 1, topY, flowerMat, {type:1, stage:4, health:85, pid});
    stampCell(bx + 1, topY, flowerMat, {type:1, stage:4, health:85, pid});
    stampCell(bx, topY, flowerMat, {type:1, stage:4, health:85, pid});
    stampCell(bx, topY - 1, flowerMat, {type:1, stage:4, health:85, pid});
  } else {
    // Mohn: breite Blüte
    stampCell(bx, topY, flowerMat, {type:1, stage:4, health:85, pid});
    stampCell(bx - 1, topY - 1, flowerMat, {type:1, stage:4, health:85, pid});
    stampCell(bx + 1, topY - 1, flowerMat, {type:1, stage:4, health:85, pid});
    stampCell(bx, topY - 1, flowerMat, {type:1, stage:4, health:85, pid});
  }
}
// --- Pilz stempeln (Stiel + Hut) ---
function stampMushroom(bx, by) {
  const pid = nextPlantId++;
  const h = 2 + Math.floor(rng() * 2); // Stiel 2-3
  for (let k = 0; k < h; k++) {
    stampCell(bx, by - k, MUSHROOM, {type:3, stage:1, health:70, pid, age:5});
  }
  const capY = by - h;
  // Hut (breiter als Stiel), als reifer Pilz markiert (age>30 -> dunklerer Hut)
  const w = 1 + Math.floor(rng() * 2);
  for (let dx = -w; dx <= w; dx++) {
    stampCell(bx + dx, capY, MUSHROOM, {type:3, stage:2, health:70, pid, age:40});
  }
  stampCell(bx, capY - 1, MUSHROOM, {type:3, stage:2, health:70, pid, age:40});
}
// --- Grasbüschel / kleine Pflanze ---
function stampGrass(bx, by) {
  const pid = nextPlantId++;
  const blades = 2 + Math.floor(rng() * 3);
  for (let b = 0; b < blades; b++) {
    const ox = bx + b - ((blades / 2) | 0);
    const h = 2 + Math.floor(rng() * 3);
    for (let k = 0; k < h; k++) {
      stampCell(ox, by - k, PLANT_STEM, {type:2, stage:2, health:70, pid, sap:50});
    }
  }
}
// --- Wasserpflanze (Seegras) – wächst nur in/unter Wasser ---
function stampSeaweed(bx, by) {
  const pid = nextPlantId++;
  const h = 4 + Math.floor(rng() * 5);
  for (let k = 0; k < h; k++) {
    const wob = Math.round(Math.sin(k * 0.8) * 0.8);
    stampCell(bx + wob, by - k, SEAWEED, {type:5, stage:2, health:75, pid, force:true});
  }
}
// --- Baum stempeln: Großer rechteckiger Stamm (5px breit), Äste, Krone, Wurzeln ---
function stampTree(bx, by) {
  const pid = nextPlantId++;
  // GRÖßERE BÄUME: 15-25 Pixel hoch, 5 Pixel breit (rechteckig)
  const trunkH = 15 + Math.floor(rng() * 11);   // 15-25 hoch
  const trunkW = 2;  // 5 Pixel breit (2 links + Mitte + 2 rechts)
  // Wurzeln in den Boden
  for (let r = 1; r <= 3; r++) {
    if (by + r < H) {
      const bm = grid[(by + r) * W + bx];
      if (bm === DIRT || bm === SAND || bm === SAND_WET || bm === SAND_DARK) {
        stampCell(bx, by + r, ROOT_SYSTEM, {type:4, stage:1, health:80, pid, force:true});
        // Wurzeln seitlich
        if (r >= 2 && rng() < 0.5) {
          const wDir = rng() < 0.5 ? -1 : 1;
          if (bx + wDir >= 0 && bx + wDir < W) {
            const bm2 = grid[(by + r) * W + bx + wDir];
            if (bm2 === DIRT || bm2 === SAND || bm2 === SAND_WET || bm2 === SAND_DARK) {
              stampCell(bx + wDir, by + r, ROOT_SYSTEM, {type:4, stage:1, health:75, pid, force:true});
            }
          }
        }
      }
    }
  }
  // Stamm (Holz) - 3 Pixel breit (rechteckig)
  for (let k = 0; k < trunkH; k++) {
    const ty = by - k;
    for (let w = -trunkW; w <= trunkW; w++) {
      const tx = bx + w;
      if (tx >= 0 && tx < W) {
        stampCell(tx, ty, TREE_WOOD, {
          type:4,
          stage: (k < trunkH - 2 ? 3 : 2),
          health: 80,
          pid,
          sap: 60,
          age: 60 + (trunkH - k) * 4
        });
        // setze colorSeed deterministisch für Ringe
        colorSeedGrid[ty * W + tx] = (k * 53 + tx * 17) % 1000;
      }
    }
  }
  // Äste: Regelmäßig alle 7 Reihen, 1-2 pro Seite zufällig
  const topY = by - trunkH;
  for (let row = 7; row < trunkH; row += 7) {
    const ay = by - row;
    // Links: 0, 1 oder 2 Äste (70% Chance, dann 1 oder 2)
    const leftCount = rng() < 0.7 ? (rng() < 0.5 ? 1 : 2) : 0;
    // Rechts: 0, 1 oder 2 Äste (70% Chance, dann 1 oder 2)
    const rightCount = rng() < 0.7 ? (rng() < 0.5 ? 1 : 2) : 0;

    for (let b = 0; b < leftCount; b++) {
      const len = 1 + Math.floor(rng() * 3);
      for (let l = 1; l <= len; l++) {
        stampCell(bx - l, ay - (l >> 2), TREE_WOOD, {type:4, stage:3, health:75, pid, age:100});
      }
    }
    for (let b = 0; b < rightCount; b++) {
      const len = 1 + Math.floor(rng() * 3);
      for (let l = 1; l <= len; l++) {
        stampCell(bx + l, ay - (l >> 2), TREE_WOOD, {type:4, stage:3, health:75, pid, age:100});
      }
    }
  }
  // Krone aus Blättern (größer für größere Bäume)
  const cr = 5 + Math.floor(rng() * 3);
  for (let cy = topY - cr; cy <= topY + 3; cy++) {
    for (let cx = bx - trunkW - cr; cx <= bx + trunkW + cr; cx++) {
      const dx = cx - bx, dy = cy - (topY - 1);
      if (dx * dx + dy * dy > cr * cr) continue;
      if (rng() < 0.8) {
        stampCell(cx, cy, (rng() < 0.6 ? LEAF_OAK : LEAF_MAPLE), {type:4, stage:1, health:75, pid, age:15});
      }
    }
  }
}
// Tabelle: welches Material wird beim Malen als Stamp/Streuung behandelt?
// Liefert die Stempelfunktion + den minimalen Abstand zwischen Instanzen.
function plantStampFor(mat) {
  switch (mat) {
    case FLOWER_DANDELION:
    case FLOWER_TULIP:
    case FLOWER_POPPY:   return { fn: (x, y) => stampFlower(x, y, mat), spacing: 4, needGround: true };
    case MUSHROOM:       return { fn: stampMushroom, spacing: 4, needGround: true };
    case PLANT:
    case PLANT_SPROUT:
    case PLANT_STEM:
    case PLANT_MATURE:   return { fn: stampGrass, spacing: 4, needGround: true };
    case TREE_WOOD:      return { fn: stampTree, spacing: 12, needGround: true };
    case PLANT_FLOWER:   return { fn: (x, y) => {
      const types = [FLOWER_DANDELION, FLOWER_TULIP, FLOWER_POPPY];
      stampFlower(x, y, types[Math.floor(rng() * types.length)]);
    }, spacing: 4, needGround: true };
    case SEAWEED:        return { fn: stampSeaweed, spacing: 5, needWater: true };
    default: return null;
  }
}
// Seeds/Sporen werden spärlich gestreut (kein voller Strich).
function isSeedScatter(mat) {
  return mat === PLANT_SEED || mat === FLOWER_SEED || mat === SEED_SUNFLOWER ||
         mat === SEED_WHEAT || mat === SPORE || mat === MYCELIUM;
}

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (W / rect.width);
  const y = (e.clientY - rect.top) * (H / rect.height);
  return { x: Math.floor(x), y: Math.floor(y) };
}

// Letzter gemalter Stamp-Mittelpunkt je Material, um Doppel-Stamps zu vermeiden.
let __lastStampX = -999, __lastStampY = -999;
function paintAt(x, y) {
  wakeReset(); // Eingabe -> Ruhe-Backoff sofort beenden.

  // --- PIXEL-ART PFLANZEN: diskrete Stamps statt flächigem Strich ---
  if (!isErasing) {
    const stamp = plantStampFor(curMat);
    if (stamp) {
      const step = Math.max(1, stamp.spacing);
      // Rasterpunkte aufbauen: bei kleinem Pinsel genau der Mittelpunkt,
      // bei großem ein Feld. Der Mittelpunkt (0,0) ist IMMER dabei.
      const offsets = [[0, 0]];
      if (bsz > 2) {
        for (let gx = -bsz; gx <= bsz; gx += step) {
          for (let gy = -bsz; gy <= bsz; gy += step) {
            if (gx === 0 && gy === 0) continue;
            if (gx * gx + gy * gy > bsz * bsz) continue;
            offsets.push([gx, gy]);
          }
        }
      }
      let placed = false;
      for (const [gx, gy] of offsets) {
        // kleine Zufallsversetzung nur im Feld-Modus
        const jx = bsz > 2 ? (gx + ((rng() * step) | 0) - (step >> 1)) : gx;
        const cx = x + jx;
        if (cx < 1 || cx >= W - 1) continue;
        if (bsz > 2 && offsets.length > 2 && rng() < 0.3) continue; // Lücken im Feld
        let baseY;
        if (stamp.needGround) {
          const gyl = groundYat(cx);
          if (gyl < 1) continue;
          // im Feld-Modus an die Bodenoberfläche; bei Einzelstamp am Klickpunkt
          if (bsz > 2 && Math.abs((gyl - 1) - (y + gy)) > bsz + 2) continue;
          baseY = gyl - 1;
        } else if (stamp.needWater) {
          const cy = y + gy;
          if (cy < 2 || cy >= H) continue;
          const here = grid[cy * W + cx];
          if (here !== WATER && here !== EMPTY) continue;
          baseY = cy;
        } else {
          baseY = y + gy;
        }
        stamp.fn(cx, baseY);
        placed = true;
      }
      if (placed) return; // fertig – keine flächige Füllung
      return; // auch wenn nichts platziert wurde (z.B. kein Boden): kein Strich
    } else if (isSeedScatter(curMat)) {
      // Samen/Sporen/Myzel spärlich streuen statt vollflächig.
      for (let dy = -bsz; dy <= bsz; dy++) {
        for (let dx = -bsz; dx <= bsz; dx++) {
          if (dx * dx + dy * dy > bsz * bsz) continue;
          if (rng() > 0.10) continue; // sehr spärlich
          const nx = x + dx, ny = y + dy;
          if (nx < 0 || nx >= W || ny < 0 || ny >= H) continue;
          const idx = ny * W + nx;
          if (grid[idx] !== EMPTY && grid[idx] !== WATER && grid[idx] !== DIRT &&
              grid[idx] !== SAND && grid[idx] !== SAND_WET) continue;
          grid[idx] = curMat;
          tempGrid[idx] = MATS[curMat].temp || 20;
          ageGrid[idx] = 0;
          phGrid[idx] = MATS[curMat].ph || 7.0;
          if (curMat === MYCELIUM) myceliumGrid[idx] = 60;
          aclAddNeighbors(nx, ny, 1);
        }
      }
      return;
    }
  }

  // --- Standard: nicht-biologische Materialien flächig malen ---
  for (let dy = -bsz; dy <= bsz; dy++) {
    for (let dx = -bsz; dx <= bsz; dx++) {
      if (dx * dx + dy * dy > bsz * bsz) continue;
      if (rng() > 0.75) continue;
      
      const nx = x + dx, ny = y + dy;
      if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
        const idx = ny * W + nx;
        if (isErasing) {
          grid[idx] = EMPTY;
          tempGrid[idx] = 20;
          ageGrid[idx] = 0;
          phGrid[idx] = 7.0;
          radiationGrid[idx] = 0;
          plantTypeGrid[idx] = 0;
          plantStageGrid[idx] = 0;
          plantHealthGrid[idx] = 0;
          plantSapGrid[idx] = 0;
          plantWaterGrid[idx] = 0;
          plantIdGrid[idx] = 0;
          velXGrid[idx] = 0;
          velYGrid[idx] = 0;
          electricalGrid[idx] = 0;
          myceliumGrid[idx] = 0;
        } else {
          grid[idx] = curMat;
          tempGrid[idx] = MATS[curMat].temp || 20;
          ageGrid[idx] = 0;
          phGrid[idx] = MATS[curMat].ph || 7.0;
          // Initialisiere neue Grids für gemalte Zellen
          if (isLiquid(curMat)) {
            velXGrid[idx] = 0;
            velYGrid[idx] = 0;
          }
          if (curMat === WATER) {
            electricalGrid[idx] = MATS[curMat].electrical || 0;
          }
        }
        // Active Cell List: Gemalte Zellen + Nachbarn markieren
        aclAddNeighbors(nx, ny, 1);
      }
    }
  }
}

// Main Loop
function loop(timestamp) {
  requestAnimationFrame(loop);
  
  // ENDLOS-ZEICHNEN: solange die Maustaste gehalten wird, weiter Material
  // setzen – auch wenn die Maus stillsteht (nur Stempel-Materialien nicht,
  // sonst würden Pflanzen mehrfach übereinander wachsen).
  if (isDrawing && hasPointer) {
    const isStamp = !isErasing && (plantStampFor(curMat) || isSeedScatter(curMat));
    if (!isStamp || frameCount % 8 === 0) paintAt(lastPointerX, lastPointerY);
  }

  if (!paused) {
    // Performance-Optimierung: Begrenze die Anzahl der Simulations-Ticks basierend auf FPS
    const maxTicks = Math.min(spd, 8); // Maximal 8 Ticks pro Frame für bessere Performance
    for (let s = 0; s < maxTicks; s++) {
      simulate();
    }
  }
  
  render();
  
  frameCount++;
  if (timestamp - fpsTimer > 1000) {
    lastFps = frameCount;
    // Performance-Optimierung: Zähle nur alle 4. Zelle für Partikelanzahl
    let particleCount = 0;
    for (let i = 0; i < N; i += 4) {
      if (grid[i] !== EMPTY) particleCount++;
    }
    // Schätzung auf 4x hochrechnen (grobe Abschätzung)
    document.getElementById("st").textContent = `${lastFps} FPS | ${(particleCount * 4).toLocaleString()} Partikel`;
    frameCount = 0;
    fpsTimer = timestamp;
  }
}

// Color distance function
function colorDistance(c1, c2) {
  return Math.sqrt(
    Math.pow(c1[0] - c2[0], 2) +
    Math.pow(c1[1] - c2[1], 2) +
    Math.pow(c1[2] - c2[2], 2)
  );
}

// Find closest material color
function findClosestMaterial(r, g, b, maxDist) {
  maxDist = maxDist || 80;
  let bestId = EMPTY;
  let bestDist = maxDist;
  
  for (let id in MATS) {
    if (id == 0) continue; // skip EMPTY
    let matColor = MATS[id].color;
    let dist = colorDistance([r, g, b], matColor);
    if (dist < bestDist) {
      bestDist = dist;
      bestId = parseInt(id);
    }
  }
  return { id: bestId, distance: bestDist };
}

// Load image file
function loadImageFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      importedImage = img;
      
      // Create canvas to read pixel data
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      
      // Scale image to fit current grid
      const scale = Math.min(W / img.width, H / img.height, 1);
      canvas.width = Math.floor(img.width * scale);
      canvas.height = Math.floor(img.height * scale);
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const pixels = imageData.data;
      
      // Collect unique colors
      const uniqueColors = {};
      for (let i = 0; i < pixels.length; i += 4) {
        const key = `rgb(${pixels[i]},${pixels[i+1]},${pixels[i+2]})`;
        if (!uniqueColors[key]) {
          uniqueColors[key] = { r: pixels[i], g: pixels[i+1], b: pixels[i+2], count: 0 };
        }
        uniqueColors[key].count++;
      }
      
      // Sort by frequency
      const sortedColors = Object.values(uniqueColors)
        .sort((a, b) => b.count - a.count)
        .slice(0, 50); // Top 50 colors
      
      // Auto-assign based on color proximity
      colorMapping = {};
      for (const color of sortedColors) {
        const result = findClosestMaterial(color.r, color.g, color.b);
        if (result.id !== EMPTY) {
          const key = `rgb(${color.r},${color.g},${color.b})`;
          colorMapping[key] = result.id;
        }
      }
      
      updateMappingList();
      showMappingPanel();
      
      // Show info
      const info = document.getElementById('info');
      if (info) {
        info.innerHTML = `Bild geladen: ${canvas.width}x${canvas.height} Pixel, ${Object.keys(colorMapping).length} Farben erkannt`;
        info.classList.add('visible');
        setTimeout(() => info.classList.remove('visible'), 5000);
      }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// Apply color mapping to grid
function applyImageToGrid() {
  if (!importedImage) {
    alert('Bitte zuerst ein Bild importieren!');
    return;
  }
  
  // Pause simulation
  paused = true;
  simulationPausedForImport = true;
  updatePauseButton();
  
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  
  const scale = Math.min(W / importedImage.width, H / importedImage.height, 1);
  canvas.width = Math.floor(importedImage.width * scale);
  canvas.height = Math.floor(importedImage.height * scale);
  ctx.drawImage(importedImage, 0, 0, canvas.width, canvas.height);
  
  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const pixels = imageData.data;
  
  // Clear grid first
  for (let i = 0; i < N; i++) {
    grid[i] = EMPTY;
    tempGrid[i] = 20;
    phGrid[i] = 7;
  }
  
  // Center offset
  const offsetX = Math.floor((W - canvas.width) / 2);
  const offsetY = Math.floor((H - canvas.height) / 2);
  
  // Map pixels to grid
  for (let y = 0; y < canvas.height; y++) {
    for (let x = 0; x < canvas.width; x++) {
      const pxIdx = (y * canvas.width + x) * 4;
      const r = pixels[pxIdx];
      const g = pixels[pxIdx + 1];
      const b = pixels[pxIdx + 2];
      const a = pixels[pxIdx + 3];
      
      if (a < 128) continue; // Skip transparent pixels
      
      const key = `rgb(${r},${g},${b})`;
      let matId = colorMapping[key];
      
      // If not in mapping, find closest
      if (!matId || matId === EMPTY) {
        const result = findClosestMaterial(r, g, b, 50);
        matId = result.id;
      }
      
      if (matId && matId !== EMPTY) {
        const gx = x + offsetX;
        const gy = y + offsetY;
        if (gx >= 0 && gx < W && gy >= 0 && gy < H) {
          grid[gy * W + gx] = matId;
          tempGrid[gy * W + gx] = 20;
          phGrid[gy * W + gx] = 7;
        }
      }
    }
  }
  
  // BUGFIX: importierte Zellen in die Aktivliste aufnehmen, sonst frieren sie ein.
  aclSeedAllOccupied();

  // Update button state
  const playBtn = document.getElementById('playMappingBtn');
  if (playBtn) {
    playBtn.textContent = 'Simulation pausiert - Klicke zum Starten';
    playBtn.onclick = startSimulation;
  }
  
  // Show info
  const info = document.getElementById('info');
  if (info) {
    info.innerHTML = 'Bild angewendet! Klicke "Simulation starten" zum Starten.';
    info.classList.add('visible');
    setTimeout(() => info.classList.remove('visible'), 3000);
  }
}

// Start the simulation
function startSimulation() {
  paused = false;
  simulationPausedForImport = false;
  updatePauseButton();
  
  const playBtn = document.getElementById('playMappingBtn');
  if (playBtn) {
    playBtn.textContent = 'Simulation starten';
    playBtn.onclick = startSimulation;
  }
  
  const info = document.getElementById('info');
  if (info) {
    info.innerHTML = 'Simulation l\u00e4uft!';
    info.classList.add('visible');
    setTimeout(() => info.classList.remove('visible'), 2000);
  }
}

function updatePauseButton() {
  const pauseBtn = document.getElementById('pauseBtn');
  if (pauseBtn) {
    pauseBtn.textContent = paused ? 'Fortsetzen' : 'Pause';
  }
}

// Initialize image import event listeners
function initImageImport() {
  const importBtn = document.getElementById('importImgBtn');
  const fileInput = document.getElementById('imgFileInput');
  const autoMapBtn = document.getElementById('autoMapBtn');
  const applyBtn = document.getElementById('applyMappingBtn');
  const playBtn = document.getElementById('playMappingBtn');
  
  if (importBtn && fileInput) {
    importBtn.addEventListener('click', () => fileInput.click());
  }
  
  if (fileInput) {
    fileInput.addEventListener('change', (e) => {
      loadImageFile(e.target.files[0]);
    });
  }
  
  if (autoMapBtn) {
    autoMapBtn.addEventListener('click', autoMapColors);
  }
  
  if (applyBtn) {
    applyBtn.addEventListener('click', applyImageToGrid);
  }
  
  if (playBtn) {
    playBtn.addEventListener('click', startSimulation);
  }
}

</script>
