let tick = 0;

// Sonnenzyklus-System
let sunCycleEnabled = false;
let sunCycleTime = 0;
let sunCycleSpeed = 0.3; // Standard-Geschwindigkeit
let isDaytime = true;
let sunIntensity = 1.0; // 0-1, 1 = voller Tag, 0 = tiefe Nacht

// Seeded RNG
let rngState = 42;
function seedRng(s) { rngState = s || 1; }
function rng() {
  rngState ^= rngState << 13; rngState >>>= 0;
  rngState ^= rngState >>> 17; rngState >>>= 0;
  rngState ^= rngState << 5; rngState >>>= 0;
  return rngState / 4294967296;
}
function rngRange(min, max) { return min + rng() * (max - min); }

/**
 * TYPE CHECKING
 */
const isEmpty = (m) => m === EMPTY;
const isLiquid = (m) => MATS[m]?.type === TYPE.LIQUID;
const isGas = (m) => MATS[m]?.type === TYPE.GAS;
const isPowder = (m) => MATS[m]?.type === TYPE.POWDER;
const isSolid = (m) => MATS[m]?.type === TYPE.SOLID;
const isSpecial = (m) => MATS[m]?.type === TYPE.SPECIAL;
const isPlant = (m) => MATS[m]?.type === TYPE.PLANT;
const isOrganic = (m) => MATS[m]?.type === TYPE.ORGANIC || MATS[m]?.organic;
const isFlammable = (m) => MATS[m]?.flammability > 0;
const isExplosive = (m) => MATS[m]?.explosive;
const isOxidizable = (m) => MATS[m]?.oxidizable;

/**
 * DENSITY & BUOYANCY
 */
function canDisplace(target, source) {
  if (isEmpty(target)) return true;
  const s = MATS[source], t = MATS[target];
  if (!s || !t) return false;
  
  // Same material: don't displace
  if (source === target) return false;
  
  // Explosives can displace anything
  if (isExplosive(source)) return true;
  
  // Powders sink in liquids if denser
  if (isPowder(source) && isLiquid(target)) return s.density > t.density;
  if (isPowder(source) && isGas(target)) return false;
  
  // Liquids sink in less dense liquids
  if (isLiquid(source) && isLiquid(target)) return s.density > t.density;
  
  // Liquids sink in powders if denser
  if (isLiquid(source) && isPowder(target)) return s.density > t.density * 0.5;
  
  // Gases rise above everything
  if (isGas(source) && (isLiquid(target) || isPowder(target) || isSolid(target))) return false;
  
  // Fire rises through everything
  if (source === FIRE) return true;
  
  return false;
}

/**
 * SWAP & MOVE
 */
function swap(x1, y1, x2, y2) {
  if (x2 < 0 || x2 >= W || y2 < 0 || y2 >= H) return false;
  const i1 = y1 * W + x1, i2 = y2 * W + x2;
  
  let tmp;
  tmp = grid[i2]; grid[i2] = grid[i1]; grid[i1] = tmp;
  tmp = tempGrid[i2]; tempGrid[i2] = tempGrid[i1]; tempGrid[i1] = tmp;
  tmp = ageGrid[i2]; ageGrid[i2] = ageGrid[i1]; ageGrid[i1] = tmp;
  tmp = colorSeedGrid[i2]; colorSeedGrid[i2] = colorSeedGrid[i1]; colorSeedGrid[i1] = tmp;
  tmp = phGrid[i2]; phGrid[i2] = phGrid[i1]; phGrid[i1] = tmp;
  tmp = soluteGrid[i2]; soluteGrid[i2] = soluteGrid[i1]; soluteGrid[i1] = tmp;
  tmp = electricalGrid[i2]; electricalGrid[i2] = electricalGrid[i1]; electricalGrid[i1] = tmp;
  tmp = radiationGrid[i2]; radiationGrid[i2] = radiationGrid[i1]; radiationGrid[i1] = tmp;
  
  return true;
}

function tryMove(x, y, tx, ty, matId) {
  if (tx < 0 || tx >= W || ty < 0 || ty >= H) {
    // Out of bounds: material leaves the simulation
    if (ty >= H && (isGas(matId) || matId === FIRE || matId === STEAM || matId === SMOKE)) return true;
    return false;
  }
  const i1 = y * W + x, i2 = ty * W + tx;
  if (grid[i2] === matId) return false;
  if (grid[i2] !== EMPTY && !canDisplace(grid[i2], matId)) return false;
  swap(x, y, tx, ty);
  return true;
}

/**
 * POWDER PHYSICS - Realistic granular material behavior
 */
function updatePowder(x, y, matId) {
  const i = y * W + x;
  const mat = MATS[matId];
  
  // === WET SAND PHYSICS ===
  if (matId === SAND_WET) {
    // Wet sand is heavier and moves slower
    if (rng() > 0.5) return false; // 50% slowdown
    
    // Wet sand can support slight overhangs (angle of repose)
    // Check if there's support below
    let hasSupport = false;
    if (y + 1 < H) {
      const below = grid[(y + 1) * W + x];
      if (below !== EMPTY && below !== WATER) {
        hasSupport = true;
      }
    }
    
    // Without support, wet sand is stable (like a sandcastle)
    if (!hasSupport && rng() < 0.7) return false;
    
    // Wet sand dries over time
    if (rng() < 0.001) {
      grid[i] = SAND; // Dry out
      return false;
    }
    
    // Normal wet sand movement (slower, more cohesive)
    if (y + 1 < H) {
      if (tryMove(x, y, x, y + 1, matId)) return true;
      // Wet sand doesn't flow diagonally as easily
      if (rng() < 0.3) {
        const dir = rng() < 0.5 ? -1 : 1;
        if (tryMove(x, y, x + dir, y + 1, matId)) return true;
      }
    }
    
    // Wet sand can "flow" sideways when piled up
    if (rng() < 0.1) {
      const dir = rng() < 0.5 ? -1 : 1;
      if (tryMove(x, y, x + dir, y, matId)) return true;
    }
    
    return false;
  }
  
  // Hygroscopic powders absorb moisture
  if (mat.hygroscopic) {
    for (let dy = -2; dy <= 2; dy++) {
      for (let dx = -2; dx <= 2; dx++) {
        const nx = x + dx, ny = y + dy;
        if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
          if (grid[ny * W + nx] === WATER && rng() < 0.01) {
            grid[ny * W + nx] = EMPTY;
            tempGrid[y * W + x] = Math.min(tempGrid[y * W + x] + 20, 100); // Exothermic
          }
        }
      }
    }
  }
  
  // Normal powder movement
  if (y + 1 < H) {
    if (tryMove(x, y, x, y + 1, matId)) return true;
    const dir = rng() < 0.5 ? -1 : 1;
    if (tryMove(x, y, x + dir, y + 1, matId)) return true;
    if (tryMove(x, y, x - dir, y + 1, matId)) return true;
  }
  
  // Capillary action: powders with high capillary value can move upward
  if (mat.capillary > 0.3 && y > 0 && rng() < mat.capillary * 0.02) {
    for (let dy = -1; dy >= -3; dy--) {
      const nx = x + (rng() < 0.5 ? -1 : 1);
      if (nx >= 0 && nx < W && y + dy >= 0 && grid[(y + dy) * W + nx] === WATER) {
        if (tryMove(x, y, nx, y + dy, matId)) return true;
      }
    }
  }
  
  return false;
}

/**
 * LIQUID PHYSICS
 */
function updateLiquid(x, y, matId) {
  const mat = MATS[matId];
  const viscosity = mat.viscosity || 1.0;
  const prob = Math.max(0.1, 1.0 - viscosity * 0.1);
  
  if (rng() > prob) return false; // Viscosity delay
  
  // Extinguish property
  if (mat.extinguish) {
    for (let dy = -1; dy <= 1; dy++) {
      for (let dx = -1; dx <= 1; dx++) {
        const nx = x + dx, ny = y + dy;
        if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
          if (grid[ny * W + nx] === FIRE) {
            grid[ny * W + nx] = STEAM;
            tempGrid[ny * W + nx] = 100;
          }
        }
      }
    }
  }
  
  // Normal liquid movement
  if (y + 1 < H) {
    if (tryMove(x, y, x, y + 1, matId)) return true;
  }
  
  // Flow sideways with preference for spreading
  const dir = rng() < 0.5 ? -1 : 1;
  if (tryMove(x, y, x + dir, y, matId)) return true;
  if (tryMove(x, y, x - dir, y, matId)) return true;
  
  // Diagonal flow
  if (y + 1 < H) {
    if (tryMove(x, y, x + dir, y + 1, matId)) return true;
    if (tryMove(x, y, x - dir, y + 1, matId)) return true;
  }
  
  // Surface tension: liquids tend to stick together
  if (mat.surfaceTension > 0.5 && y + 1 < H && x > 0 && x < W - 1) {
    if (grid[y * W + x - 1] === matId && grid[y * W + x + 1] === matId) {
      // Surrounded horizontally, less likely to flow
      if (rng() > mat.surfaceTension * 0.3) return false;
    }
  }
  
  return false;
}

/**
 * GAS PHYSICS
 */
function updateGas(x, y, matId) {
  const mat = MATS[matId];
  const buoyancy = mat.buoyancy || 0;
  
  // Gases rise based on buoyancy
  if (y - 1 >= 0) {
    if (tryMove(x, y, x, y - 1, matId)) return true;
    const dir = rng() < 0.5 ? -1 : 1;
    if (tryMove(x, y, x + dir, y - 1, matId)) return true;
    if (tryMove(x, y, x - dir, y - 1, matId)) return true;
  }
  
  // Buoyant gases float faster
  if (buoyancy < -0.5 && y - 2 >= 0) {
    if (tryMove(x, y, x, y - 2, matId)) return true;
  }
  
  // Horizontal spread
  const dir = rng() < 0.5 ? -1 : 1;
  if (tryMove(x, y, x + dir, y, matId)) return true;
  if (tryMove(x, y, x - dir, y, matId)) return true;
  
  // Wind effect
  if (windActive && x + windDir >= 0 && x + windDir < W) {
    if (tryMove(x, y, x + windDir, y, matId)) return true;
  }
  
  return false;
}

/**
 * HELPER: Get sunlight intensity based on sun cycle
 */
function getSunlightIntensity() {
  if (!sunCycleEnabled) return 1.0; // Always full sun when disabled
  return sunIntensity;
}

/**
 * HELPER: Check if there's unobstructed path to sunlight
 */
function hasUnobstructedLight(x, y) {
  let blocked = false;
  let lightFactor = 1.0;
  
  for (let cy = y - 1; cy >= 0; cy--) {
    const cell = grid[cy * W + x];
    if (cell !== EMPTY) {
      if (cell === WATER || cell === STONE || cell === WALL || cell === METAL || cell === GLASS) {
        blocked = true;
        break;
      } else if (isPlant(cell) || cell === SMOKE || cell === STEAM) {
        lightFactor *= 0.7;
      }
    }
  }
  
  return blocked ? 0 : lightFactor;
}

/**
 * PLANT GROWTH SYSTEM - Biologically accurate with roots, stem, leaves, flowers
 */
function updatePlant(x, y, matId) {
  const mat = MATS[matId];
  const i = y * W + x;
  
  // Safety check
  if (!mat) return;
  
  ageGrid[i]++;
  
  // Temperature thresholds - more lenient
  const optimalTempMin = 10, optimalTempMax = 35;
  
  // Heat stress - only die after prolonged exposure
  if (tempGrid[i] > 50) {
    if (ageGrid[i] > 20 && rng() < 0.005) {
      grid[i] = PLANT_DEAD;
      return;
    }
  }
  if (tempGrid[i] > 150) {
    grid[i] = FIRE;
    tempGrid[i] = 600;
    return;
  }
  
  // Frost damage - more lenient
  if (tempGrid[i] < -10) {
    if (ageGrid[i] > 30 && rng() < 0.005) {
      grid[i] = PLANT_DEAD;
      return;
    }
  }
  if (tempGrid[i] < -20) {
    if (rng() < 0.02) {
      grid[i] = PLANT_DEAD;
      return;
    }
  }
  
  // Get sunlight intensity
  const sunlight = getSunlightIntensity();
  const lightFactor = hasUnobstructedLight(x, y);
  const effectiveLight = sunlight * lightFactor;
  
  // === ROOT SYSTEM ===
  if (matId === PLANT_ROOT) {
    // Roots grow downward searching for water
    let waterFound = false;
    let waterDist = 999;
    
    // Search for water below
    for (let dy = 1; dy <= 8; dy++) {
      if (y + dy >= H) break;
      const below = grid[(y + dy) * W + x];
      if (below === WATER || below === SAND_WET) {
        waterFound = true;
        waterDist = dy;
        break;
      }
    }
    
    // Grow toward water
    if (y + 1 < H && grid[(y + 1) * W + x] === EMPTY && rng() < 0.008) {
      grid[(y + 1) * W + x] = PLANT_ROOT;
      ageGrid[(y + 1) * W + x] = 0;
    }
    
    // Branch roots sideways when water is far
    if (!waterFound && waterDist > 5 && rng() < 0.004) {
      const dir = rng() < 0.5 ? -1 : 1;
      if (x + dir >= 0 && x + dir < W && y + 1 < H) {
        if (grid[(y + 1) * W + (x + dir)] === EMPTY && grid[y * W + (x + dir)] === EMPTY) {
          grid[y * W + (x + dir)] = PLANT_ROOT;
          ageGrid[y * W + (x + dir)] = 0;
        }
      }
    }
    
    // Roots absorb water
    if (waterFound && rng() < 0.02) {
      for (let dy = 1; dy <= waterDist + 1; dy++) {
        if (y + dy >= H) break;
        const ni = (y + dy) * W + x;
        if (grid[ni] === WATER && rng() < 0.1) {
          grid[ni] = EMPTY;
          break;
        }
      }
    }
    
    // Roots die if no soil contact
    let inSoil = false;
    for (let dy = 0; dy <= 2; dy++) {
      if (y + dy >= H) break;
      const below = grid[(y + dy) * W + x];
      if (below === DIRT || below === SAND || below === SAND_WET || below === SAND_DARK) {
        inSoil = true;
        break;
      }
    }
    if (!inSoil && ageGrid[i] > 100 && rng() < 0.01) {
      grid[i] = PLANT_DEAD;
    }
    
    return;
  }
  
  // === LEAF SYSTEM ===
  if (matId === PLANT_LEAF) {
    // Leaves perform photosynthesis
    if (effectiveLight > 0.1 && photoActivity > 0) {
      const tempFactor = (tempGrid[i] >= optimalTempMin && tempGrid[i] <= optimalTempMax) ? 1.0 :
                        (tempGrid[i] < optimalTempMin) ? Math.max(0.1, (tempGrid[i] + 10) / 25) :
                        Math.max(0.1, 1 - (tempGrid[i] - 25) / 20);
      
      // Check for CO2
      let co2Nearby = false;
      for (let dy = -2; dy <= 2; dy++) {
        for (let dx = -2; dx <= 2; dx++) {
          const nx = x + dx, ny = y + dy;
          if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
            if (grid[ny * W + nx] === CO2) {
              co2Nearby = true;
              // Consume CO2
              if (rng() < 0.02) {
                grid[ny * W + nx] = EMPTY;
              }
            }
          }
        }
      }
      
      // Produce O2 during day, CO2 at night (respiration)
      const photoRate = 0.003 * photoActivity * effectiveLight * tempFactor;
      if (rng() < photoRate) {
        const dir = Math.floor(rng() * 4);
        const dx = [0, 0, -1, 1][dir];
        const dy = [-1, 1, 0, 0][dir];
        const nx = x + dx, ny = y + dy;
        if (nx >= 0 && nx < W && ny >= 0 && ny < H && grid[ny * W + nx] === EMPTY) {
          // Day: produce O2, Night: produce CO2
          if (sunCycleEnabled && !isDaytime) {
            grid[ny * W + nx] = CO2;
          } else {
            grid[ny * W + nx] = OXYGEN;
          }
        }
      }
    }
    
    // Leaves can fall off when dry or old
    if (ageGrid[i] > 100 && rng() < 0.002) {
      grid[i] = PLANT_DEAD;
    }
    
    return;
  }
  
  // === MAIN STEM (PLANT) ===
  if (matId === PLANT) {
    // Check soil contact - more lenient, plants can survive without direct soil contact for a while
    let hasSoilContact = false;
    let hasRootSupport = false;
    for (let dy = 1; dy <= 5; dy++) {
      if (y + dy >= H) break;
      const below = grid[(y + dy) * W + x];
      if (below === DIRT || below === SAND || below === SAND_WET || below === SAND_DARK) {
        hasSoilContact = true;
      }
      if (below === PLANT_ROOT || below === PLANT) {
        hasRootSupport = true;
      }
    }
    
    // Only die if no soil AND no root support after long time
    if (!hasSoilContact && !hasRootSupport && ageGrid[i] > 100 && rng() < 0.002) {
      grid[i] = PLANT_DEAD;
      return;
    }
    
    // Check for water in root zone - more lenient
    let waterAvailable = false;
    let moistureLevel = 0;
    for (let dy = 1; dy <= 8; dy++) {
      if (y + dy >= H) break;
      for (let dx = -3; dx <= 3; dx++) {
        const nx = x + dx, ny = y + dy;
        if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
          const belowMat = grid[ny * W + nx];
          if (belowMat === WATER) {
            waterAvailable = true;
            moistureLevel += 3;
          } else if (belowMat === SAND_WET || belowMat === DIRT) {
            moistureLevel += 1;
          }
        }
      }
    }
    
    // Dry stress - only after prolonged dryness
    if (!waterAvailable && moistureLevel < 2 && ageGrid[i] > 150 && rng() < 0.001) {
      grid[i] = PLANT_DEAD;
      return;
    }
    
    const tempFactor = (tempGrid[i] >= optimalTempMin && tempGrid[i] <= optimalTempMax) ? 1.0 :
                       (tempGrid[i] >= 5 && tempGrid[i] <= 40) ? 0.6 : 0.2;
    
    // Growth rate - faster and more reliable
    const growthRate = 0.002 * Math.min(1, effectiveLight + 0.3) * tempFactor;
    
    if (rng() < growthRate && (hasSoilContact || hasRootSupport)) {
      // Grow upward (main stem)
      if (y > 0 && grid[(y - 1) * W + x] === EMPTY) {
        grid[(y - 1) * W + x] = PLANT;
        ageGrid[(y - 1) * W + x] = 0;
        
        // Add leaves on sides occasionally - more frequent
        if (ageGrid[i] > 5 && rng() < 0.25) {
          const dir = rng() < 0.5 ? -1 : 1;
          if (x + dir >= 0 && x + dir < W && grid[y * W + (x + dir)] === EMPTY) {
            grid[y * W + (x + dir)] = PLANT_LEAF;
            ageGrid[y * W + (x + dir)] = 0;
          }
        }
        
        // Flower at maturity - more reliable
        if (ageGrid[i] > 25 && rng() < 0.03) {
          grid[(y - 1) * W + x] = PLANT_FLOWER;
        }
      }
    }
    
    // Grow roots downward from stem base - more reliable
    if (y + 1 < H && grid[(y + 1) * W + x] === EMPTY && ageGrid[i] > 3 && rng() < 0.01) {
      grid[(y + 1) * W + x] = PLANT_ROOT;
      ageGrid[(y + 1) * W + x] = 0;
    }
    
    // Side branching - more frequent
    if (ageGrid[i] > 10 && rng() < 0.008) {
      const dir = rng() < 0.5 ? -1 : 1;
      if (x + dir >= 0 && x + dir < W && grid[y * W + (x + dir)] === EMPTY) {
        if (y > 0 && (grid[(y - 1) * W + x] === PLANT || grid[(y - 1) * W + x] === EMPTY)) {
          grid[y * W + (x + dir)] = PLANT;
          ageGrid[y * W + (x + dir)] = Math.max(1, ageGrid[i] - 3);
        }
      }
    }
    
    // Age into dead plant - much slower
    if (ageGrid[i] > 400 && rng() < 0.001) {
      grid[i] = PLANT_DEAD;
    }
  }
  
  // === FLOWER (PLANT_FLOWER) ===
  if (matId === PLANT_FLOWER) {
    // Check support - more lenient
    let supported = false;
    let falling = false;
    if (y + 1 < H) {
      const below = grid[(y + 1) * W + x];
      if (below === DIRT || below === SAND || below === SAND_WET || below === SAND_DARK ||
          below === PLANT || below === PLANT_ROOT || below === PLANT_LEAF || below === PLANT_FLOWER) {
        supported = true;
      } else if (below === EMPTY) {
        falling = true;
      }
    }
    
    // Flowers fall if unsupported, but slowly
    if (falling && y + 1 < H && grid[(y + 1) * W + x] === EMPTY && rng() < 0.05) {
      swap(x, y, x, y + 1);
      return;
    }
    
    // Produce seeds - more reliable
    if (ageGrid[i] > 5 && rng() < 0.015) {
      const windEffect = windActive ? windDir * 2 : 0;
      let seedProduced = false;
      
      // Try multiple directions
      for (let attempt = 0; attempt < 4 && !seedProduced; attempt++) {
        const angle = rng() * Math.PI * 2;
        const dist = 1 + Math.floor(rng() * 3);
        const sx = Math.floor(x + Math.cos(angle) * dist + windEffect);
        const sy = Math.floor(y + Math.sin(angle) * dist + (rng() < 0.7 ? 1 : -1));
        
        if (sx >= 0 && sx < W && sy >= 0 && sy < H && grid[sy * W + sx] === EMPTY) {
          // Check if landing on suitable ground
          if (sy + 1 < H) {
            const ground = grid[(sy + 1) * W + sx];
            if (ground === DIRT || ground === SAND || ground === SAND_WET || ground === SAND_DARK || ground === EMPTY) {
              // 60% plant, 25% flower, 15% spore
              const seedType = rng();
              if (seedType < 0.6) {
                grid[sy * W + sx] = PLANT;
              } else if (seedType < 0.85) {
                grid[sy * W + sx] = PLANT_FLOWER;
              } else {
                grid[sy * W + sx] = SPORE;
              }
              ageGrid[sy * W + sx] = 0;
              seedProduced = true;
            }
          }
        }
      }
    }
    
    // Age - much slower
    if (ageGrid[i] > 300 && rng() < 0.001) {
      grid[i] = PLANT_DEAD;
    }
  }
  
  // === DEAD PLANT ===
  if (matId === PLANT_DEAD) {
    // Dead plants slowly decompose (handled by bacteria/mold)
    if (ageGrid[i] > 300 && rng() < 0.002) {
      grid[i] = DIRT;
    }
  }
}

/**
  * SPORE & MOLD SYSTEM - Biologisch korrekte Sporen-Physiologie
  * Sporen sind Pilz-Sporen, die bei Feuchtigkeit zu Schimmel keimen
  */
  function updateSpore(x, y, matId) {
    const i = y * W + x;
    ageGrid[i]++;
    
    // === FEUCHTIGKEITS-DETEKTION ===
    // Sporen benötigen Feuchtigkeit zum Keimen
    let humidityLevel = 0;
    for (let dy = -3; dy <= 3; dy++) {
      for (let dx = -3; dx <= 3; dx++) {
        const nx = x + dx, ny = y + dy;
        if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
          const ni = ny * W + nx;
          if (grid[ni] === WATER) humidityLevel += 3;
          if (grid[ni] === STEAM) humidityLevel += 1;
          if (grid[ni] === SAND_WET) humidityLevel += 2;
        }
      }
    }
    
    // === SPOREN-BEWEGUNG ===
    // Sporen sind leicht und steigen auf (wie real airborne Sporen)
    // But also drift randomly
    if (y - 1 >= 0 && rng() < 0.15) {
      if (tryMove(x, y, x, y - 1, matId)) return;
      const dir = rng() < 0.5 ? -1 : 1;
      if (tryMove(x, y, x + dir, y - 1, matId)) return;
      if (tryMove(x, y, x - dir, y - 1, matId)) return;
    }
    
    // Seitliche Drift (Wind-Effekt) - more frequent
    if (rng() < 0.1) {
      const dir = rng() < 0.5 ? -1 : 1;
      if (tryMove(x, y, x + dir, y, matId)) return;
      if (tryMove(x, y, x - dir, y, matId)) return;
    }
    
    // Bei hoher Feuchtigkeit werden Sporen schwerer und sinken
    if (humidityLevel >= 3 && y + 1 < H && rng() < 0.1) {
      if (tryMove(x, y, x, y + 1, matId)) return;
      const dir = rng() < 0.5 ? -1 : 1;
      if (tryMove(x, y, x + dir, y + 1, matId)) return;
      if (tryMove(x, y, x - dir, y + 1, matId)) return;
    }
    
    // === KEIMUNG ===
    // Sporen keimen zu Schimmel bei Feuchtigkeit + organischem Substrat
    // Lower threshold for germination
    if (ageGrid[i] > 2 && humidityLevel >= 2) {
      let nearOrganic = false;
      let organicPos = null;
      
      // Nach organischem Material suchen
      for (let dy = -2; dy <= 2 && !nearOrganic; dy++) {
        for (let dx = -2; dx <= 2 && !nearOrganic; dx++) {
          const nx = x + dx, ny = y + dy;
          if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
            const ni = ny * W + nx;
            const nMat = grid[ni];
            if (nMat === DIRT || nMat === PLANT_DEAD || nMat === MOLD || nMat === MYCELIUM || isOrganic(nMat)) {
              nearOrganic = true;
              organicPos = {x: nx, y: ny};
            }
          }
        }
      }
      
      // Keimung zu Schimmel - faster and more reliable
      const germinationRate = Math.min(0.15, 0.03 * humidityLevel);
      if (nearOrganic && rng() < germinationRate) {
        // Schimmel wächst auf dem organischen Material
        if (organicPos && grid[organicPos.y * W + organicPos.x] !== MOLD && grid[organicPos.y * W + organicPos.x] !== MYCELIUM) {
          grid[organicPos.y * W + organicPos.x] = MOLD;
          ageGrid[organicPos.y * W + organicPos.x] = 0;
        }
        grid[i] = MOLD;
        ageGrid[i] = 0;
        return;
      }
    }
    
    // Sporen absorbieren Feuchtigkeit (werden schwerer) - less aggressive
    if (humidityLevel >= 2 && rng() < 0.005) {
      for (let dy = -1; dy <= 1; dy++) {
        for (let dx = -1; dx <= 1; dx++) {
          const nx = x + dx, ny = y + dy;
          if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
            const ni = ny * W + nx;
            if (grid[ni] === WATER && rng() < 0.1) {
              grid[ni] = EMPTY; // Wasser absorbiert
              humidityLevel = Math.max(0, humidityLevel - 1);
              break;
            }
          }
        }
      }
    }
    
    // === SPOREN-ALTERUNG ===
    // Sporen überleben länger bei Feuchtigkeit
    const maxAge = humidityLevel >= 3 ? 600 : (humidityLevel >= 1 ? 300 : 100);
    if (ageGrid[i] > maxAge && rng() < 0.002) {
      grid[i] = EMPTY;
    }
  }

/**
  * MYCELIUM SYSTEM - Pilz-Myzel bildet unterirdische Netzwerke
  * Myzel wächst im Boden, sucht nach Nährstoffen und produziert Knospen (Pilze) an der Oberfläche
  */
  function updateMycelium(x, y, matId) {
    const i = y * W + x;
    ageGrid[i]++;
    
    // Myzel wächst im Boden (DIRT, SAND_WET)
    let inSoil = false;
    for (let dy = -1; dy <= 1; dy++) {
      for (let dx = -1; dx <= 1; dx++) {
        const nx = x + dx, ny = y + dy;
        if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
          const ni = ny * W + nx;
          if (grid[ni] === DIRT || grid[ni] === SAND_WET || grid[ni] === SAND_DARK) {
            inSoil = true;
            break;
          }
        }
      }
      if (inSoil) break;
    }
    
    if (!inSoil && ageGrid[i] > 50 && rng() < 0.01) {
      grid[i] = EMPTY;
      return;
    }
    
    // Feuchtigkeit detektieren
    let moistureLevel = 0;
    for (let dy = -2; dy <= 2; dy++) {
      for (let dx = -2; dx <= 2; dx++) {
        const nx = x + dx, ny = y + dy;
        if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
          const ni = ny * W + nx;
          if (grid[ni] === WATER) moistureLevel += 3;
          if (grid[ni] === STEAM) moistureLevel += 1;
          if (grid[ni] === SAND_WET) moistureLevel += 2;
        }
      }
    }
    
    // Nährstoffe detektieren (organische Materie)
    let nutrientsLevel = 0;
    const neighbors = [i-1, i+1, i-W, i+W, i-W-1, i-W+1, i+W-1, i+W+1];
    for (const ni of neighbors) {
      if (ni >= 0 && ni < N) {
        const nMat = grid[ni];
        if (isOrganic(nMat) || nMat === PLANT_DEAD || nMat === MOLD) {
          nutrientsLevel += 1;
        }
      }
    }
    
    // Myzel breitet sich im Boden aus (langsamer, kontrolliert)
    if (moistureLevel >= 2 && nutrientsLevel >= 1 && rng() < 0.008) {
      const dx = Math.floor(rng() * 3) - 1;
      const dy = Math.floor(rng() * 3) - 1;
      const nx = x + dx, ny = y + dy;
      if (nx >= 0 && nx < W && ny >= 0 && ny < H && grid[ny * W + nx] === EMPTY) {
        // Nur ausbreiten wenn Boden in der Nähe
        let nearSoil = false;
        for (let sd = -1; sd <= 1; sd++) {
          for (let sdx = -1; sdx <= 1; sdx++) {
            const snx = nx + sdx, sny = ny + sd;
            if (snx >= 0 && snx < W && sny >= 0 && sny < H) {
              if (grid[sny * W + snx] === DIRT || grid[sny * W + snx] === SAND_WET) {
                nearSoil = true;
                break;
              }
            }
          }
          if (nearSoil) break;
        }
        if (nearSoil) {
          grid[ny * W + nx] = MYCELIUM;
          ageGrid[ny * W + nx] = 0;
        }
      }
    }
    
    // Myzel zersetzt organische Materie (sehr langsam)
    if (moistureLevel >= 2 && nutrientsLevel >= 1 && rng() < 0.003) {
      for (const ni of neighbors) {
        if (ni >= 0 && ni < N) {
          const nMat = grid[ni];
          if ((isOrganic(nMat) || nMat === PLANT_DEAD) && nMat !== MYCELIUM && rng() < 0.01) {
            grid[ni] = DIRT; // Zu Kompost/Erde
          }
        }
      }
    }
    
    // Knospen bilden an der Oberfläche (wenn Myzel nahe Oberfläche)
    if (y < H * 0.3 && moistureLevel >= 3 && nutrientsLevel >= 2 && rng() < 0.002) {
      // Pilz-Knospe wächst nach oben
      if (y > 0 && grid[(y - 1) * W + x] === EMPTY) {
        grid[(y - 1) * W + x] = MOLD; // Oberfläche-Pilz
        ageGrid[(y - 1) * W + x] = 0;
      }
    }
    
    // Myzel altert sehr langsam
    if (ageGrid[i] > 500 && rng() < 0.001) {
      grid[i] = DIRT;
    }
  }

/**
  * MOLD GROWTH - Pilz-Knospen an der Oberfläche
  * Diese wachsen aus Myzel und produzieren Sporen
  */
  function updateMold(x, y, matId) {
    const i = y * W + x;
    ageGrid[i]++;
    
    // Feuchtigkeit detektieren
    let moistureLevel = 0;
    for (let dy = -2; dy <= 2; dy++) {
      for (let dx = -2; dx <= 2; dx++) {
        const nx = x + dx, ny = y + dy;
        if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
          const ni = ny * W + nx;
          if (grid[ni] === WATER) moistureLevel += 3;
          if (grid[ni] === STEAM) moistureLevel += 1.5;
          if (grid[ni] === SAND_WET) moistureLevel += 2;
        }
      }
    }
    
    // Organisches Substrat - mehr Optionen
    let hasOrganicSubstrate = false;
    const neighbors = [i-1, i+1, i-W, i+W, i-W-1, i-W+1, i+W-1, i+W+1];
    for (const ni of neighbors) {
      if (ni >= 0 && ni < N) {
        const nMat = grid[ni];
        if (isOrganic(nMat) || nMat === PLANT_DEAD || nMat === DIRT || nMat === MYCELIUM || nMat === WOOD || nMat === BACTERIA) {
          hasOrganicSubstrate = true;
          break;
        }
      }
    }
    
    // Schimmel kann auch ohne Substrat überleben (ruht), stirbt aber langsam
    if (!hasOrganicSubstrate && ageGrid[i] > 100 && rng() < 0.005) {
      grid[i] = ASH;
      return;
    }
    
    // Temperatur - mehr tolerant
    if (tempGrid[i] > 60) {
      if (ageGrid[i] > 50 && rng() < 0.01) {
        grid[i] = ASH;
        return;
      }
    }
    if (tempGrid[i] < -10) {
      if (ageGrid[i] > 100 && rng() < 0.005) {
        grid[i] = ASH;
        return;
      }
    }
    
    // Zersetzung (sehr langsam)
    if (moistureLevel >= 2 && hasOrganicSubstrate) {
      const decomposeChance = 0.002 + moistureLevel * 0.001;
      for (const ni of neighbors) {
        if (ni >= 0 && ni < N) {
          const nMat = grid[ni];
          if ((isOrganic(nMat) || nMat === PLANT_DEAD) && nMat !== MOLD && rng() < decomposeChance) {
            if (rng() < 0.3) {
              grid[ni] = BACTERIA;
            } else {
              grid[ni] = DIRT;
            }
          }
        }
      }
    }
    
    // Ausbreitung (langsam)
    if (moistureLevel >= 3 && rng() < 0.015) {
      const dx = Math.floor(rng() * 3) - 1;
      const dy = Math.floor(rng() * 3) - 1;
      const nx = x + dx, ny = y + dy;
      if (nx >= 0 && nx < W && ny >= 0 && ny < H && grid[ny * W + nx] === EMPTY) {
        let nearOrganic = false;
        for (let od = -2; od <= 2; od++) {
          for (let odx = -2; odx <= 2; odx++) {
            const onx = nx + odx, ony = ny + od;
            if (onx >= 0 && onx < W && ony >= 0 && ony < H) {
              if (isOrganic(grid[ony * W + onx]) || grid[ony * W + onx] === PLANT_DEAD || grid[ony * W + onx] === DIRT || grid[ony * W + onx] === MYCELIUM) {
                nearOrganic = true;
                break;
              }
            }
          }
          if (nearOrganic) break;
        }
        if (nearOrganic) {
          grid[ny * W + nx] = MOLD;
          ageGrid[ny * W + nx] = 0;
        }
      }
    }
    
    // Sporen-Produktion - häufiger
    if (ageGrid[i] > 20 && moistureLevel >= 1) {
      const sporeRate = Math.min(0.2, 0.02 + moistureLevel * 0.008);
      if (rng() < sporeRate) {
        if (y > 0 && grid[(y - 1) * W + x] === EMPTY) {
          grid[(y - 1) * W + x] = SPORE;
          ageGrid[(y - 1) * W + x] = 0;
        }
      }
    }
    
    // Alterung - viel langsamer, Schimmel kann lange überleben
    if (moistureLevel === 0 && ageGrid[i] > 200 && rng() < 0.005) {
      grid[i] = ASH;
      return;
    }
    
    if (ageGrid[i] > 500 && rng() < 0.001) {
      grid[i] = DIRT;
    }
  }

/**
 * BACTERIA SYSTEM - Langsame Zersetzung organischer Materie
 * Bakterien sind Mikroben die organische Stoffe zu Kompost/Erde verarbeiten
 */
function updateBacteria(x, y, matId) {
  const i = y * W + x;
  ageGrid[i]++;
  
  // Feuchtigkeit
  let moistureLevel = 0;
  for (let dy = -2; dy <= 2; dy++) {
    for (let dx = -2; dx <= 2; dx++) {
      const nx = x + dx, ny = y + dy;
      if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
        const ni = ny * W + nx;
        if (grid[ni] === WATER) moistureLevel += 2;
        if (grid[ni] === STEAM) moistureLevel += 0.5;
        if (grid[ni] === SAND_WET) moistureLevel += 1;
      }
    }
  }
  
  // Ohne Feuchtigkeit: Bakterien werden inaktiv (sterben nicht sofort)
  if (moistureLevel === 0) {
    if (ageGrid[i] > 100 && rng() < 0.005) {
      grid[i] = DIRT; // Trocknen ein, werden zu Erde
      return;
    }
    return; // Inaktiv ohne Wasser
  }
  
  // Temperatur
  if (tempGrid[i] > 70) {
    grid[i] = DIRT; // Absterben bei Hitze
    return;
  }
  if (tempGrid[i] < -10) {
    if (ageGrid[i] > 150 && rng() < 0.005) {
      grid[i] = DIRT;
      return;
    }
    return; // Inaktiv bei Frost
  }
  
  // === LANGSAME ZERSETZUNG ===
  const neighbors = [i-1, i+1, i-W, i+W, i-W-1, i-W+1, i+W-1, i+W+1];
  
  for (const ni of neighbors) {
    if (ni >= 0 && ni < N) {
      const nMat = grid[ni];
      
      // Organische Materie zersetzen (sehr langsam!)
      if ((isOrganic(nMat) || nMat === PLANT_DEAD) && nMat !== BACTERIA && moistureLevel >= 1) {
        const decomposeRate = 0.001 + moistureLevel * 0.0005; // Sehr langsam
        if (rng() < decomposeRate) {
          // Schrittweise Zersetzung: erst zu Schimmel/Myzel, dann zu Erde
          if (rng() < 0.4) {
            grid[ni] = MOLD;
          } else if (rng() < 0.7) {
            grid[ni] = MYCELIUM;
          } else {
            grid[ni] = DIRT; // Direkt zu Kompost
          }
        }
      }
      
      // Myzel und Schimmel können auch zersetzt werden
      if ((nMat === MOLD || nMat === MYCELIUM) && moistureLevel >= 1) {
        if (rng() < 0.002) {
          grid[ni] = DIRT;
        }
      }
    }
  }
  
  // Reproduktion (sehr langsam, nur bei Nahrung und Feuchtigkeit)
  if (moistureLevel >= 2 && rng() < 0.003) {
    const dx = Math.floor(rng() * 3) - 1;
    const dy = Math.floor(rng() * 3) - 1;
    const nx = x + dx, ny = y + dy;
    if (nx >= 0 && nx < W && ny >= 0 && ny < H && grid[ny * W + nx] === EMPTY) {
      grid[ny * W + nx] = BACTERIA;
      ageGrid[ny * W + nx] = 0;
    }
  }
  
  // Alterung - Bakterien werden zu Erde (Nährstoffkreislauf)
  if (ageGrid[i] > 200 && rng() < 0.002) {
    grid[i] = DIRT;
  }
}

/**
 * CHEMICAL REACTIONS - Biologisch/chemisch korrekte Reaktionen
 */
function checkChemicalReactions(x, y, matId) {
  const i = y * W + x;
  const mat = MATS[matId];
  
  // Check neighbors for reactions
  const neighbors = [
    { dx: -1, dy: 0 }, { dx: 1, dy: 0 }, { dx: 0, dy: -1 }, { dx: 0, dy: 1 }
  ];
  
  for (const { dx, dy } of neighbors) {
    const nx = x + dx, ny = y + dy;
    if (nx < 0 || nx >= W || ny < 0 || ny >= H) continue;
    const ni = ny * W + nx;
    const nId = grid[ni];
    const nMat = MATS[nId];
    if (!nMat) continue;
    
    // === COMBUSTION (Verbrennung) ===
    // Verbrennung benötigt: Brennstoff + Sauerstoff + Zündtemperatur
    if (matId === FIRE || tempGrid[i] > 300) {
      // Entzündung von brennbaren Materialien
      if (nMat.flammability > 0 && nId !== FIRE && nId !== SMOKE && nId !== ASH) {
        // Zündtemperatur muss erreicht sein
        const ignitionTemp = nMat.ignitionTemperature || 300;
        if (tempGrid[i] >= ignitionTemp && rng() < nMat.flammability * 0.03) {
          grid[ni] = FIRE;
          tempGrid[ni] = 700;
        }
      }
      // Wasser -> Dampf (bei >100°C)
      if (nId === WATER && tempGrid[i] >= 100) {
        grid[ni] = STEAM;
        tempGrid[ni] = Math.max(tempGrid[i], 100);
      }
      // Eis -> Wasser (bei >0°C)
      if (nId === ICE && tempGrid[i] > 0) {
        grid[ni] = WATER;
        tempGrid[ni] = Math.max(tempGrid[i], 0);
      }
      // Salz löst sich in Wasser
      if (nId === SALT && matId === WATER && rng() < 0.02) {
        grid[ni] = EMPTY;
        // Salzwasser ist leicht sauer
        phGrid[i] = Math.max(phGrid[i] - 0.1, 5.5);
      }
    }
    
    // === ACID REACTIONS (Säure-Reaktionen) ===
    if (matId === ACID) {
      // Säure + Metall -> Salz + Wasserstoff (korrekte Chemie!)
      // 2HCl + Fe -> FeCl₂ + H₂
      if (nId === METAL && rng() < 0.03) {
        grid[ni] = RUST; // Metall wird zu Metallionen (vereinfacht: Rost)
        if (rng() < 0.4) {
          grid[i] = EMPTY; // Säure verbraucht
        }
        // Wasserstoffgas produzieren (steigt auf)
        if (y > 0 && grid[(y-1) * W + x] === EMPTY && rng() < 0.5) {
          grid[(y-1) * W + x] = HYDROGEN;
        }
      }
      // Säure + Base (Neutralisation) - exotherm!
      // HCl + NaOH -> NaCl + H₂O
      if (nId === SODA || nId === BLOOD_ALKALI) {
        grid[ni] = DIRT; // Salz entsteht (vereinfacht: Erde)
        grid[i] = WATER;
        tempGrid[i] = 80; // Stark exotherm!
        tempGrid[ni] = 80;
        phGrid[i] = 7.0; // Neutral
      }
      // Säure + Schwefel -> Schwefeldioxid (SO₂)
      if (nId === SULFUR && rng() < 0.02) {
        grid[ni] = SMOKE; // SO₂
        if (rng() < 0.3) grid[i] = EMPTY;
      }
      // Säure + Carbonat (Kalkstein) -> CO₂
      // 2HCl + CaCO₃ -> CaCl₂ + H₂O + CO₂
      if (nId === STONE && rng() < 0.015) {
        grid[i] = EMPTY; // Säure verbraucht
        // CO₂-Gas entsteht (steigt nicht auf, ist schwerer als Luft)
        if (y < H-1 && grid[(y+1) * W + x] === EMPTY) {
          grid[(y+1) * W + x] = SMOKE; // CO₂ (als Smoke simuliert)
        }
      }
      // Säure zerstört organische Materie
      if (isPlant(nId) || nId === PLANT_DEAD || nId === WOOD || nId === OIL) {
        grid[ni] = ASH;
        if (rng() < 0.3) grid[i] = EMPTY;
      }
      // Säure frisst sich durch Materialien
      if (nMat.id !== ACID && nMat.id !== GLASS && nMat.id !== PLASTIC && rng() < 0.005) {
        grid[ni] = ASH;
      }
    }
    
    // === BASE (ALKALI) REACTIONS (Lauge-Reaktionen) ===
    if (matId === SODA || matId === BLOOD_ALKALI) {
      // Base + Säure (Neutralisation)
      if (nId === ACID) {
        grid[i] = WATER;
        grid[ni] = DIRT; // Salz
        tempGrid[i] = 80;
        tempGrid[ni] = 80;
        phGrid[i] = 7.0;
      }
      // Lauge + Öl -> Seife (Verseifung!)
      // Triglycerid + 3NaOH -> Glycerin + 3 Seifenmoleküle
      if (nId === OIL && rng() < 0.02) {
        grid[ni] = WATER; // Vereinfacht: Wasser
        if (rng() < 0.4) grid[i] = WATER;
      }
      // Lauge löst organische Materie (Holz, Pflanzen)
      if ((nId === WOOD || isPlant(nId)) && rng() < 0.01) {
        grid[ni] = ASH;
        if (rng() < 0.2) grid[i] = EMPTY;
      }
    }
    
    // === OXIDATION (Rostbildung) ===
    // 4Fe + 3O₂ -> 2Fe₂O₃ (Rost)
    // Benötigt: Metall + Sauerstoff + Feuchtigkeit (beschleunigt)
    if (nId === METAL && matId === OXYGEN) {
      // Feuchtigkeit beschleunigt Rostbildung
      const moistureFactor = phGrid[i] > 0 ? 2 : 1;
      if (rng() < 0.002 * moistureFactor) {
        grid[ni] = RUST;
        tempGrid[i] += 10; // Leicht exotherm
      }
    }
    // Rost kann durch Wasserstoff reduziert werden (bei hoher Temperatur)
    // Fe₂O₃ + 3H₂ -> 2Fe + 3H₂O
    if (nId === RUST && matId === HYDROGEN && tempGrid[i] > 250 && rng() < 0.03) {
      grid[ni] = METAL;
      grid[i] = STEAM;
    }
    // Rost kann durch Säure entfernt werden
    if (nId === RUST && matId === ACID && rng() < 0.02) {
      grid[ni] = EMPTY; // Rost gelöst
      if (rng() < 0.3) grid[i] = EMPTY;
    }
    
    // === HYDROGEN + CHLORINE → HCl REACTION ===
    // H2 + Cl2 → 2HCl (bei Licht oder Hitze)
    if ((matId === HYDROGEN && nId === CHLORINE) || (matId === CHLORINE && nId === HYDROGEN)) {
      if (matId === FIRE || nId === FIRE || tempGrid[i] > 200 || rng() < 0.002) {
        // Produziert HCl-Gas (Säure in Gasform)
        grid[i] = ACID;
        grid[ni] = ACID;
        tempGrid[i] = 100;
        tempGrid[ni] = 100;
      }
    }
    
    // === HYDROGEN + OXYGEN EXPLOSION ===
    if ((matId === HYDROGEN && nId === OXYGEN) || (matId === OXYGEN && nId === HYDROGEN)) {
      if (matId === FIRE || nId === FIRE || tempGrid[i] > 200 || tempGrid[ni] > 200 || rng() < 0.001) {
        // H2+O2 explosion creates water vapor and water droplets (not ash!)
        const explosionRadius = 8;
        for (let dy = -explosionRadius; dy <= explosionRadius; dy++) {
          for (let dx = -explosionRadius; dx <= explosionRadius; dx++) {
            if (dx * dx + dy * dy > explosionRadius * explosionRadius) continue;
            const nx = x + dx, ny = y + dy;
            if (nx < 0 || nx >= W || ny < 0 || ny >= H) continue;
            const ni = ny * W + nx;
            const neighborMat = MATS[grid[ni]];
            
            if (neighborMat && neighborMat.id !== WALL && neighborMat.id !== CLONE) {
              const dist = Math.sqrt(dx * dx + dy * dy);
              const intensity = 1 - dist / explosionRadius;
              
              if (grid[ni] === HYDROGEN || grid[ni] === OXYGEN) {
                // Convert unreacted gases to water
                if (tempGrid[ni] > 200) {
                  grid[ni] = STEAM;
                  tempGrid[ni] = 120;
                } else {
                  grid[ni] = WATER;
                  tempGrid[ni] = 30;
                }
              } else if (neighborMat.id === WATER) {
                // More water created
                tempGrid[ni] = Math.min(tempGrid[ni] + 50, 100);
              } else if (neighborMat.id === FIRE) {
                grid[ni] = STEAM;
                tempGrid[ni] = 100;
              } else if (neighborMat.id === URANIUM) {
                // Nuclear chain reaction!
                explode(nx, ny, explosionRadius * 0.5, false);
              } else if (neighborMat.flammability > 0 && rng() < intensity * 0.3) {
                grid[ni] = FIRE;
                tempGrid[ni] = 600 * intensity;
              } else if (neighborMat.id === WATER) {
                grid[ni] = STEAM;
                tempGrid[ni] = 100;
              }
            }
          }
        }
        // Create water droplets that fall as "rain" from explosion
        for (let k = 0; k < 15; k++) {
          const rx = x + Math.floor(rng() * explosionRadius * 2) - explosionRadius;
          const ry = y + Math.floor(rng() * explosionRadius * 2) - explosionRadius;
          if (rx >= 0 && rx < W && ry >= 0 && ry < H && grid[ry * W + rx] === EMPTY) {
            grid[ry * W + rx] = WATER;
            tempGrid[ry * W + rx] = 25;
          }
        }
        return true;
      }
    }
    
    // === LAVA + WATER -> STONE/OBSIDIAN + STEAM ===
    if (matId === LAVA && nId === WATER) {
      // Rapid cooling creates glass/obsidian, slow cooling creates stone
      grid[ni] = STEAM;
      if (rng() < 0.15) {
        grid[i] = GLASS; // Obsidian-like glass from rapid quenching
        tempGrid[i] = 100;
      } else if (rng() < 0.5) {
        grid[i] = STONE;
        tempGrid[i] = 200;
      }
    }
    // Water + Lava heat transfer
    if (matId === WATER && nId === LAVA) {
      grid[i] = STEAM;
      tempGrid[ni] = Math.max(tempGrid[ni], 500); // Lava stays hot
    }
    
    // === SULFUR + FIRE -> SMOKE (SO2) ===
    if (matId === FIRE && nId === SULFUR) {
      grid[ni] = SMOKE;
    }
    
    // === PHOSPHORUS AUTO-IGNITION ===
    if (nId === PHOSPHORUS && nMat.autoFlammable && tempGrid[i] > 44) {
      grid[ni] = FIRE;
      tempGrid[ni] = 600;
    }
    if (matId === FIRE && nId === PHOSPHORUS) {
      grid[ni] = FIRE;
      tempGrid[ni] = 800;
    }
    
    // === URANIUM RADIATION ===
    if (nId === URANIUM) {
      // Uranium emits radiation continuously - slower, more realistic
      if (rng() < 0.003) {
        // Radiation spreads in a cross pattern (realistic radiation diffusion)
        const radDirs = [{dx:0,dy:-1},{dx:0,dy:1},{dx:-1,dy:0},{dx:1,dy:0}];
        for (const {dx: d2x, dy: d2y} of radDirs) {
          const nnx = nx + d2x, nny = ny + d2y;
          if (nnx >= 0 && nnx < W && nny >= 0 && nny < H && grid[nny * W + nnx] === EMPTY && rng() < 0.15) {
            grid[nny * W + nnx] = RADIATION;
            break;
          }
        }
      }
      
      // Radiation damages nearby organic matter - less aggressive
      for (const {dx: d2x, dy: d2y} of neighbors) {
        const nnx = nx + d2x, nny = ny + d2y;
        if (nnx >= 0 && nnx < W && nny >= 0 && nny < H) {
          const nni = nny * W + nnx;
          const nMatId = grid[nni];
          
          // Radiation damages plants - slower
          if (isPlant(nMatId)) {
            if (rng() < 0.01) {
              grid[nni] = PLANT_DEAD;
              ageGrid[nni] = 0;
            }
          }
          // Radiation accelerates decay of dead plants
          if (nMatId === PLANT_DEAD && rng() < 0.02) {
            // Creates radioactive contaminated soil
            grid[nni] = DIRT;
            // Add radiation on top
            if (nny > 0 && grid[(nny-1) * W + nnx] === EMPTY) {
              grid[(nny-1) * W + nnx] = RADIATION;
            }
          }
          // Radiation damages mold - slower
          if (nMatId === MOLD && rng() < 0.01) {
            grid[nni] = ASH;
          }
          // Radiation affects bacteria - slower
          if (nMatId === BACTERIA && rng() < 0.015) {
            // Bacteria break down into radioactive ash
            grid[nni] = ASH;
            // Spread radiation
            for (const {dx: d3x, dy: d3y} of neighbors) {
              const mnx = nx + d3x, mny = ny + d3y;
              if (mnx >= 0 && mnx < W && mny >= 0 && mny < H && grid[mny * W + mnx] === EMPTY && rng() < 0.1) {
                grid[mny * W + mnx] = RADIATION;
                break;
              }
            }
          }
        }
      }
      
      // Radiation creates radioactive waste from nearby materials - slower
      if (rng() < 0.001) {
        for (const {dx: d2x, dy: d2y} of neighbors) {
          const nnx = nx + d2x, nny = ny + d2y;
          if (nnx >= 0 && nnx < W && nny >= 0 && nny < H) {
            const nMatId = grid[nny * W + nnx];
            // Contaminate ground materials - they become radioactive waste
            if ((nMatId === DIRT || nMatId === SAND || nMatId === SAND_DARK || nMatId === GRAVEL || nMatId === STONE) && rng() < 0.2) {
              // Mark material as contaminated by adding radiation on top
              if (nny > 0 && grid[(nny-1) * W + nnx] === EMPTY) {
                grid[(nny-1) * W + nnx] = RADIATION;
              }
              // The ground material itself slowly becomes radioactive ash
              if (rng() < 0.05) {
                grid[nny * W + nnx] = ASH; // Contaminated ash = radioactive waste
              }
              break;
            }
            // Water becomes radioactive waste water
            if (nMatId === WATER && rng() < 0.08) {
              // Water stays but becomes radioactive (shown by radiation particle)
              if (nny > 0 && grid[(nny-1) * W + nnx] === EMPTY) {
                grid[(nny-1) * W + nnx] = RADIATION;
              }
            }
          }
        }
      }
    }
    
    // Radiation affects living organisms - less aggressive
    if (matId === RADIATION) {
      // Radiation spreads to adjacent cells - slower
      if (rng() < 0.02) {
        const radDirs = [{dx:0,dy:-1},{dx:0,dy:1},{dx:-1,dy:0},{dx:1,dy:0}];
        for (const {dx: d2x, dy: d2y} of radDirs) {
          const nnx = nx + d2x, nny = ny + d2y;
          if (nnx >= 0 && nnx < W && nny >= 0 && nny < H && grid[nny * W + nnx] === EMPTY && rng() < 0.2) {
            grid[nny * W + nnx] = RADIATION;
            break;
          }
        }
      }
      
      // Radiation damages nearby organic matter in a larger radius - slower
      for (let dy = -2; dy <= 2; dy++) {
        for (let dx = -2; dx <= 2; dx++) {
          const nnx = x + dx, nny = y + dy;
          if (nnx >= 0 && nnx < W && nny >= 0 && nny < H) {
            const nMatId = grid[nny * W + nnx];
            const dist = Math.sqrt(dx * dx + dy * dy);
            const damageChance = Math.max(0.01, 0.06 - dist * 0.02);
            
            // Radiation kills plants on contact/nearby
            if (isPlant(nMatId) && rng() < damageChance) {
              grid[nny * W + nnx] = PLANT_DEAD;
              ageGrid[nny * W + nnx] = 0;
            }
            // Radiation kills bacteria on contact/nearby
            if (nMatId === BACTERIA && rng() < damageChance * 1.2) {
              grid[nny * W + nnx] = ASH;
            }
            // Radiation kills mold on contact/nearby
            if (nMatId === MOLD && rng() < damageChance * 0.8) {
              grid[nny * W + nnx] = ASH;
            }
            // Radiation damages organic matter
            if (isOrganic(nMatId) && nMatId !== MOLD && nMatId !== BACTERIA && rng() < damageChance * 0.5) {
              grid[nny * W + nnx] = PLANT_DEAD;
            }
          }
        }
      }
      
      // Radiation decays over time
      if (rng() < 0.15) grid[i] = EMPTY;
    }
    
    // === ALCOHOL + FIRE ===
    if (matId === FIRE && nId === ALCOHOL) {
      grid[ni] = FIRE;
      tempGrid[ni] = 800;
    }
    
    // === HONEY CARAMELIZATION ===
    if (nId === HONEY && tempGrid[i] > 110 && rng() < 0.02) {
      grid[ni] = ASH;
    }
    
    // === MERCURY + SULFUR -> MERCURY SULFIDE (red powder) ===
    if ((matId === MERCURY && nId === SULFUR) || (matId === SULFUR && nId === MERCURY)) {
      if (rng() < 0.01) {
        grid[i] = RUST; // Simplified: turns to red powder (using rust color)
        grid[ni] = RUST;
      }
    }
  }
  
  return false;
}

/**
 * EXPLOSION SYSTEM - Realistic blast physics
 * Handles TNT, fireballs, and other explosives with proper energy distribution
 */
function explode(cx, cy, radius, isTNT) {
  // TNT produces a more powerful, concentrated blast with different effects by zone
  const blastType = isTNT ? 'tnt' : 'fireball';
  const energy = isTNT ? 1500 : 1000; // TNT has higher energy density
  
  // Phase 1: Blast wave - instant destruction in center, pressure effects outward
  for (let dy = -radius; dy <= radius; dy++) {
    for (let dx = -radius; dx <= radius; dx++) {
      if (dx * dx + dy * dy > radius * radius) continue;
      const nx = cx + dx, ny = cy + dy;
      if (nx < 0 || nx >= W || ny < 0 || ny >= H) continue;
      const ni = ny * W + nx;
      const mat = MATS[grid[ni]];
      if (!mat) continue;
      
      const dist = Math.sqrt(dx * dx + dy * dy);
      const normDist = dist / radius; // 0 = center, 1 = edge
      
      // Define blast zones
      let intensity;
      if (blastType === 'tnt') {
        // TNT: very intense center, rapid falloff
        intensity = normDist < 0.3 ? 1.0 : Math.max(0, 1.0 - (normDist - 0.3) / 0.7);
      } else {
        // Fireball: more gradual falloff
        intensity = Math.max(0, 1.0 - normDist);
      }
      
      // Zone-based effects
      if (mat.id === WALL || mat.id === CLONE) {
        // Walls resist explosion but can crack
        if (blastType === 'tnt' && intensity > 0.8 && rng() < 0.3) {
          grid[ni] = STONE; // Wall cracks into stone
          tempGrid[ni] = 200;
        }
        continue;
      }
      
      if (mat.id === TNT) {
        // Chain reaction: adjacent TNT detonates
        if (intensity > 0.5) {
          explode(nx, ny, radius * 0.5, true);
        }
        continue;
      }
      
      if (mat.id === URANIUM) {
        // Nuclear chain reaction!
        explode(nx, ny, radius * 0.6, false);
        continue;
      }
      
      // Calculate thermal energy deposited
      const thermalEnergy = intensity * energy;
      
      if (blastType === 'tnt') {
        // TNT blast: crushing pressure + heat
        if (intensity > 0.7) {
          // Center zone: complete vaporization
          if (mat.id !== WALL && mat.id !== CLONE) {
            grid[ni] = SMOKE;
            tempGrid[ni] = thermalEnergy;
          }
        } else if (intensity > 0.4) {
          // Inner zone: combustion and melting
          if (mat.id === WATER) {
            grid[ni] = STEAM;
            tempGrid[ni] = 300;
          } else if (mat.id === ICE) {
            grid[ni] = WATER;
            tempGrid[ni] = 100;
          } else if (mat.oxidizable || mat.id === METAL) {
            if (thermalEnergy > mat.melting * 0.5) {
              grid[ni] = LAVA;
              tempGrid[ni] = thermalEnergy * 0.5;
            } else {
              grid[ni] = RUST;
            }
          } else if (mat.flammability > 0 || mat.id === OIL || mat.id === ALCOHOL || mat.id === HONEY) {
            grid[ni] = FIRE;
            tempGrid[ni] = thermalEnergy;
          } else if (mat.id === PLANT || mat.id === PLANT_FLOWER || mat.id === PLANT_DEAD || mat.id === WOOD) {
            grid[ni] = FIRE;
            tempGrid[ni] = thermalEnergy;
          } else if (mat.id === DIRT || mat.id === SAND || mat.id === SAND_DARK || mat.id === GRAVEL) {
            // Ground is compacted/vitrified
            if (intensity > 0.6 && rng() < 0.3) {
              grid[ni] = GLASS; // Sand vitrifies to glass
              tempGrid[ni] = 500;
            } else {
              grid[ni] = ASH; // Organic content burns
            }
          } else {
            grid[ni] = intensity > 0.6 ? FIRE : SMOKE;
            tempGrid[ni] = thermalEnergy * 0.5;
          }
        } else {
          // Outer zone: heat and smoke only
          if (mat.id === WATER) {
            grid[ni] = STEAM;
          } else if (mat.flammability > 0.5 && thermalEnergy > 200) {
            grid[ni] = FIRE;
            tempGrid[ni] = thermalEnergy;
          } else {
            grid[ni] = SMOKE;
            tempGrid[ni] = thermalEnergy * 0.3;
          }
        }
      } else {
        // Fireball explosion: more heat, less pressure
        if (mat.id === WATER) {
          grid[ni] = STEAM;
          tempGrid[ni] = Math.min(400, thermalEnergy);
        } else if (mat.flammability > 0 || mat.id === OIL || mat.id === ALCOHOL) {
          grid[ni] = FIRE;
          tempGrid[ni] = thermalEnergy;
        } else if (mat.id === PLANT || mat.id === PLANT_FLOWER || mat.id === PLANT_DEAD || mat.id === WOOD) {
          grid[ni] = FIRE;
          tempGrid[ni] = thermalEnergy;
        } else if (rng() < intensity * 0.6) {
          grid[ni] = intensity > 0.5 ? FIRE : SMOKE;
          tempGrid[ni] = thermalEnergy * 0.4;
        }
      }
    }
  }
  
  // TNT produces characteristic mushroom cloud
  if (blastType === 'tnt') {
    // Smoke column rises from explosion
    for (let i = 0; i < radius * 3; i++) {
      const smokeX = cx + Math.floor(rng() * radius * 2) - radius;
      const smokeY = cy - Math.floor(rng() * radius * 4);
      if (smokeX >= 0 && smokeX < W && smokeY >= 0 && smokeY < H && grid[smokeY * W + smokeX] === EMPTY) {
        grid[smokeY * W + smokeX] = SMOKE;
        tempGrid[smokeY * W + smokeX] = 80;
        ageGrid[smokeY * W + smokeX] = 0;
      }
    }
    // Ash falls back down
    for (let i = 0; i < radius; i++) {
      const ashX = cx + Math.floor(rng() * radius * 4) - radius * 2;
      const ashY = cy + Math.floor(rng() * radius);
      if (ashX >= 0 && ashX < W && ashY >= 0 && ashY < H && grid[ashY * W + ashX] === EMPTY) {
        grid[ashY * W + ashX] = ASH;
      }
    }
  }
}

// Special TNT detonation function
function detonateTNT(x, y) {
  const i = y * W + x;
  grid[i] = EMPTY; // TNT consumed
  explode(x, y, 12, true); // TNT has radius 12
}

/**
 * THERMAL PHYSICS
 */
function updateThermal(x, y, matId) {
  const i = y * W + x;
  const mat = MATS[matId];
  if (!mat || mat.heatCapacity === 0) return;
  
  // Heat conduction to neighbors
  if (mat.conductivity > 0 && rng() < 0.2) {
    const neighbors = [];
    if (x > 0) neighbors.push(i - 1);
    if (x < W - 1) neighbors.push(i + 1);
    if (y > 0) neighbors.push(i - W);
    if (y < H - 1) neighbors.push(i + W);
    
    if (neighbors.length > 0) {
      const ni = neighbors[Math.floor(rng() * neighbors.length)];
      const nMat = MATS[grid[ni]];
      if (!nMat) return;
      
      const tempDiff = tempGrid[i] - tempGrid[ni];
      if (Math.abs(tempDiff) > 0.5) {
        const transfer = tempDiff * 0.05 * Math.sqrt(mat.conductivity * nMat.conductivity);
        tempGrid[i] -= transfer;
        tempGrid[ni] += transfer;
      }
    }
  }
  
  // Ambient temperature regulation (room temp ~20°C)
  const ambientRate = 0.002 / mat.heatCapacity;
  if (tempGrid[i] > 25) {
    tempGrid[i] -= ambientRate;
  } else if (tempGrid[i] < 18) {
    tempGrid[i] += ambientRate;
  }
  
  // === EGG COAGULATION - Realistic protein denaturation ===
  // Eggs coagulate at 62°C (albumen) and 70°C (yolk)
  if (matId === EGGS && mat.raw) {
    const coagTemp = mat.coagulationTemp || 62;
    if (tempGrid[i] >= coagTemp) {
      // Egg white coagulates - turns from transparent liquid to opaque solid
      grid[i] = COOKED_EGG;
      tempGrid[i] = Math.max(tempGrid[i], 62); // Keep current temperature
      // Cooked egg is now a solid that can be further processed
    }
    // Eggs can also freeze at very low temperatures
    if (tempGrid[i] < -2 && rng() < 0.01) {
      // Frozen egg becomes a solid powder-like substance
      grid[i] = COOKED_EGG;
      tempGrid[i] = -2;
    }
  }
  
  // Phase transitions
  // Melting
  if (mat.melting > 0 && tempGrid[i] >= mat.melting) {
    if (matId === ICE) grid[i] = WATER;
    else if (matId === STONE || matId === METAL || matId === WALL) grid[i] = LAVA;
    else if (matId === GLASS) grid[i] = EMPTY;
    else if (matId === WOOD) { grid[i] = FIRE; tempGrid[i] = 400; }
    else if (matId === RUST) grid[i] = METAL;
    else if (matId === BRASS) grid[i] = LAVA;
    else if (matId === COOKED_EGG) { grid[i] = FIRE; tempGrid[i] = 500; } // Cooked egg burns
  }
  
  // Freezing
  if (mat.melting > 0 && tempGrid[i] <= mat.melting && isLiquid(matId)) {
    if (matId === WATER) grid[i] = ICE;
    else if (matId === LAVA) { grid[i] = STONE; tempGrid[i] = 100; }
  }
  
  // Boiling
  if (mat.boiling > 0 && tempGrid[i] >= mat.boiling) {
    if (matId === WATER || matId === BLOOD) grid[i] = STEAM;
    else if (matId === OIL) { grid[i] = FIRE; tempGrid[i] = 500; }
    else if (matId === ACID) grid[i] = SMOKE;
    else if (matId === COOKED_EGG) { grid[i] = ASH; } // Cooked egg chars
    else if (matId === HONEY) { grid[i] = ASH; }
    else if (matId === ALCOHOL) { grid[i] = FIRE; tempGrid[i] = 600; }
    else if (matId === MERCURY) grid[i] = STEAM;
  }
  
  // === LAVA PHYSICS - Realistic cooling and crystallization ===
  if (matId === LAVA) {
    // Lava cools based on contact with other materials
    if (tempGrid[i] <= 700 && y + 1 < H) {
      // Cooling rate depends on surrounding materials
      const below = grid[(y + 1) * W + x];
      let coolingRate = 0.1; // Base cooling
      
      if (below === WATER || below === ICE) {
        // Rapid cooling on water/ice - forms obsidian-like glass
        coolingRate = 2.0;
        if (tempGrid[i] <= 800 && rng() < 0.05) {
          grid[i] = GLASS; // Obsidian formation
          tempGrid[i] = 100;
        }
      } else if (below === DIRT || below === SAND || below === SAND_DARK) {
        // Slow cooling on ground - forms stone
        coolingRate = 0.3;
        if (tempGrid[i] <= 600 && rng() < 0.02) {
          grid[i] = STONE;
          tempGrid[i] = 200;
        }
      } else {
        // Air cooling
        coolingRate = 0.05;
        if (tempGrid[i] <= 500 && rng() < 0.01) {
          grid[i] = STONE;
          tempGrid[i] = 150;
        }
      }
      
      tempGrid[i] -= coolingRate;
    }
    
    // Lava glows brighter when hotter
    if (tempGrid[i] > 1000) {
      tempGrid[i] = Math.min(1200, tempGrid[i]); // Max temperature
    }
    
    // Lava flows faster when hotter (lower viscosity)
    const viscosityFactor = Math.max(1, (tempGrid[i] - 500) / 200);
  }
  
  // Wet sand formation - water mixes with powder
  if (matId === WATER && y + 1 < H) {
    const below = grid[(y + 1) * W + x];
    if ((below === SAND || below === SAND_DARK || below === GRAVEL) && rng() < 0.02) {
      // Water soaks into powder, creating wet powder
      if (MATS[below] && MATS[below].capillary) {
        grid[(y + 1) * W + x] = SAND_WET;
        tempGrid[(y + 1) * W + x] = tempGrid[i]; // Share temperature
      }
    }
  }
  
  // Condensation
  if (matId === STEAM && tempGrid[i] <= 90) {
    grid[i] = WATER;
    tempGrid[i] = 80;
  }
  
  // Fire behavior
  if (matId === FIRE) {
    tempGrid[i] = Math.max(tempGrid[i], 600);
    ageGrid[i]++;
    
    // Fire produces smoke
    if (rng() < 0.3) {
      const dir = rng() < 0.5 ? -1 : 1;
      for (const d of [dir, -dir]) {
        if (x + d >= 0 && x + d < W && y - 1 >= 0 && grid[(y - 1) * W + x + d] === EMPTY && rng() < 0.2) {
          grid[(y - 1) * W + x + d] = SMOKE;
          tempGrid[(y - 1) * W + x + d] = 80;
          break;
        }
      }
    }
    
    // Fire dies out
    if (ageGrid[i] > 15 + rng() * 25 || rng() < 0.03) {
      grid[i] = rng() < 0.6 ? SMOKE : EMPTY;
      tempGrid[i] = 40;
    }
  }
  
  // Smoke behavior
  if (matId === SMOKE) {
    ageGrid[i]++;
    // Soot settles
    if (mat.soot && rng() < 0.01 && y + 1 < H && grid[(y + 1) * W + x] !== EMPTY) {
      grid[i] = ASH;
    }
    if (ageGrid[i] > 80 + rng() * 120) {
      grid[i] = EMPTY;
      tempGrid[i] = 20;
    }
  }
  
  // Radiation decay
  if (matId === RADIATION) {
    if (rng() < 0.1) grid[i] = EMPTY;
  }
}

/**
 * MAIN SIMULATION
 */
function simulate() {
  tick++;
  
  // Safety check to prevent crashes
  if (!grid || !tempGrid || !ageGrid || !W || !H) {
    return;
  }
  
  // Wind direction changes occasionally
  if (windActive && rng() < 0.01) {
    windDir = rng() < 0.5 ? -1 : 1;
  }
  
  // Process bottom-up for powders and liquids
  for (let y = H - 1; y >= 0; y--) {
    const reverse = rng() < 0.5;
    const xStart = reverse ? W - 1 : 0;
    const xEnd = reverse ? -1 : W;
    const xStep = reverse ? -1 : 1;
    
    for (let x = xStart; x !== xEnd; x += xStep) {
      const i = y * W + x;
      const matId = grid[i];
      if (matId === EMPTY) continue;
      
      const mat = MATS[matId];
      if (!mat) continue;
      
      // Update thermal physics
      updateThermal(x, y, matId);
      
      // Check chemical reactions
      checkChemicalReactions(x, y, matId);
      
      // Material-specific updates
      if (isPowder(matId)) {
        updatePowder(x, y, matId);
      } else if (isLiquid(matId)) {
        updateLiquid(x, y, matId);
      }
    }
  }
  
  // Process top-down for gases
  for (let y = 0; y < H; y++) {
    const reverse = rng() < 0.5;
    const xStart = reverse ? W - 1 : 0;
    const xEnd = reverse ? -1 : W;
    const xStep = reverse ? -1 : 1;
    
    for (let x = xStart; x !== xEnd; x += xStep) {
      const i = y * W + x;
      const matId = grid[i];
      if (!isGas(matId) && matId !== SMOKE && matId !== STEAM) continue;
      
      updateGas(x, y, matId);
    }
  }
  
  // Process plants and organic matter
  for (let y = 0; y < H; y++) {
    const reverse = rng() < 0.5;
    const xStart = reverse ? W - 1 : 0;
    const xEnd = reverse ? -1 : W;
    const xStep = reverse ? -1 : 1;
    
    for (let x = xStart; x !== xEnd; x += xStep) {
      const i = y * W + x;
      const matId = grid[i];
      
      if (isPlant(matId)) {
        updatePlant(x, y, matId);
      } else if (matId === SPORE) {
        updateSpore(x, y, matId);
      } else if (matId === MOLD) {
        updateMold(x, y, matId);
      } else if (matId === BACTERIA) {
        updateBacteria(x, y, matId);
      }
    }
  }
  
  // Rain effect
  if (rainActive) {
    for (let i = 0; i < 80; i++) {
      const x = Math.floor(rng() * W);
      if (grid[x] === EMPTY) {
        grid[x] = WATER;
        tempGrid[x] = 18;
      }
    }
  }
  
  // Fire rain effect
  if (fireActive) {
    for (let i = 0; i < 30; i++) {
      const x = Math.floor(rng() * W);
      if (grid[x] === EMPTY) {
        grid[x] = FIREBALL;
        tempGrid[x] = 1000;
        ageGrid[x] = 0;
      }
    }
  }
  
  // Fireball physics
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const i = y * W + x;
      if (grid[i] === FIREBALL) {
        ageGrid[i]++;
        // Fireballs fall fast
        if (y + 1 < H && grid[(y + 1) * W + x] === EMPTY && rng() < 0.5) {
          swap(x, y, x, y + 1);
        } else if (rng() < 0.3) {
          // Explode on impact or after time
          explode(x, y, 12, false);
        }
        if (ageGrid[i] > 100) {
          explode(x, y, 8, false);
        }
      }
    }
  }
  
  // TNT physics - realistic detonation
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const i = y * W + x;
      if (grid[i] === TNT) {
        // TNT detonates when:
        // 1. Exposed to high temperature (>300°C)
        // 2. Hit by fire or explosion
        // 3. Hit by shock wave (adjacent explosion)
        // 4. Struck by lightning (rare)
        
        if (tempGrid[i] > 300 || grid[i-1] === FIRE || grid[i+1] === FIRE ||
            grid[i-W] === FIRE || grid[i+W] === FIRE ||
            grid[i-1] === FIREBALL || grid[i+1] === FIREBALL ||
            grid[i-W] === FIREBALL || grid[i+W] === FIREBALL) {
          detonateTNT(x, y);
          break;
        }
        
        // TNT slowly degrades over very long time
        if (ageGrid[i] > 10000 && rng() < 0.001) {
          grid[i] = ASH; // Decomposes to harmless ash
        }
      }
    }
  }
  
  // Ecosystem generation
  if (ecosystemActive) {
    // Add a simple ecosystem: dirt base, water, plants
    if (tick % 100 === 0) {
      // Create a small pond
      const px = Math.floor(rng() * (W - 20)) + 10;
      const py = Math.floor(rng() * (H - 10)) + 5;
      
      // Dirt layer
      for (let dy = 0; dy < 3; dy++) {
        for (let dx = -5; dx <= 5; dx++) {
          const nx = px + dx, ny = py + dy;
          if (nx >= 0 && nx < W && ny >= 0 && ny < H && grid[ny * W + nx] === EMPTY) {
            grid[ny * W + nx] = DIRT;
          }
        }
      }
      
      // Water pool
      for (let dx = -3; dx <= 3; dx++) {
        const nx = px + dx, ny = py + 3;
        if (nx >= 0 && nx < W && ny >= 0 && ny < H && grid[ny * W + nx] === EMPTY) {
          grid[ny * W + nx] = WATER;
          tempGrid[ny * W + nx] = 20;
        }
      }
      
      // Plants on dirt edges
      for (let dx = -5; dx <= 5; dx++) {
        const nx = px + dx, ny = py + 2;
        if (nx >= 0 && nx < W && ny >= 0 && ny < H && grid[ny * W + nx] === DIRT && rng() < 0.4) {
          grid[ny * W + nx] = PLANT;
          ageGrid[ny * W + nx] = Math.floor(rng() * 20);
        }
      }
    }
  }
  
  // === Sonnenzyklus-Simulation ===
  if (sunCycleEnabled) {
    sunCycleTime += sunCycleSpeed;
    const cycleLength = 100; // Vollständiger Tag/Nacht-Zyklus
    const phase = (sunCycleTime % cycleLength) / cycleLength;
    isDaytime = phase < 0.5;
    
    // Sonnenintensität berechnen (sinusförmig für sanften Übergang)
    if (isDaytime) {
      // Tag: 0% am Horizont -> 100% mittags -> 0% am Horizont
      const dayPhase = phase * 2; // 0-1 für den Tag
      sunIntensity = Math.sin(dayPhase * Math.PI);
    } else {
      // Nacht: schwaches Mondlicht
      const nightPhase = (phase - 0.5) * 2; // 0-1 für die Nacht
      sunIntensity = Math.sin(nightPhase * Math.PI) * 0.15; // 15% Mondlicht
    }
    sunIntensity = Math.max(0, Math.min(1, sunIntensity));
    
    // UI aktualisieren
    const sunIndicator = document.getElementById("sunCycleIndicator");
    const sunText = document.getElementById("sunCycleText");
    const sunProgress = document.getElementById("sunCycleProgress");
    
    sunText.textContent = isDaytime ? "Tag" : "Nacht";
    sunProgress.textContent = `(${Math.round(sunIntensity * 100)}%)`;
    sunIndicator.className = "sun-cycle-indicator " + (isDaytime ? "day" : "night");
  }
}

/**
 * RENDERING
 */
function render() {
  for (let i = 0; i < N; i++) {
    const matId = grid[i];
    const ci = i * 4;
    
    if (matId === EMPTY) {
      pix[ci] = 12; pix[ci+1] = 12; pix[ci+2] = 15; pix[ci+3] = 255;
      continue;
    }
    
    const mat = MATS[matId];
    let r = mat.color[0];
    let g = mat.color[1];
    let b = mat.color[2];
    
    // Temperature effects
    const t = tempGrid[i];
    const seed = colorSeedGrid[i];
    const baseNoise = (seed % 25) - 12;
    
    if (t > 30) {
      const heatFactor = Math.min(1, Math.max(0, (t - 30) / 600));
      
      // Incandescence: red -> orange -> yellow -> white
      r += heatFactor * 150;
      g += heatFactor * (heatFactor > 0.5 ? 100 : 40);
      b += heatFactor * (heatFactor > 0.8 ? 80 : 0);
      
      // Glow effect for very hot objects
      if (t > 400) {
        const glow = (heatFactor - 0.5) * 60;
        r += glow; g += glow * 0.7; b += glow * 0.3;
      }
    }
    
    // Cold effects
    if (t < 0) {
      const coldFactor = Math.min(1, Math.abs(t) / 50);
      b = Math.min(255, b + coldFactor * 40);
      r = Math.max(0, r - coldFactor * 20);
    }
    
    // Base texture noise
    r += baseNoise;
    g += baseNoise;
    b += baseNoise;
    
    // pH visualization
    const ph = phGrid[i];
    if (ph !== undefined && ph !== null && mat.ph !== 7.0) {
      if (ph < 4) {
        r = Math.min(255, r + (4 - ph) * 15);
      } else if (ph > 10) {
        b = Math.min(255, b + (ph - 10) * 15);
      }
    }
    
    // Sonnenzyklus-Effekte auf Pflanzen (Photosynthese vs. Respiration)
    if (sunCycleEnabled && !isDaytime && (matId === PLANT || matId === PLANT_LEAF)) {
      // Nachts: Pflanzen atmen CO2 aus statt O2 zu produzieren
      // Leicht dunkleres Grün für nächtliche Pflanzen
      g *= 0.7;
      r *= 0.8;
    }
    
    // Radiation visualization
    if (radiationGrid[i] > 0) {
      const rad = Math.min(1, radiationGrid[i] / 50);
      r = r * (1 - rad) + 50 * rad;
      g = g * (1 - rad) + 255 * rad;
      b = b * (1 - rad) + 50 * rad;
    }
    
    // Special rendering
    if (matId === FIRE) {
      const flicker = Math.sin(tick * 0.3 + seed) * 40;
      r = 255;
      g = 120 + flicker;
      b = 20 + flicker * 0.3;
    }
    
    if (matId === LAVA) {
      const bubble = Math.sin(tick * 0.05 + seed * 0.1) * 30;
      r = 255;
      g = 60 + bubble;
      b = 10 + bubble * 0.2;
    }
    
    if (matId === PLANT) {
      // Health-based green intensity
      const health = Math.max(0, Math.min(1, 1 - Math.abs(t - 25) / 50));
      g = 184 + health * 40;
      // Variation based on age
      const ageVar = Math.sin(ageGrid[i] * 0.1) * 15;
      g += ageVar;
    }
    
    if (matId === PLANT_FLOWER) {
      // Colorful flower
      const hue = (seed * 37 + tick * 0.01) % 360;
      const sat = 0.8;
      const val = 0.9;
      // Simple HSV to RGB
      const c = val * sat;
      const x = c * (1 - Math.abs((hue / 60) % 2 - 1));
      const m = val - c;
      let fr, fg, fb;
      if (hue < 60) { fr = c; fg = x; fb = 0; }
      else if (hue < 120) { fr = x; fg = c; fb = 0; }
      else if (hue < 180) { fr = 0; fg = c; fb = x; }
      else if (hue < 240) { fr = 0; fg = x; fb = c; }
      else if (hue < 300) { fr = x; fg = 0; fb = c; }
      else { fr = c; fg = 0; fb = x; }
      r = fr * 255 + m * 255;
      g = fg * 255 + m * 255;
      b = fb * 255 + m * 255;
    }
    
    if (matId === STEAM) {
      const alpha = Math.max(0.3, 1 - ageGrid[i] / 100);
      r = 200 + (1 - alpha) * 55;
      g = 210 + (1 - alpha) * 45;
      b = 225 + (1 - alpha) * 30;
    }
    
    if (matId === SMOKE) {
      const alpha = Math.max(0.2, 1 - ageGrid[i] / 120);
      const v = 70 + (1 - alpha) * 40;
      r = v; g = v; b = v;
    }
    
    if (matId === URANIUM) {
      const pulse = Math.sin(tick * 0.05 + seed) * 30;
      g = 180 + pulse;
    }
    
    if (matId === CLONE) {
      const pulse = Math.sin(tick * 0.08) * 40;
      r = 255; g = pulse; b = 255;
    }
    
    if (matId === BACTERIA) {
      const pulse = Math.sin(tick * 0.1 + seed * 0.5) * 20;
      g = 255;
      r = 80 + pulse;
    }
    
    pix[ci]   = Math.max(0, Math.min(255, r));
    pix[ci+1] = Math.max(0, Math.min(255, g));
    pix[ci+2] = Math.max(0, Math.min(255, b));
    pix[ci+3] = 255;
  }
  
  ctx.putImageData(img, 0, 0);
}

/**
 * INITIALIZATION
 */
function resize() {
  // Use user-settable grid width, calculate height based on aspect ratio
  // Start with maximum size (500) for best visual quality
  W = Math.max(500, targetGridWidth);
  const aspectRatio = window.innerHeight / window.innerWidth;
  H = Math.floor(W * aspectRatio);
  
  // Clamp grid size
  W = Math.max(50, Math.min(500, W));
  H = Math.max(50, Math.min(500, H));
  
  N = W * H;
  canvas.width = W;
  canvas.height = H;
  
  // Preserve existing data if resizing
  const oldGrid = grid, oldTemp = tempGrid, oldAge = ageGrid;
  const oldW = W, oldH = H;
  
  grid = new Uint8Array(N);
  tempGrid = new Float32Array(N).fill(20);
  ageGrid = new Uint16Array(N);
  colorSeedGrid = new Uint16Array(N);
  phGrid = new Float32Array(N).fill(7.0);
  soluteGrid = new Float32Array(N);
  electricalGrid = new Float32Array(N);
  radiationGrid = new Float32Array(N);
  
  // Copy old data to new grid
  if (oldGrid && oldGrid.length > 0) {
    const newW2 = W, oldW2 = Math.min(oldW, W);
    const copyH = Math.min(oldH, H);
    for (let y = 0; y < copyH; y++) {
      for (let x = 0; x < oldW2; x++) {
        const oldIdx = y * oldW + x;
        const newIdx = y * newW2 + x;
        grid[newIdx] = oldGrid[oldIdx];
        tempGrid[newIdx] = oldTemp ? oldTemp[oldIdx] : 20;
        ageGrid[newIdx] = oldAge ? oldAge[oldIdx] : 0;
      }
    }
  }
  
  for (let i = 0; i < N; i++) {
    if (colorSeedGrid[i] === 0) {
      colorSeedGrid[i] = Math.floor(rng() * 1000);
    }
  }
  
  img = ctx.createImageData(W, H);
  pix = img.data;
}

function buildUI() {
  const containers = {
    powder: document.getElementById("matGridPowder"),
    liquid: document.getElementById("matGridLiquid"),
    gas: document.getElementById("matGridGas"),
    solid: document.getElementById("matGridSolid"),
    special: document.getElementById("matGridSpecial")
  };
  
  // Clear containers
  for (const key in containers) containers[key].innerHTML = "";
  
  for (const id in MATS) {
    if (id == EMPTY) continue;
    const m = MATS[id];
    const btn = document.createElement("button");
    btn.textContent = m.name;
    btn.title = `${m.name}\nDichte: ${m.density} | Schmelzpunkt: ${m.melting}°C | Siedepunkt: ${m.boiling}°C\nEntzündung: ${Math.round(m.flammability * 100)}% | pH: ${m.ph}`;
    if (m.id === curMat) btn.classList.add("active");
    btn.onclick = () => {
      curMat = m.id;
      buildUI();
    };
    
    let containerKey;
    switch (m.type) {
      case TYPE.POWDER: containerKey = "powder"; break;
      case TYPE.LIQUID: containerKey = "liquid"; break;
      case TYPE.GAS: containerKey = "gas"; break;
      case TYPE.SOLID: containerKey = "solid"; break;
      default: containerKey = "special";
    }
    
    containers[containerKey].appendChild(btn);
  }
}

// Input handling
let isDrawing = false, isErasing = false;

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (W / rect.width);
  const y = (e.clientY - rect.top) * (H / rect.height);
  return { x: Math.floor(x), y: Math.floor(y) };
}

function paintAt(x, y) {
  for (let dy = -bsz; dy <= bsz; dy++) {
    for (let dx = -bsz; dx <= bsz; dx++) {
      if (dx * dx + dy * dy > bsz * bsz) continue;
      if (rng() > 0.75) continue;
      
      const nx = x + dx, ny = y + dy;
      if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
        const idx = ny * W + nx;
        if (isErasing) {
          grid[idx] = EMPTY;
          tempGrid[idx] = 20;
          ageGrid[idx] = 0;
        } else {
          grid[idx] = curMat;
          tempGrid[idx] = MATS[curMat].temp || 20;
          ageGrid[idx] = 0;
          phGrid[idx] = MATS[curMat].ph || 7.0;
        }
      }
    }
  }
}

function initInput() {
  canvas.addEventListener("pointerdown", e => {
    e.preventDefault();
    try {
      isDrawing = true;
      isErasing = e.button === 2 || e.shiftKey;
      const pos = getPos(e);
      paintAt(pos.x, pos.y);
    } catch (err) {
      console.error("Pointer down error:", err);
    }
  });
  
  window.addEventListener("pointermove", e => {
    if (!isDrawing) return;
    try {
      const pos = getPos(e);
      paintAt(pos.x, pos.y);
    } catch (err) {
      console.error("Pointer move error:", err);
    }
  });
  
  window.addEventListener("pointerup", () => {
    isDrawing = false;
    isErasing = false;
  });
  
  canvas.addEventListener("contextmenu", e => e.preventDefault());
}

        ecosystemActive = !ecosystemActive;
        rainActive = false;
        fireActive = false;
        windActive = false;
        seedBtn.classList.toggle("active", ecosystemActive);
        if (rainBtn) rainBtn.classList.remove("active");
        if (fireBtn) fireBtn.classList.remove("active");
        if (windBtn) windBtn.classList.remove("active");
      } catch (err) {
        console.error("Seed button error:", err);
      }
    };
  }
  
  // Sonnenzyklus-Button Handler
  const sunCycleBtn = document.createElement("button");
  sunCycleBtn.id = "sunCycleBtn";
  sunCycleBtn.textContent = "☀️ Sonnenzyklus";
  sunCycleBtn.style.cssText = "margin-left: 8px; font-size: 11px; padding: 4px 8px;";
  sunCycleBtn.onclick = () => {
    sunCycleEnabled = !sunCycleEnabled;
    sunCycleBtn.textContent = sunCycleEnabled ? "✅ Aktiviert" : "☀️ Sonnenzyklus";
    document.getElementById("sunCycleIndicator").style.display = sunCycleEnabled ? "flex" : "none";
  };
  document.getElementById("seedBtn").parentNode.appendChild(sunCycleBtn);
  
  document.getElementById("toggleUI").onclick = () => {
    const ui = document.getElementById("ui");
    ui.classList.toggle("hidden");
    document.getElementById("toggleUI").textContent = ui.classList.contains("hidden") ? "Anzeigen" : "Ausblenden";
  };
  
  window.addEventListener("keydown", e => {
    const key = e.key.toLowerCase();
    
    if (key === " ") {
      e.preventDefault();
      paused = !paused;
      document.getElementById("pauseBtn").textContent = paused ? "Fortsetzen" : "Pause";
    }
    if (key === "c") {
      grid.fill(EMPTY);
      tempGrid.fill(20);
      ageGrid.fill(0);
      phGrid.fill(7.0);
    }
    if (key === "h") document.getElementById("toggleUI").click();
    
    if (KEY_MAP[key] !== undefined) {
      curMat = KEY_MAP[key];
      buildUI();
    }
  });
}

// Main Loop
function loop(timestamp) {
  requestAnimationFrame(loop);
  
  if (!paused) {
    for (let s = 0; s < spd; s++) {
      simulate();
    }
  }
  
  render();
  
  frameCount++;
  if (timestamp - fpsTimer > 1000) {
    lastFps = frameCount;
    let particleCount = 0;
    for (let i = 0; i < N; i++) {
      if (grid[i] !== EMPTY) particleCount++;
    }
    document.getElementById("st").textContent = `${lastFps} FPS | ${particleCount.toLocaleString()} Partikel`;
    frameCount = 0;
    fpsTimer = timestamp;
  }
}

function init() {
  canvas = document.getElementById("c");
  ctx = canvas.getContext("2d", { alpha: false });
  
  seedRng(12345);
  resize();
  buildUI();
  initInput();
  initUI();
  
  requestAnimationFrame(loop);
}

if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", init);
} else {
  init();
}
</script>
</body>
