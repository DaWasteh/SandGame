<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sand Game Pro · Advanced Simulation v2.0</title>
  <style>
    :root {
          --bg: #0a0a0c;
          --panel: rgba(20, 20, 25, 0.85);
          --accent: #4cc9f0;
          --accent-hover: #3ab0d6;
          --text: #e0e0e0;
          --border: rgba(255, 255, 255, 0.1);
          --sun: #ffd700;
          --moon: #a8c7ff;
        }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      user-select: none;
    }
    canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      background: #000;
      image-rendering: pixelated;
      cursor: crosshair;
      touch-action: none;
      z-index: 1;
    }
    .ui {
      position: fixed;
      left: 20px;
      top: 20px;
      z-index: 10;
      width: 340px;
      max-height: calc(100vh - 40px);
      background: var(--panel);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      overflow-y: auto;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }
    .ui.hidden {
      transform: translateX(-380px);
      opacity: 0;
      pointer-events: none;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .title h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
    .title p { font-size: 11px; color: #888; }
    
    .section-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #666;
      margin: 10px 0 6px 0;
      border-bottom: 1px solid var(--border);
      padding-bottom: 4px;
    }

    .grid-mats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
    }
    button {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 5px 3px;
      border-radius: 6px;
      font-size: 10px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    button:hover { background: rgba(255,255,255,0.1); }
    button.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
      font-weight: 600;
    }

    .control-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 12px;
    }
    input[type="range"] {
      flex: 1;
      margin-left: 10px;
      accent-color: var(--accent);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-top: 10px;
    }
    .actions button { padding: 7px; font-size: 11px; }

    .stats {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 10;
      background: var(--panel);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 11px;
      color: #888;
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
    }

    .kbd-hint {
      margin-top: 12px;
      font-size: 10px;
      color: #555;
      line-height: 1.4;
    }
    .kbd {
      background: #222;
      padding: 1px 4px;
      border-radius: 3px;
      color: #aaa;
    }

    .sun-cycle-indicator {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10;
      background: var(--panel);
      padding: 8px 14px;
      border-radius: 12px;
      font-size: 11px;
      color: #aaa;
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sun-cycle-indicator.day { border-color: var(--sun); }
    .sun-cycle-indicator.night { border-color: var(--moon); }
    .sun-icon { font-size: 16px; }

    .info-panel {
      position: fixed;
      bottom: 20px;
      left: 20px;
      z-index: 10;
      background: var(--panel);
      padding: 8px 14px;
      border-radius: 12px;
      font-size: 11px;
      color: #aaa;
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      max-width: 300px;
      display: none;
    }
    .info-panel.visible { display: block; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<canvas id="c"></canvas>

<div class="ui" id="ui">
  <div class="header">
    <div class="title">
      <h1>Sand Pro v2.0</h1>
      <p>Physik & Chemie Simulation</p>
    </div>
    <button id="toggleUI">Ausblenden</button>
  </div>

  <div class="section-title">Pulver</div>
  <div class="grid-mats" id="matGridPowder"></div>
  <div class="section-title">Flüssigkeiten</div>
  <div class="grid-mats" id="matGridLiquid"></div>
  <div class="section-title">Gase</div>
  <div class="grid-mats" id="matGridGas"></div>
  <div class="section-title">Feststoffe</div>
  <div class="grid-mats" id="matGridSolid"></div>
  <div class="section-title">Spezial</div>
  <div class="grid-mats" id="matGridSpecial"></div>

  <div class="section-title">Einstellungen</div>
  <div class="control-row">
    <label>Grid-Auflösung (Zellen/Breite)</label>
    <input type="range" id="gridR" min="50" max="500" value="200">
  </div>
  <div class="control-row">
    <label>Pinselgröße</label>
    <input type="range" id="brushR" min="1" max="40" value="5">
  </div>
  <div class="control-row">
    <label>Simulations-Ticks/Frames</label>
    <input type="range" id="speedR" min="1" max="15" value="5">
  </div>
  <div class="control-row">
    <label>Photosynthese-Aktivität</label>
    <input type="range" id="photoR" min="0" max="100" value="70">
  </div>
  <div class="control-row">
    <label>Sonnenzyklus (Tag/Nacht + Jahreszeiten)</label>
    <button id="sunCycleToggle" style="width: 110px;">☀️ Aktivieren</button>
  </div>
  <div class="control-row">
    <label>Zyklus-Geschwindigkeit</label>
    <input type="range" id="sunSpeedR" min="1" max="100" value="30">
  </div>
  
  <div id="mappingPanel" style="display:none; margin-top: 10px;">
    <div class="section-title">Farbe → Material Zuordnung</div>
    <div id="mappingList" style="max-height: 200px; overflow-y: auto; font-size: 10px; margin-bottom: 8px;"></div>
    <button id="autoMapBtn" style="width: 100%; margin-bottom: 4px;">Auto-Zuordnung</button>
    <button id="applyMappingBtn" style="width: 100%; margin-bottom: 4px;">Zuordnung anwenden</button>
    <button id="playMappingBtn" style="width: 100%; background: var(--accent); color: #000; font-weight: 600;">▶ Simulation starten</button>
  </div>
  
  <input type="file" id="imgFileInput" accept="image/*" style="display:none;" />
  
  <div class="section-title">Import & Export</div>
  <div class="actions">
    <button id="importImgBtn" style="width: 100%; background: var(--accent); color: #000; font-weight: 600;">📁 Bild importieren</button>
  </div>

  <div class="section-title">Aktionen</div>
  <div class="actions">
    <button id="pauseBtn">Pause</button>
    <button id="clearBtn">Leeren</button>
    <button id="rainBtn">Regen</button>
    <button id="fireBtn">Feuerregen</button>
    <button id="windBtn">Wind</button>
    <button id="seedBtn">Ökosystem</button>
  </div>

  <div class="kbd-hint">
    <span class="kbd">1-9</span> Material | <span class="kbd">Space</span> Pause | <span class="kbd">C</span> Leeren | <span class="kbd">H</span> UI | <span class="kbd">Rechtsklick</span> Radierer
  </div>
</div>

<div class="stats" id="st">0 FPS | 0 Partikel</div>
<div class="info-panel" id="info"></div>
<div class="sun-cycle-indicator" id="sunCycleIndicator" style="display:none;">
  <span class="sun-icon">☀️</span>
  <span id="sunCycleText">Tag</span>
  <span id="sunCycleProgress">(0%)</span>
</div>
<div class="sun-cycle-indicator" id="seasonIndicator" style="display:none;">
  <span class="sun-icon">🌱</span>
  <span id="seasonText">Frühling</span>
</div>

// pH color interpolation helper
function phColor(ph, baseColor) {
  let [r, g, b] = baseColor;
  if (ph < 3) {
    r = Math.min(255, r + (3 - ph) * 30);
    g = Math.max(0, g - (3 - ph) * 40);
  } else if (ph > 11) {
    r = Math.max(0, r - (ph - 11) * 20);
    g = Math.min(255, g + (ph - 11) * 20);
    b = Math.min(255, b + (ph - 11) * 30);
  }
  return [r, g, b];
}

// Seeded RNG
let rngState = 42;
function seedRng(s) { rngState = s || 1; }
function rng() {
  rngState ^= rngState << 13; rngState >>>= 0;
  rngState ^= rngState >>> 17; rngState >>>= 0;
  rngState ^= rngState << 5; rngState >>>= 0;
  return rngState / 4294967296;
}
function rngRange(min, max) { return min + rng() * (max - min); }

/**
 * TYPE CHECKING
 */
const isEmpty = (m) => m === EMPTY;
const isLiquid = (m) => MATS[m]?.type === TYPE.LIQUID;
const isGas = (m) => MATS[m]?.type === TYPE.GAS;
const isPowder = (m) => MATS[m]?.type === TYPE.POWDER;
const isSolid = (m) => MATS[m]?.type === TYPE.SOLID;
const isSpecial = (m) => MATS[m]?.type === TYPE.SPECIAL;
const isPlant = (m) => MATS[m]?.type === TYPE.PLANT;
const isOrganic = (m) => MATS[m]?.type === TYPE.ORGANIC || MATS[m]?.organic;
const isFlammable = (m) => MATS[m]?.flammability > 0;
const isExplosive = (m) => MATS[m]?.explosive;
const isOxidizable = (m) => MATS[m]?.oxidizable;

/**
 * DENSITY & BUOYANCY
 */
function canDisplace(target, source) {
  if (isEmpty(target)) return true;
  const s = MATS[source], t = MATS[target];
  if (!s || !t) return false;
  
  // Same material: don't displace
  if (source === target) return false;
  
  // Explosives can displace anything
  if (isExplosive(source)) return true;
  
  // Powders sink in liquids if denser
  if (isPowder(source) && isLiquid(target)) return s.density > t.density;
  if (isPowder(source) && isGas(target)) return false;
  
  // Liquids sink in less dense liquids
  if (isLiquid(source) && isLiquid(target)) return s.density > t.density;
  
  // Liquids sink in powders if denser
  if (isLiquid(source) && isPowder(target)) return s.density > t.density * 0.5;
  
  // Gases rise above everything
  if (isGas(source) && (isLiquid(target) || isPowder(target) || isSolid(target))) return false;
  
  // Fire rises through everything
  if (source === FIRE) return true;
  
  return false;
}

/**
 * SWAP & MOVE
 */
function swap(x1, y1, x2, y2) {
  if (x2 < 0 || x2 >= W || y2 < 0 || y2 >= H) return false;
  const i1 = y1 * W + x1, i2 = y2 * W + x2;
  
  let tmp;
  tmp = grid[i2]; grid[i2] = grid[i1]; grid[i1] = tmp;
  tmp = tempGrid[i2]; tempGrid[i2] = tempGrid[i1]; tempGrid[i1] = tmp;
  tmp = ageGrid[i2]; ageGrid[i2] = ageGrid[i1]; ageGrid[i1] = tmp;
  tmp = colorSeedGrid[i2]; colorSeedGrid[i2] = colorSeedGrid[i1]; colorSeedGrid[i1] = tmp;
  tmp = phGrid[i2]; phGrid[i2] = phGrid[i1]; phGrid[i1] = tmp;
  tmp = soluteGrid[i2]; soluteGrid[i2] = soluteGrid[i1]; soluteGrid[i1] = tmp;
  tmp = electricalGrid[i2]; electricalGrid[i2] = electricalGrid[i1]; electricalGrid[i1] = tmp;
  tmp = radiationGrid[i2]; radiationGrid[i2] = radiationGrid[i1]; radiationGrid[i1] = tmp;
  
  // === Biologie-Erweiterung: Neue Grids tauschen ===
  tmp = plantTypeGrid[i2]; plantTypeGrid[i2] = plantTypeGrid[i1]; plantTypeGrid[i1] = tmp;
  tmp = plantStageGrid[i2]; plantStageGrid[i2] = plantStageGrid[i1]; plantStageGrid[i1] = tmp;
  tmp = plantHealthGrid[i2]; plantHealthGrid[i2] = plantHealthGrid[i1]; plantHealthGrid[i1] = tmp;
  tmp = plantSapGrid[i2]; plantSapGrid[i2] = plantSapGrid[i1]; plantSapGrid[i1] = tmp;
  tmp = plantWaterGrid[i2]; plantWaterGrid[i2] = plantWaterGrid[i1]; plantWaterGrid[i1] = tmp;
  tmp = plantIdGrid[i2]; plantIdGrid[i2] = plantIdGrid[i1]; plantIdGrid[i1] = tmp;
  // Nährstoffe bleiben am Ort (Boden-Eigenschaft)
  // soilNutrientGrid wird nicht getauscht
  
  return true;
}

function tryMove(x, y, tx, ty, matId) {
  if (tx < 0 || tx >= W || ty < 0 || ty >= H) {
    // Out of bounds: material leaves the simulation
    if (ty >= H && (isGas(matId) || matId === FIRE || matId === STEAM || matId === SMOKE)) return true;
    return false;
  }
  const i1 = y * W + x, i2 = ty * W + tx;
  if (grid[i2] === matId) return false;
  if (grid[i2] !== EMPTY && !canDisplace(grid[i2], matId)) return false;
  swap(x, y, tx, ty);
  return true;
}

/**
 * POWDER PHYSICS - Realistic granular material behavior
 */
function updatePowder(x, y, matId) {
  const i = y * W + x;
  const mat = MATS[matId];
  
  // === WET SAND PHYSICS ===
  if (matId === SAND_WET) {
    // Wet sand is heavier and moves slower
    if (rng() > 0.5) return false; // 50% slowdown
    
    // Wet sand can support slight overhangs (angle of repose)
    // Check if there's support below
    let hasSupport = false;
    if (y + 1 < H) {
      const below = grid[(y + 1) * W + x];
      if (below !== EMPTY && below !== WATER) {
        hasSupport = true;
      }
    }
    
    // Without support, wet sand is stable (like a sandcastle)
    if (!hasSupport && rng() < 0.7) return false;
    
    // Wet sand dries over time
    if (rng() < 0.001) {
      grid[i] = SAND; // Dry out
      return false;
    }
    
    // Normal wet sand movement (slower, more cohesive)
    if (y + 1 < H) {
      if (tryMove(x, y, x, y + 1, matId)) return true;
      // Wet sand doesn't flow diagonally as easily
      if (rng() < 0.3) {
        const dir = rng() < 0.5 ? -1 : 1;
        if (tryMove(x, y, x + dir, y + 1, matId)) return true;
      }
    }
    
    // Wet sand can "flow" sideways when piled up
    if (rng() < 0.1) {
      const dir = rng() < 0.5 ? -1 : 1;
      if (tryMove(x, y, x + dir, y, matId)) return true;
    }
    
    return false;
  }
  
  // Hygroscopic powders absorb moisture
  if (mat.hygroscopic) {
    for (let dy = -2; dy <= 2; dy++) {
      for (let dx = -2; dx <= 2; dx++) {
        const nx = x + dx, ny = y + dy;
        if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
          if (grid[ny * W + nx] === WATER && rng() < 0.01) {
            grid[ny * W + nx] = EMPTY;
            tempGrid[y * W + x] = Math.min(tempGrid[y * W + x] + 20, 100); // Exothermic
          }
        }
      }
    }
  }
  
  // Normal powder movement
  if (y + 1 < H) {
    if (tryMove(x, y, x, y + 1, matId)) return true;
    const dir = rng() < 0.5 ? -1 : 1;
    if (tryMove(x, y, x + dir, y + 1, matId)) return true;
    if (tryMove(x, y, x - dir, y + 1, matId)) return true;
  }
  
  // Capillary action: powders with high capillary value can move upward
  if (mat.capillary > 0.3 && y > 0 && rng() < mat.capillary * 0.02) {
    for (let dy = -1; dy >= -3; dy--) {
      const nx = x + (rng() < 0.5 ? -1 : 1);
      if (nx >= 0 && nx < W && y + dy >= 0 && grid[(y + dy) * W + nx] === WATER) {
        if (tryMove(x, y, nx, y + dy, matId)) return true;
      }
    }
  }
  
  return false;
}

/**
 * LIQUID PHYSICS
 */
function updateLiquid(x, y, matId) {
  const mat = MATS[matId];
  const viscosity = mat.viscosity || 1.0;
  const prob = Math.max(0.1, 1.0 - viscosity * 0.1);
  
  if (rng() > prob) return false; // Viscosity delay
  
  // Extinguish property
  if (mat.extinguish) {
    for (let dy = -1; dy <= 1; dy++) {
      for (let dx = -1; dx <= 1; dx++) {
        const nx = x + dx, ny = y + dy;
        if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
          if (grid[ny * W + nx] === FIRE) {
            grid[ny * W + nx] = STEAM;
            tempGrid[ny * W + nx] = 100;
          }
        }
      }
    }
  }
  
  // Normal liquid movement
  if (y + 1 < H) {
    if (tryMove(x, y, x, y + 1, matId)) return true;
  }
  
  // Flow sideways with preference for spreading
  const dir = rng() < 0.5 ? -1 : 1;
  if (tryMove(x, y, x + dir, y, matId)) return true;
  if (tryMove(x, y, x - dir, y, matId)) return true;
  
  // Diagonal flow
  if (y + 1 < H) {
    if (tryMove(x, y, x + dir, y + 1, matId)) return true;
    if (tryMove(x, y, x - dir, y + 1, matId)) return true;
  }
  
  // Surface tension: liquids tend to stick together
  if (mat.surfaceTension > 0.5 && y + 1 < H && x > 0 && x < W - 1) {
    if (grid[y * W + x - 1] === matId && grid[y * W + x + 1] === matId) {
      // Surrounded horizontally, less likely to flow
      if (rng() > mat.surfaceTension * 0.3) return false;
    }
  }
  
  return false;
}

/**
 * GAS PHYSICS - density-aware, convection, wind
 */
function updateGas(x, y, matId) {
  const mat = MATS[matId];
  const buoyancy = mat.buodyancy ?? mat.buoyancy ?? 0;
  const temp = tempGrid[y * W + x];

  // Convection: hotter gases rise faster
  const heatBoost = temp > 40 ? Math.min(0.4, (temp - 40) / 800) : 0;

  // Density-based behavior:
  // - Light gases (H2, O2): prefer up
  // - Heavy gases (CO2, Cl2): prefer down or stay low
  const isLight = buoyancy < -0.3;
  const isHeavy = buoyancy > 0.3;

  if (isLight || (!isHeavy)) {
    // Primary: rise
    if (y - 1 >= 0) {
      if (tryMove(x, y, x, y - 1, matId)) return true;
      const dir = rng() < 0.5 ? -1 : 1;
      if (tryMove(x, y, x + dir, y - 1, matId)) return true;
      if (tryMove(x, y, x - dir, y - 1, matId)) return true;
    }
    // Extra lift for very light / hot gases
    if ((buoyancy < -0.5 || heatBoost > 0.15) && y - 2 >= 0 && rng() < 0.25 + heatBoost) {
      if (tryMove(x, y, x, y - 2, matId)) return true;
    }
  }

  // Heavy gases: prefer to sink or stay low
  if (isHeavy && y + 1 < H && rng() < 0.35) {
    if (tryMove(x, y, x, y + 1, matId)) return true;
    const dir = rng() < 0.5 ? -1 : 1;
    if (tryMove(x, y, x + dir, y + 1, matId)) return true;
    if (tryMove(x, y, x - dir, y + 1, matId)) return true;
  }

  // Horizontal spread (slightly reduced to avoid chaos)
  const dir = rng() < 0.5 ? -1 : 1;
  if (rng() < 0.6 && tryMove(x, y, x + dir, y, matId)) return true;
  if (rng() < 0.4 && tryMove(x, y, x - dir, y, matId)) return true;

  // Wind effect (stronger on light gases, weaker on heavy)
  if (windActive && x + windDir >= 0 && x + windDir < W) {
    const windStrength = isHeavy ? 0.25 : 0.6;
    if (rng() < windStrength) {
      if (tryMove(x, y, x + windDir, y, matId)) return true;
    }
  }

  return false;
}

/**
 * HELPER: Get sunlight intensity based on sun cycle
 */
function getSunlightIntensity() {
  if (!sunCycleEnabled) return 1.0; // Always full sun when disabled
  return sunIntensity;
}

/**
 * HELPER: Check if there's unobstructed path to sunlight
 */
function hasUnobstructedLight(x, y) {
  let blocked = false;
  let lightFactor = 1.0;
  
  for (let cy = y - 1; cy >= 0; cy--) {
    const cell = grid[cy * W + x];
    if (cell !== EMPTY) {
      if (cell === WATER || cell === STONE || cell === WALL || cell === METAL || cell === GLASS) {
        blocked = true;
        break;
      } else if (isPlant(cell) || cell === SMOKE || cell === STEAM) {
        lightFactor *= 0.7;
      }
    }
  }
  
  return blocked ? 0 : lightFactor;
}

/**
 * PLANT GROWTH SYSTEM - Biologically accurate with roots, stem, leaves, flowers
 */
function updatePlant(x, y, matId) {
  const mat = MATS[matId];
  const i = y * W + x;
  
  // Safety check
  if (!mat) return;
  
  ageGrid[i]++;
  
  // Temperature thresholds - more lenient
  const optimalTempMin = 10, optimalTempMax = 35;
  
  // Heat stress - only die after prolonged exposure
  if (tempGrid[i] > 50) {
    if (ageGrid[i] > 20 && rng() < 0.005) {
      grid[i] = PLANT_DEAD;
      return;
    }
  }
  if (tempGrid[i] > 150) {
    grid[i] = FIRE;
    tempGrid[i] = 600;
    return;
  }
  
  // Frost damage - more lenient
  if (tempGrid[i] < -10) {
    if (ageGrid[i] > 30 && rng() < 0.005) {
      grid[i] = PLANT_DEAD;
      return;
    }
  }
  if (tempGrid[i] < -20) {
    if (rng() < 0.02) {
      grid[i] = PLANT_DEAD;
      return;
    }
  }
  
  // Get sunlight intensity
  const sunlight = getSunlightIntensity();
  const lightFactor = hasUnobstructedLight(x, y);
  const effectiveLight = sunlight * lightFactor;
  
  // === ROOT SYSTEM ===
  if (matId === PLANT_ROOT) {
    // Roots grow downward searching for water
    let waterFound = false;
    let waterDist = 999;
    
    // Search for water below
    for (let dy = 1; dy <= 8; dy++) {
      if (y + dy >= H) break;
      const below = grid[(y + dy) * W + x];
      if (below === WATER || below === SAND_WET) {
        waterFound = true;
        waterDist = dy;
        break;
      }
    }
    
    // Grow toward water - more aggressive
    if (y + 1 < H && grid[(y + 1) * W + x] === EMPTY && rng() < 0.012) {
      grid[(y + 1) * W + x] = PLANT_ROOT;
      ageGrid[(y + 1) * W + x] = 0;
    }
    
    // Branch roots sideways when water is far
    if (!waterFound && waterDist > 5 && rng() < 0.006) {
      const dir = rng() < 0.5 ? -1 : 1;
      if (x + dir >= 0 && x + dir < W && y + 1 < H) {
        if (grid[(y + 1) * W + (x + dir)] === EMPTY && grid[y * W + (x + dir)] === EMPTY) {
          grid[y * W + (x + dir)] = PLANT_ROOT;
          ageGrid[y * W + (x + dir)] = 0;
        }
      }
    }
    
    // Roots absorb water and transport upward to stem
    if (waterFound && rng() < 0.03) {
      for (let dy = 1; dy <= waterDist + 1; dy++) {
        if (y + dy >= H) break;
        const ni = (y + dy) * W + x;
        if (grid[ni] === WATER && rng() < 0.15) {
          grid[ni] = EMPTY;
          break;
        }
      }
    }
    
    // Connect to stem above if exists (water transport)
    if (y > 0 && (grid[(y - 1) * W + x] === PLANT || grid[(y - 1) * W + x] === PLANT_ROOT)) {
      // Keep connection alive
    }
    
    // Roots die if no soil contact and no stem connection
    let inSoil = false;
    for (let dy = 0; dy <= 2; dy++) {
      if (y + dy >= H) break;
      const below = grid[(y + dy) * W + x];
      if (below === DIRT || below === SAND || below === SAND_WET || below === SAND_DARK) {
        inSoil = true;
        break;
      }
    }
    const hasStemAbove = y > 0 && (grid[(y - 1) * W + x] === PLANT || grid[(y - 1) * W + x] === PLANT_ROOT);
    if (!inSoil && !hasStemAbove && ageGrid[i] > 50 && rng() < 0.015) {
      grid[i] = PLANT_DEAD;
    }
    
    return;
  }
  
  // === LEAF SYSTEM ===
  if (matId === PLANT_LEAF) {
    // Leaves perform photosynthesis
    if (effectiveLight > 0.1 && photoActivity > 0) {
      const tempFactor = (tempGrid[i] >= optimalTempMin && tempGrid[i] <= optimalTempMax) ? 1.0 :
                        (tempGrid[i] < optimalTempMin) ? Math.max(0.1, (tempGrid[i] + 10) / 25) :
                        Math.max(0.1, 1 - (tempGrid[i] - 25) / 20);
      
      // Check for CO2 in wider area
      let co2Nearby = false;
      for (let dy = -3; dy <= 3; dy++) {
        for (let dx = -3; dx <= 3; dx++) {
          const nx = x + dx, ny = y + dy;
          if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
            if (grid[ny * W + nx] === CO2) {
              co2Nearby = true;
              // Consume CO2
              if (rng() < 0.03) {
                grid[ny * W + nx] = EMPTY;
              }
            }
          }
        }
      }
      
      // Produce O2 during day, CO2 at night (respiration)
      const photoRate = 0.004 * photoActivity * effectiveLight * tempFactor;
      if (rng() < photoRate) {
        const dir = Math.floor(rng() * 4);
        const dx = [0, 0, -1, 1][dir];
        const dy = [-1, 1, 0, 0][dir];
        const nx = x + dx, ny = y + dy;
        if (nx >= 0 && nx < W && ny >= 0 && ny < H && grid[ny * W + nx] === EMPTY) {
          // Day: produce O2, Night: produce CO2
          if (sunCycleEnabled && !isDaytime) {
            grid[ny * W + nx] = CO2;
          } else {
            grid[ny * W + nx] = OXYGEN;
          }
        }
      }
    }
    
    // Leaves can fall off when dry or old - DEUTLICH VERLANGSAMT
    if (ageGrid[i] > 300 && rng() < 0.0003) {
      grid[i] = PLANT_DEAD;
    }
    
    return;
  }
  
  // === MAIN STEM (PLANT) - BACKWARD COMPATIBILITY, DEUTLICH VERLANGSAMT ===
  if (matId === PLANT) {
    // Check soil contact - more lenient, plants can survive without direct soil contact for a while
    let hasSoilContact = false;
    let hasRootSupport = false;
    for (let dy = 1; dy <= 5; dy++) {
      if (y + dy >= H) break;
      const below = grid[(y + dy) * W + x];
      if (below === DIRT || below === SAND || below === SAND_WET || below === SAND_DARK) {
        hasSoilContact = true;
      }
      if (below === PLANT_ROOT || below === PLANT) {
        hasRootSupport = true;
      }
    }
    
    // Only die if no soil AND no root support after long time
    if (!hasSoilContact && !hasRootSupport && ageGrid[i] > 100 && rng() < 0.002) {
      grid[i] = PLANT_DEAD;
      return;
    }
    
    // Check for water in root zone - more lenient
    let waterAvailable = false;
    let moistureLevel = 0;
    for (let dy = 1; dy <= 8; dy++) {
      if (y + dy >= H) break;
      for (let dx = -3; dx <= 3; dx++) {
        const nx = x + dx, ny = y + dy;
        if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
          const belowMat = grid[ny * W + nx];
          if (belowMat === WATER) {
            waterAvailable = true;
            moistureLevel += 3;
          } else if (belowMat === SAND_WET || belowMat === DIRT) {
            moistureLevel += 1;
          }
        }
      }
    }
    
    // Dry stress - only after prolonged dryness
    if (!waterAvailable && moistureLevel < 2 && ageGrid[i] > 150 && rng() < 0.001) {
      grid[i] = PLANT_DEAD;
      return;
    }
    
    const tempFactor = (tempGrid[i] >= optimalTempMin && tempGrid[i] <= optimalTempMax) ? 1.0 :
                        (tempGrid[i] >= 5 && tempGrid[i] <= 40) ? 0.6 : 0.2;

    // Growth rate - strongly reduced to avoid overgrowth
    const growthRate = 0.00025 * Math.min(1, effectiveLight + 0.3) * tempFactor;

    if (rng() < growthRate && (hasSoilContact || hasRootSupport)) {
      // Grow upward (main stem) - controlled
      if (y > 0 && grid[(y - 1) * W + x] === EMPTY) {
        grid[(y - 1) * W + x] = PLANT;
        ageGrid[(y - 1) * W + x] = 0;

        // Add leaves on sides - very rare
        if (ageGrid[i] > 15 && rng() < 0.02) {
          const dir = rng() < 0.5 ? -1 : 1;
          if (x + dir >= 0 && x + dir < W && grid[y * W + (x + dir)] === EMPTY) {
            grid[y * W + (x + dir)] = PLANT_LEAF;
            ageGrid[y * W + (x + dir)] = 0;
          }
        }

        // Flower at maturity - very rare
        if (ageGrid[i] > 80 && rng() < 0.003) {
          grid[(y - 1) * W + x] = PLANT_FLOWER;
        }
      }
    }

    // Grow roots downward from stem base - very rare
    if (y + 1 < H && grid[(y + 1) * W + x] === EMPTY && ageGrid[i] > 30 && rng() < 0.0015) {
      grid[(y + 1) * W + x] = PLANT_ROOT;
      ageGrid[(y + 1) * W + x] = 0;
    }

    // Side branching - very limited to avoid "bush" effect
    if (ageGrid[i] > 30 && ageGrid[i] % 10 === 0 && rng() < 0.0015) {
      const dir = rng() < 0.5 ? -1 : 1;
      if (x + dir >= 0 && x + dir < W && grid[y * W + (x + dir)] === EMPTY) {
        if (y > 0 && (grid[(y - 1) * W + x] === PLANT || grid[(y - 1) * W + x] === EMPTY)) {
          grid[y * W + (x + dir)] = PLANT;
          ageGrid[y * W + (x + dir)] = Math.max(1, ageGrid[i] - 3);
        }
      }
    }
    
    // Age into dead plant - sehr langsam
    if (ageGrid[i] > 800 && rng() < 0.0003) {
      grid[i] = PLANT_DEAD;
    }
  }
  
  // === FLOWER (PLANT_FLOWER) - DEUTLICH VERLANGSAMT ===
  if (matId === PLANT_FLOWER) {
    // Check support - more lenient
    let supported = false;
    let falling = false;
    if (y + 1 < H) {
      const below = grid[(y + 1) * W + x];
      if (below === DIRT || below === SAND || below === SAND_WET || below === SAND_DARK ||
          below === PLANT || below === PLANT_ROOT || below === PLANT_LEAF || below === PLANT_FLOWER) {
        supported = true;
      } else if (below === EMPTY) {
        falling = true;
      }
    }
    
    // Flowers fall if unsupported, but slowly
    if (falling && y + 1 < H && grid[(y + 1) * W + x] === EMPTY && rng() < 0.03) {
      swap(x, y, x, y + 1);
      return;
    }
    
    // Produce seeds - DEUTLICH VERLANGSAMT
    if (ageGrid[i] > 30 && rng() < 0.003) { // 0.025 -> 0.003
      const windEffect = windActive ? windDir * 2 : 0;
      let seedProduced = false;
      
      // Try fewer directions
      for (let attempt = 0; attempt < 3 && !seedProduced; attempt++) {
        const angle = rng() * Math.PI * 2;
        const dist = 1 + Math.floor(rng() * 2); // Kürzere Distanz
        const sx = Math.floor(x + Math.cos(angle) * dist + windEffect);
        const sy = Math.floor(y + Math.sin(angle) * dist + (rng() < 0.5 ? 1 : -1));
        
        if (sx >= 0 && sx < W && sy >= 0 && sy < H && grid[sy * W + sx] === EMPTY) {
          // Check if landing on suitable ground
          if (sy + 1 < H) {
            const ground = grid[(sy + 1) * W + sx];
            if (ground === DIRT || ground === SAND || ground === SAND_WET || ground === SAND_DARK) {
              // 70% same type, 20% flower, 10% spore
              const seedType = rng();
              if (seedType < 0.7) {
                grid[sy * W + sx] = PLANT;
              } else if (seedType < 0.9) {
                grid[sy * W + sx] = PLANT_FLOWER;
              } else {
                grid[sy * W + sx] = SPORE;
              }
              ageGrid[sy * W + sx] = 0;
              seedProduced = true;
            }
          }
        }
      }
    }
    
    // Age - sehr langsam
    if (ageGrid[i] > 600 && rng() < 0.0003) {
      grid[i] = PLANT_DEAD;
    }
  }
  
  // === DEAD PLANT === - DEUTLICH VERLANGSAMT
  if (matId === PLANT_DEAD) {
    // Dead plants slowly decompose (handled by bacteria/mold)
    if (ageGrid[i] > 500 && rng() < 0.0003) { // 0.002 -> 0.0003
      grid[i] = DIRT;
    }
  }
}

/**
  * SPORE & MOLD SYSTEM - Biologisch korrekte Sporen-Physiologie
  * Sporen sind Pilz-Sporen, die bei Feuchtigkeit zu Schimmel keimen
  */
  function updateSpore(x, y, matId) {
    const i = y * W + x;
    ageGrid[i]++;
    
    // === FEUCHTIGKEITS-DETEKTION ===
    // Sporen benötigen Feuchtigkeit zum Keimen
    let humidityLevel = 0;
    for (let dy = -3; dy <= 3; dy++) {
      for (let dx = -3; dx <= 3; dx++) {
        const nx = x + dx, ny = y + dy;
        if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
          const ni = ny * W + nx;
          if (grid[ni] === WATER) humidityLevel += 3;
          if (grid[ni] === STEAM) humidityLevel += 1;
          if (grid[ni] === SAND_WET) humidityLevel += 2;
        }
      }
    }
    
    // === SPOREN-BEWEGUNG ===
    // Sporen sind leicht und steigen auf (wie real airborne Sporen)
    // But also drift randomly
    if (y - 1 >= 0 && rng() < 0.15) {
      if (tryMove(x, y, x, y - 1, matId)) return;
      const dir = rng() < 0.5 ? -1 : 1;
      if (tryMove(x, y, x + dir, y - 1, matId)) return;
      if (tryMove(x, y, x - dir, y - 1, matId)) return;
    }
    
    // Seitliche Drift (Wind-Effekt) - more frequent
    if (rng() < 0.1) {
      const dir = rng() < 0.5 ? -1 : 1;
      if (tryMove(x, y, x + dir, y, matId)) return;
      if (tryMove(x, y, x - dir, y, matId)) return;
    }
    
    // Bei hoher Feuchtigkeit werden Sporen schwerer und sinken
    if (humidityLevel >= 3 && y + 1 < H && rng() < 0.1) {
      if (tryMove(x, y, x, y + 1, matId)) return;
      const dir = rng() < 0.5 ? -1 : 1;
      if (tryMove(x, y, x + dir, y + 1, matId)) return;
      if (tryMove(x, y, x - dir, y + 1, matId)) return;
    }
    
    // === KEIMUNG ===
    // Sporen keimen zu Schimmel bei Feuchtigkeit + organischem Substrat
    // Lower threshold for germination
    if (ageGrid[i] > 2 && humidityLevel >= 2) {
      let nearOrganic = false;
      let organicPos = null;
      
      // Nach organischem Material suchen
      for (let dy = -2; dy <= 2 && !nearOrganic; dy++) {
        for (let dx = -2; dx <= 2 && !nearOrganic; dx++) {
          const nx = x + dx, ny = y + dy;
          if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
            const ni = ny * W + nx;
            const nMat = grid[ni];
            if (nMat === DIRT || nMat === PLANT_DEAD || nMat === MOLD || nMat === MYCELIUM || isOrganic(nMat)) {
              nearOrganic = true;
              organicPos = {x: nx, y: ny};
            }
          }
        }
      }
      
      // Keimung zu Schimmel - faster and more reliable
      const germinationRate = Math.min(0.15, 0.03 * humidityLevel);
      if (nearOrganic && rng() < germinationRate) {
        // Schimmel wächst auf dem organischen Material
        if (organicPos && grid[organicPos.y * W + organicPos.x] !== MOLD && grid[organicPos.y * W + organicPos.x] !== MYCELIUM) {
          grid[organicPos.y * W + organicPos.x] = MOLD;
          ageGrid[organicPos.y * W + organicPos.x] = 0;
        }
        grid[i] = MOLD;
        ageGrid[i] = 0;
        return;
      }
    }
    
    // Sporen absorbieren Feuchtigkeit (werden schwerer) - less aggressive
    if (humidityLevel >= 2 && rng() < 0.005) {
      for (let dy = -1; dy <= 1; dy++) {
        for (let dx = -1; dx <= 1; dx++) {
          const nx = x + dx, ny = y + dy;
          if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
            const ni = ny * W + nx;
            if (grid[ni] === WATER && rng() < 0.1) {
              grid[ni] = EMPTY; // Wasser absorbiert
              humidityLevel = Math.max(0, humidityLevel - 1);
              break;
            }
          }
        }
      }
    }
    
    // === SPOREN-ALTERUNG ===
    // Sporen überleben länger bei Feuchtigkeit
    const maxAge = humidityLevel >= 3 ? 600 : (humidityLevel >= 1 ? 300 : 100);
    if (ageGrid[i] > maxAge && rng() < 0.002) {
      grid[i] = EMPTY;
    }
  }

/**
  * MYCELIUM SYSTEM - Pilz-Myzel bildet unterirdische Netzwerke
  * Myzel wächst im Boden, sucht nach Nährstoffen und produziert Knospen (Pilze) an der Oberfläche
  */
  function updateMycelium(x, y, matId) {
    const i = y * W + x;
    ageGrid[i]++;
    
    // Myzel wächst im Boden (DIRT, SAND_WET)
    let inSoil = false;
    for (let dy = -1; dy <= 1; dy++) {
      for (let dx = -1; dx <= 1; dx++) {
        const nx = x + dx, ny = y + dy;
        if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
          const ni = ny * W + nx;
          if (grid[ni] === DIRT || grid[ni] === SAND_WET || grid[ni] === SAND_DARK) {
            inSoil = true;
            break;
          }
        }
      }
      if (inSoil) break;
    }
    
    if (!inSoil && ageGrid[i] > 50 && rng() < 0.01) {
      grid[i] = EMPTY;
      return;
    }
    
    // Feuchtigkeit detektieren
    let moistureLevel = 0;
    for (let dy = -2; dy <= 2; dy++) {
      for (let dx = -2; dx <= 2; dx++) {
        const nx = x + dx, ny = y + dy;
        if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
          const ni = ny * W + nx;
          if (grid[ni] === WATER) moistureLevel += 3;
          if (grid[ni] === STEAM) moistureLevel += 1;
          if (grid[ni] === SAND_WET) moistureLevel += 2;
        }
      }
    }
    
    // Nährstoffe detektieren (organische Materie)
    let nutrientsLevel = 0;
    const neighbors = [i-1, i+1, i-W, i+W, i-W-1, i-W+1, i+W-1, i+W+1];
    for (const ni of neighbors) {
      if (ni >= 0 && ni < N) {
        const nMat = grid[ni];
        if (isOrganic(nMat) || nMat === PLANT_DEAD || nMat === MOLD) {
          nutrientsLevel += 1;
        }
      }
    }
    
    // Myzel breitet sich im Boden aus (langsamer, kontrolliert)
    if (moistureLevel >= 2 && nutrientsLevel >= 1 && rng() < 0.004) {
      const dx = Math.floor(rng() * 3) - 1;
      const dy = Math.floor(rng() * 3) - 1;
      const nx = x + dx, ny = y + dy;
      if (nx >= 0 && nx < W && ny >= 0 && ny < H && grid[ny * W + nx] === EMPTY) {
        // Nur ausbreiten wenn Boden in der Nähe
        let nearSoil = false;
        for (let sd = -1; sd <= 1; sd++) {
          for (let sdx = -1; sdx <= 1; sdx++) {
            const snx = nx + sdx, sny = ny + sd;
            if (snx >= 0 && snx < W && sny >= 0 && sny < H) {
              if (grid[sny * W + snx] === DIRT || grid[sny * W + snx] === SAND_WET) {
                nearSoil = true;
                break;
              }
            }
          }
          if (nearSoil) break;
        }
        if (nearSoil) {
          grid[ny * W + nx] = MYCELIUM;
          ageGrid[ny * W + nx] = 0;
        }
      }
    }
    
    // Myzel zersetzt organische Materie (sehr langsam)
    if (moistureLevel >= 2 && nutrientsLevel >= 1 && rng() < 0.003) {
      for (const ni of neighbors) {
        if (ni >= 0 && ni < N) {
          const nMat = grid[ni];
          if ((isOrganic(nMat) || nMat === PLANT_DEAD) && nMat !== MYCELIUM && rng() < 0.01) {
            grid[ni] = DIRT; // Zu Kompost/Erde
          }
        }
      }
    }
    
    // Knospen bilden an der Oberfläche (wenn Myzel nahe Oberfläche)
    if (y < H * 0.3 && moistureLevel >= 3 && nutrientsLevel >= 2 && rng() < 0.002) {
      // Pilz-Knospe wächst nach oben
      if (y > 0 && grid[(y - 1) * W + x] === EMPTY) {
        grid[(y - 1) * W + x] = MOLD; // Oberfläche-Pilz
        ageGrid[(y - 1) * W + x] = 0;
      }
    }
    
    // Myzel altert sehr langsam
    if (ageGrid[i] > 500 && rng() < 0.001) {
      grid[i] = DIRT;
    }
  }

/**
  * MOLD GROWTH - Pilz-Knospen an der Oberfläche
  * Diese wachsen aus Myzel und produzieren Sporen
  */
  function updateMold(x, y, matId) {
    const i = y * W + x;
    ageGrid[i]++;
    
    // Feuchtigkeit detektieren
    let moistureLevel = 0;
    for (let dy = -2; dy <= 2; dy++) {
      for (let dx = -2; dx <= 2; dx++) {
        const nx = x + dx, ny = y + dy;
        if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
          const ni = ny * W + nx;
          if (grid[ni] === WATER) moistureLevel += 3;
          if (grid[ni] === STEAM) moistureLevel += 1.5;
          if (grid[ni] === SAND_WET) moistureLevel += 2;
        }
      }
    }
    
    // Organisches Substrat - mehr Optionen
    let hasOrganicSubstrate = false;
    const neighbors = [i-1, i+1, i-W, i+W, i-W-1, i-W+1, i+W-1, i+W+1];
    for (const ni of neighbors) {
      if (ni >= 0 && ni < N) {
        const nMat = grid[ni];
        if (isOrganic(nMat) || nMat === PLANT_DEAD || nMat === DIRT || nMat === MYCELIUM || nMat === WOOD || nMat === BACTERIA) {
          hasOrganicSubstrate = true;
          break;
        }
      }
    }
    
    // Schimmel kann auch ohne Substrat überleben (ruht), stirbt aber langsam
    if (!hasOrganicSubstrate && ageGrid[i] > 100 && rng() < 0.005) {
      grid[i] = ASH;
      return;
    }
    
    // Temperatur - mehr tolerant
    if (tempGrid[i] > 60) {
      if (ageGrid[i] > 50 && rng() < 0.01) {
        grid[i] = ASH;
        return;
      }
    }
    if (tempGrid[i] < -10) {
      if (ageGrid[i] > 100 && rng() < 0.005) {
        grid[i] = ASH;
        return;
      }
    }
    
    // Zersetzung (sehr langsam)
    if (moistureLevel >= 2 && hasOrganicSubstrate) {
      const decomposeChance = 0.001 + moistureLevel * 0.0005;
      for (const ni of neighbors) {
        if (ni >= 0 && ni < N) {
          const nMat = grid[ni];
          if ((isOrganic(nMat) || nMat === PLANT_DEAD) && nMat !== MOLD && rng() < decomposeChance) {
            if (rng() < 0.3) {
              grid[ni] = BACTERIA;
            } else {
              grid[ni] = DIRT;
            }
          }
        }
      }
    }
    
    // Ausbreitung (langsam)
    if (moistureLevel >= 3 && rng() < 0.015) {
      const dx = Math.floor(rng() * 3) - 1;
      const dy = Math.floor(rng() * 3) - 1;
      const nx = x + dx, ny = y + dy;
      if (nx >= 0 && nx < W && ny >= 0 && ny < H && grid[ny * W + nx] === EMPTY) {
        let nearOrganic = false;
        for (let od = -2; od <= 2; od++) {
          for (let odx = -2; odx <= 2; odx++) {
            const onx = nx + odx, ony = ny + od;
            if (onx >= 0 && onx < W && ony >= 0 && ony < H) {
              if (isOrganic(grid[ony * W + onx]) || grid[ony * W + onx] === PLANT_DEAD || grid[ony * W + onx] === DIRT || grid[ony * W + onx] === MYCELIUM) {
                nearOrganic = true;
                break;
              }
            }
          }
          if (nearOrganic) break;
        }
        if (nearOrganic) {
          grid[ny * W + nx] = MOLD;
          ageGrid[ny * W + nx] = 0;
        }
      }
    }
    
    // Sporen-Produktion - häufiger
    if (ageGrid[i] > 20 && moistureLevel >= 1) {
      const sporeRate = Math.min(0.2, 0.02 + moistureLevel * 0.008);
      if (rng() < sporeRate) {
        if (y > 0 && grid[(y - 1) * W + x] === EMPTY) {
          grid[(y - 1) * W + x] = SPORE;
          ageGrid[(y - 1) * W + x] = 0;
        }
      }
    }
    
    // Alterung - viel langsamer, Schimmel kann lange überleben
    if (moistureLevel === 0 && ageGrid[i] > 200 && rng() < 0.005) {
      grid[i] = ASH;
      return;
    }
    
    if (ageGrid[i] > 500 && rng() < 0.001) {
      grid[i] = DIRT;
    }
  }

/**
 * BACTERIA SYSTEM - Langsame Zersetzung organischer Materie
 * Bakterien sind Mikroben die organische Stoffe zu Kompost/Erde verarbeiten
 */
function updateBacteria(x, y, matId) {
  const i = y * W + x;
  ageGrid[i]++;
  
  // Feuchtigkeit
  let moistureLevel = 0;
  for (let dy = -2; dy <= 2; dy++) {
    for (let dx = -2; dx <= 2; dx++) {
      const nx = x + dx, ny = y + dy;
      if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
        const ni = ny * W + nx;
        if (grid[ni] === WATER) moistureLevel += 2;
        if (grid[ni] === STEAM) moistureLevel += 0.5;
        if (grid[ni] === SAND_WET) moistureLevel += 1;
      }
    }
  }
  
  // Ohne Feuchtigkeit: Bakterien werden inaktiv (sterben nicht sofort)
  if (moistureLevel === 0) {
    if (ageGrid[i] > 100 && rng() < 0.005) {
      grid[i] = DIRT; // Trocknen ein, werden zu Erde
      return;
    }
    return; // Inaktiv ohne Wasser
  }
  
  // Temperatur
  if (tempGrid[i] > 70) {
    grid[i] = DIRT; // Absterben bei Hitze
    return;
  }
  if (tempGrid[i] < -10) {
    if (ageGrid[i] > 150 && rng() < 0.005) {
      grid[i] = DIRT;
      return;
    }
    return; // Inaktiv bei Frost
  }
  
  // === LANGSAME ZERSETZUNG ===
  const neighbors = [i-1, i+1, i-W, i+W, i-W-1, i-W+1, i+W-1, i+W+1];
  
  for (const ni of neighbors) {
    if (ni >= 0 && ni < N) {
      const nMat = grid[ni];
      
      // Organische Materie zersetzen (sehr langsam!)
      if ((isOrganic(nMat) || nMat === PLANT_DEAD) && nMat !== BACTERIA && moistureLevel >= 1) {
        const decomposeRate = 0.0005 + moistureLevel * 0.0003;
        if (rng() < decomposeRate) {
          // Schrittweise Zersetzung: erst zu Schimmel/Myzel, dann zu Erde
          if (rng() < 0.4) {
            grid[ni] = MOLD;
          } else if (rng() < 0.7) {
            grid[ni] = MYCELIUM;
          } else {
            grid[ni] = DIRT; // Direkt zu Kompost
          }
        }
      }
      
      // Myzel und Schimmel können auch zersetzt werden
      if ((nMat === MOLD || nMat === MYCELIUM) && moistureLevel >= 1) {
        if (rng() < 0.002) {
          grid[ni] = DIRT;
        }
      }
    }
  }
  
  // Reproduktion (sehr langsam, nur bei Nahrung und Feuchtigkeit)
  if (moistureLevel >= 2 && rng() < 0.0015) {
    const dx = Math.floor(rng() * 3) - 1;
    const dy = Math.floor(rng() * 3) - 1;
    const nx = x + dx, ny = y + dy;
    if (nx >= 0 && nx < W && ny >= 0 && ny < H && grid[ny * W + nx] === EMPTY) {
      grid[ny * W + nx] = BACTERIA;
      ageGrid[ny * W + nx] = 0;
    }
  }
  
  // Alterung - Bakterien werden zu Erde (Nährstoffkreislauf)
  if (ageGrid[i] > 200 && rng() < 0.002) {
    grid[i] = DIRT;
  }
}

/**
 * === BIOLOGIE-ERWEITERUNG: Erweitertes Pflanzenwachstumssystem ===
 * Mit Wachstumsstadien, Säftedynamik, Bestäubung und Saison-Effekten
 */

// Hilfsfunktion: Saison-Ermittlung
function getCurrentSeason() {
  if (!sunCycleEnabled) return 1; // Immer Sommer ohne Zyklus
  return Math.floor(season % 4);
}

// Hilfsfunktion: Saison-Faktor für Wachstumsbeeinflussung
function getSeasonGrowthFactor() {
  const s = getCurrentSeason();
  if (s === 0) return 1.0; // Frühling: gutes Wachstum
  if (s === 1) return 1.2; // Sommer: maximales Wachstum
  if (s === 2) return 0.5; // Herbst: langsames Wachstum
  return 0.1; // Winter: kaum Wachstum
}

// Hilfsfunktion: Herbst-Färbung für Blätter
function getAutumnColorFactor() {
  const s = getCurrentSeason();
  if (s === 2) return seasonProgress; // Herbst: immer mehr Färbung
  if (s === 3) return 1.0; // Winter: vollständig gefärbt
  return 0; // Kein Herbst
}

// Hilfsfunktion: Pflanzengesundheit berechnen
function calculatePlantHealth(x, y, i) {
  let health = 50;
  const temp = tempGrid[i];
  
  // Temperatur-Einfluss
  if (temp >= 15 && temp <= 35) {
    health += 25; // Optimal
  } else if (temp >= 5 && temp <= 45) {
    health += 10; // Akzeptabel
  } else if (temp < -5 || temp > 50) {
    health -= 20; // Stress
  }
  
  // Saison-Einfluss
  health += getSeasonGrowthFactor() * 10 - 10;
  
  // Wasser-Einfluss
  const water = plantWaterGrid[i] || 0;
  if (water >= 30) {
    health += 20;
  } else if (water >= 10) {
    health += 10;
  } else {
    health -= 15;
  }
  
  // Licht-Einfluss
  const sunlight = getSunlightIntensity();
  const lightFactor = hasUnobstructedLight(x, y);
  if (sunlight * lightFactor > 0.3) {
    health += 15;
  }
  
  return Math.max(0, Math.min(100, health));
}

// Hilfsfunktion: Saft-Transport (Wasser von Wurzeln nach oben)
function updateSapTransport(x, y, i) {
  // Suche nach Wurzeln unterhalb
  let waterFound = false;
  let waterDist = 999;
  for (let dy = 1; dy <= 6; dy++) {
    if (y + dy >= H) break;
    const below = grid[(y + dy) * W + x];
    if (below === ROOT_SYSTEM || below === PLANT_ROOT) {
      waterFound = true;
      waterDist = dy;
      break;
    }
    // Suche nach Wasser
    if (below === WATER || below === SAND_WET) {
      waterFound = true;
      waterDist = dy + 2;
      break;
    }
  }
  
  // Saft-Stand aktualisieren
  const sapLevel = waterFound ? Math.max(plantSapGrid[i] + 5, 70) : Math.max(0, plantSapGrid[i] - 3);
  plantSapGrid[i] = sapLevel;
  
  // Wenn Wurzeln gefunden, Wasser aus dem Boden entfernen
  if (waterFound && waterDist < 999 && rng() < 0.02) {
    for (let dy = 1; dy <= waterDist; dy++) {
      if (y + dy >= H) break;
      const ni = (y + dy) * W + x;
      if (grid[ni] === WATER) {
        grid[ni] = DIRT; // Wasser wird absorbiert
        soilNutrientGrid[ni] = Math.min(100, soilNutrientGrid[ni] + 2);
        break;
      } else if (grid[ni] === SAND_WET) {
        grid[ni] = SAND;
        break;
      }
    }
  }
  
  return sapLevel;
}

// Hilfsfunktion: Nährstoffe aus dem Boden aufnehmen
function absorbSoilNutrients(x, y, i) {
  // Suche nach Erde unterhalb
  for (let dy = 1; dy <= 4; dy++) {
    if (y + dy >= H) break;
    const ni = (y + dy) * W + x;
    if (grid[ni] === DIRT && soilNutrientGrid[ni] > 10) {
      const absorbed = Math.min(5, soilNutrientGrid[ni]);
      soilNutrientGrid[ni] -= absorbed;
      plantSapGrid[i] = Math.min(100, plantSapGrid[i] + absorbed * 0.5);
      return absorbed;
    }
  }
  return 0;
}

// === ÜBERARBEITES PFLANZEN-WACHSTUM ===
// Langsamer, strukturierter Wachstum mit klarem Haupttrieb und Blättern

// Hilfsfunktion: Prüfe ob eine Pflanze zu einer Gruppe gehört
function getPlantGroupId(i) {
  return plantIdGrid[i] || 0;
}

// countPlantBlocks entfernt (zu teuer) – stattdessen lokale Checks nutzen.

// --- updatePlantSeed(): Samen-System ---
function updatePlantSeed(x, y, matId) {
  const i = y * W + x;
  ageGrid[i]++;
  
  // Samen braucht Feuchtigkeit zum Keimen
  let moistureLevel = 0;
  for (let dy = -2; dy <= 2; dy++) {
    for (let dx = -2; dx <= 2; dx++) {
      const nx = x + dx, ny = y + dy;
      if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
        const ni = ny * W + nx;
        if (grid[ni] === WATER) moistureLevel += 3;
        if (grid[ni] === SAND_WET || grid[ni] === DIRT) moistureLevel += 1;
      }
    }
  }
  
  // Samen braucht Erde/Sand darunter
  let onSuitableGround = false;
  if (y + 1 < H) {
    const below = grid[(y + 1) * W + x];
    onSuitableGround = (below === DIRT || below === SAND_WET || below === SAND || below === SAND_DARK);
  }
  
  // Keimung: Samen wird zum Keimling (sehr langsam, braucht mehrere Bedingungen)
  if (onSuitableGround && moistureLevel >= 2) {
    const germinationChance = 0.003 * getSeasonGrowthFactor(); // DEUTLICHER VERLANGSAMT
    const temp = tempGrid[i];
    if (temp >= 10 && temp <= 30 && ageGrid[i] > 10 && rng() < germinationChance) {
      grid[i] = PLANT_SPROUT;
      plantTypeGrid[i] = rng() < 0.5 ? 1 : 2; // Blume oder Gras
      plantStageGrid[i] = 1;
      plantHealthGrid[i] = 60;
      plantIdGrid[i] = nextPlantId++;
      ageGrid[i] = 0;
      return;
    }
  }
  
  // Samen verdirbt bei Stauwasser (sehr langsam)
  if (moistureLevel >= 6 && ageGrid[i] > 100 && rng() < 0.005) {
    grid[i] = DIRT;
    return;
  }
  
  // Samen altert sehr langsam
  if (ageGrid[i] > 1000 && rng() < 0.001) {
    grid[i] = DIRT;
  }
}

// --- updatePlantSprout(): Keimling-System ---
function updatePlantSprout(x, y, matId) {
  const i = y * W + x;
  ageGrid[i]++;
  
  // Gesundheit berechnen
  plantHealthGrid[i] = calculatePlantHealth(x, y, i);
  
  // Saft transportieren
  updateSapTransport(x, y, i);
  
  // Wenn Gesundheit zu niedrig, stirbt der Keimling (sehr langsam)
  if (plantHealthGrid[i] < 15 && ageGrid[i] > 50 && rng() < 0.005) {
    grid[i] = PLANT_DEAD;
    plantHealthGrid[i] = 0;
    return;
  }
  
  // Wurzeln bilden (sehr langsam, nur 1 Wurzel)
  if (y + 1 < H && grid[(y + 1) * W + x] === EMPTY && ageGrid[i] > 15 && rng() < 0.005) {
    grid[(y + 1) * W + x] = ROOT_SYSTEM;
    plantTypeGrid[(y + 1) * W + x] = plantTypeGrid[i];
    plantStageGrid[(y + 1) * W + x] = 2;
    plantHealthGrid[(y + 1) * W + x] = plantHealthGrid[i];
    plantIdGrid[(y + 1) * W + x] = plantIdGrid[i];
    ageGrid[(y + 1) * W + x] = 0;
  }
  
  // Wächst NACH OBEN zum Haupttrieb (sehr kontrolliert)
  const healthFactor = plantHealthGrid[i] / 100;
  const light = hasUnobstructedLight(x, y);
  // DEUTLICHER VERLANGSAMT: 0.005 statt 0.04
  const growChance = healthFactor * 0.005 * (1 + light * 0.3) * getSeasonGrowthFactor();
  
  if (y > 0 && grid[(y - 1) * W + x] === EMPTY && rng() < growChance) {
    grid[(y - 1) * W + x] = PLANT_STEM;
    plantTypeGrid[(y - 1) * W + x] = plantTypeGrid[i];
    plantStageGrid[(y - 1) * W + x] = 2;
    plantHealthGrid[(y - 1) * W + x] = plantHealthGrid[i];
    plantIdGrid[(y - 1) * W + x] = plantIdGrid[i];
    ageGrid[(y - 1) * W + x] = 0;
  }
  
  // Seitliche Blätter (nur alle 5-8 Ticks, nur 1 Blatt)
  if (ageGrid[i] > 10 && ageGrid[i] % 6 === 0 && rng() < 0.008 * getSeasonGrowthFactor()) {
    const dir = rng() < 0.5 ? -1 : 1;
    if (x + dir >= 0 && x + dir < W && grid[y * W + (x + dir)] === EMPTY) {
      grid[y * W + (x + dir)] = LEAF_OAK;
      plantTypeGrid[y * W + (x + dir)] = plantTypeGrid[i];
      plantHealthGrid[y * W + (x + dir)] = plantHealthGrid[i];
      plantIdGrid[y * W + (x + dir)] = plantIdGrid[i];
      ageGrid[y * W + (x + dir)] = 0;
    }
  }
  
  // Alterung: Wächst zum erwachsenen Stamm (sehr langsam)
  if (ageGrid[i] > 120 && rng() < 0.008) {
    grid[i] = PLANT_STEM;
    plantStageGrid[i] = 2;
    ageGrid[i] = 0;
  }
}

// --- updatePlantStem(): Stamm-System (Haupttrieb) ---
function updatePlantStem(x, y, matId) {
  const i = y * W + x;
  ageGrid[i]++;
  
  // Gesundheit und Saft aktualisieren (nur alle 5 Ticks)
  if (tick % 5 === 0) {
    plantHealthGrid[i] = calculatePlantHealth(x, y, i);
  }
  updateSapTransport(x, y, i);
  absorbSoilNutrients(x, y, i);
  
  // Nach oben wachsen (Haupttrieb - sehr langsam)
  const growthRate = 0.0012 * (plantHealthGrid[i] / 100) * (1 + getSunlightIntensity() * 0.3) * getSeasonGrowthFactor();
  if (plantStageGrid[i] < 3 && plantHealthGrid[i] > 25) {
    if (y > 0 && grid[(y - 1) * W + x] === EMPTY && rng() < growthRate) {
      grid[(y - 1) * W + x] = PLANT_STEM;
      plantTypeGrid[(y - 1) * W + x] = plantTypeGrid[i];
      plantStageGrid[(y - 1) * W + x] = plantStageGrid[i];
      plantHealthGrid[(y - 1) * W + x] = plantHealthGrid[i];
      plantIdGrid[(y - 1) * W + x] = plantIdGrid[i];
      ageGrid[(y - 1) * W + x] = 0;
    }
  }
  
  // Blätter bilden seitlich (sehr kontrolliert, alle 10-14 Ticks)
  if (ageGrid[i] > 20 && ageGrid[i] % 10 === 0 && rng() < 0.003 * getSeasonGrowthFactor()) {
    // Nur 1 Blatt pro Tick, abwechselnd links/rechts
    const dir = (ageGrid[i] / 8 % 2 === 0) ? -1 : 1;
    if (x + dir >= 0 && x + dir < W && grid[y * W + (x + dir)] === EMPTY) {
      grid[y * W + (x + dir)] = LEAF_OAK;
      plantTypeGrid[y * W + (x + dir)] = plantTypeGrid[i];
      plantHealthGrid[y * W + (x + dir)] = plantHealthGrid[i];
      plantIdGrid[y * W + (x + dir)] = plantIdGrid[i];
      ageGrid[y * W + (x + dir)] = 0;
    }
  }
  
  // KEINE Wurzeln nach unten vom Stamm - das war zu viel
  // Wurzelbildung nur vom Keimling
  
  // Wird zur erwachsenen Pflanze (sehr langsam)
  if (ageGrid[i] > 80 && plantStageGrid[i] < 3 && rng() < 0.008) {
    grid[i] = PLANT_MATURE;
    plantStageGrid[i] = 3;
    ageGrid[i] = 0;
  }
  
  // Alterung (sehr langsam)
  if (ageGrid[i] > 500 && rng() < 0.001) {
    plantStageGrid[i] = 5; // Alt
  }
}

// --- updatePlantMature(): Erwachsen-Pflanze (kein seitliches Wuchern mehr!) ---
function updatePlantMature(x, y, matId) {
  const i = y * W + x;
  ageGrid[i]++;
  
  // Gesundheit und Saft aktualisieren (nur alle 5 Ticks)
  if (tick % 5 === 0) {
    plantHealthGrid[i] = calculatePlantHealth(x, y, i);
  }
  updateSapTransport(x, y, i);
  absorbSoilNutrients(x, y, i);
  
  // KEIN seitliches Wachsen mehr! Nur noch Blüte oben
  
  // Kann BLÜTEN bilden (am Haupttrieb, sehr kontrolliert)
  if (plantHealthGrid[i] > 35 && ageGrid[i] > 60 && rng() < 0.001 * getSeasonGrowthFactor()) {
    // Nur wenn oben frei ist
    if (y > 0 && grid[(y - 1) * W + x] === EMPTY) {
      const flowerType = rng();
      let flowerMat;
      if (flowerType < 0.4) {
        flowerMat = FLOWER_DANDELION;
      } else if (flowerType < 0.7) {
        flowerMat = FLOWER_TULIP;
      } else {
        flowerMat = FLOWER_POPPY;
      }
      grid[(y - 1) * W + x] = flowerMat;
      plantTypeGrid[(y - 1) * W + x] = plantTypeGrid[i];
      plantStageGrid[(y - 1) * W + x] = 4;
      plantHealthGrid[(y - 1) * W + x] = plantHealthGrid[i];
      plantIdGrid[(y - 1) * W + x] = plantIdGrid[i];
      ageGrid[(y - 1) * W + x] = 0;
    }
  }
  
  // KEIN weiteres Wachstum nach oben als PLANT_MATURE
  // Die Pflanze bleibt in der Größe
  
  // KEINE seitlichen Äste mehr!
  
  // Ab und zu noch Blätter am Stamm (sehr selten)
  if (ageGrid[i] > 30 && rng() < 0.001 * getSeasonGrowthFactor()) {
    const dir = rng() < 0.5 ? -1 : 1;
    if (x + dir >= 0 && x + dir < W && grid[y * W + (x + dir)] === EMPTY) {
      grid[y * W + (x + dir)] = LEAF_OAK;
      plantTypeGrid[y * W + (x + dir)] = plantTypeGrid[i];
      plantHealthGrid[y * W + (x + dir)] = plantHealthGrid[i];
      plantIdGrid[y * W + (x + dir)] = plantIdGrid[i];
      ageGrid[y * W + (x + dir)] = 0;
    }
  }
  
  // Herbst-Färbung
  const autumnFactor = getAutumnColorFactor();
  if (autumnFactor > 0.5 && rng() < 0.0005) {
    plantHealthGrid[i] = Math.max(20, plantHealthGrid[i] - 2);
  }
  
  // Winter: Stirbt sehr langsam
  if (getCurrentSeason() === 3 && ageGrid[i] > 200 && rng() < 0.002) {
    plantHealthGrid[i] -= 5;
    if (plantHealthGrid[i] <= 0) {
      grid[i] = PLANT_DEAD;
      return;
    }
  }
}

// --- updateFlower(): Blütensystem mit Bestäubung ---
function updateFlower(x, y, matId) {
  const i = y * W + x;
  ageGrid[i]++;
  
  // Prüfe Unterstützung
  let supported = false;
  if (y + 1 < H) {
    const below = grid[(y + 1) * W + x];
    supported = (below === PLANT || below === PLANT_STEM || below === PLANT_MATURE ||
                 below === ROOT_SYSTEM || below === PLANT_ROOT || below === DIRT ||
                 below === SAND || below === SAND_WET);
  }
  
  // Fällt wenn nicht unterstützt
  if (!supported && y + 1 < H && grid[(y + 1) * W + x] === EMPTY && rng() < 0.03) {
    swap(x, y, x, y + 1);
    return;
  }
  
  // Gesundheit
  plantHealthGrid[i] = calculatePlantHealth(x, y, i);
  
  // Pollen produzieren (an sonnigen Tagen)
  if (plantHealthGrid[i] > 30 && getSunlightIntensity() > 0.5 && rng() < 0.01) {
    const mat = MATS[matId];
    const attraction = mat.pollinatorAttraction || 0.5;
    
    // Pollen als Gas-Partikel
    if (y > 0 && grid[(y - 1) * W + x] === EMPTY && rng() < attraction * 0.3) {
      grid[(y - 1) * W + x] = POLLEN;
      plantHealthGrid[i] -= 5;
    }
  }
  
  // Samen produzieren (nach "Bestäubung" - hier: einfach mit Zeit)
  if (ageGrid[i] > 15 && plantHealthGrid[i] > 20 && rng() < 0.015 * getSeasonGrowthFactor()) {
    const mat = MATS[matId];
    const windEffect = windActive ? windDir * 2 : 0;
    
    for (let attempt = 0; attempt < 4; attempt++) {
      const angle = rng() * Math.PI * 2;
      const dist = 1 + Math.floor(rng() * 3);
      const sx = Math.floor(x + Math.cos(angle) * dist + windEffect);
      const sy = Math.floor(y + Math.sin(angle) * dist);
      
      if (sx >= 0 && sx < W && sy >= 0 && sy < H && grid[sy * W + sx] === EMPTY) {
        // Samen auf Erde/Sand keimen lassen
        if (sy + 1 < H) {
          const ground = grid[(sy + 1) * W + sx];
          if (ground === DIRT || ground === SAND || ground === SAND_WET || ground === SAND_DARK) {
            // Setze Samen
            if (rng() < 0.7) {
              grid[sy * W + sx] = PLANT_SEED;
            } else {
              grid[sy * W + sx] = SEED_SUNFLOWER;
            }
            plantTypeGrid[sy * W + sx] = plantTypeGrid[i];
            ageGrid[sy * W + sx] = 0;
            break;
          }
        }
      }
    }
  }
  
  // Verblühen
  if (ageGrid[i] > 100 && rng() < 0.01) {
    grid[i] = PLANT_DEAD;
    plantHealthGrid[i] = 0;
    return;
  }
  
  // Herbst: Blumen sterben
  if (getCurrentSeason() === 2 && ageGrid[i] > 50 && rng() < 0.02) {
    grid[i] = PLANT_DEAD;
    return;
  }
}

// --- updateLeaf(): Blatt-System mit Transpiration ---
function updateLeaf(x, y, matId) {
  const i = y * W + x;
  ageGrid[i]++;
  
  // Gesundheit
  plantHealthGrid[i] = calculatePlantHealth(x, y, i);
  
  // Aktive Photosynthese
  const sunlight = getSunlightIntensity();
  const lightFactor = hasUnobstructedLight(x, y);
  const effectiveLight = sunlight * lightFactor;
  
  if (effectiveLight > 0.1 && photoActivity > 0) {
    const temp = tempGrid[i];
    const tempFactor = (temp >= 10 && temp <= 35) ? 1.0 :
                       (temp >= 0 && temp <= 45) ? 0.5 : 0.1;
    
    // CO2 aufnehmen und O2 produzieren
    let co2Nearby = false;
    for (let dy = -3; dy <= 3; dy++) {
      for (let dx = -3; dx <= 3; dx++) {
        const nx = x + dx, ny = y + dy;
        if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
          if (grid[ny * W + nx] === CO2) {
            co2Nearby = true;
            if (rng() < 0.02) {
              grid[ny * W + nx] = EMPTY;
            }
          }
        }
      }
    }
    
    const photoRate = 0.003 * photoActivity * effectiveLight * tempFactor;
    if (rng() < photoRate) {
      const dir = Math.floor(rng() * 4);
      const dx = [0, 0, -1, 1][dir];
      const dy = [-1, 1, 0, 0][dir];
      const nx = x + dx, ny = y + dy;
      if (nx >= 0 && nx < W && ny >= 0 && ny < H && grid[ny * W + nx] === EMPTY) {
        if (sunCycleEnabled && !isDaytime) {
          grid[ny * W + nx] = CO2; // Nachts: Atmung
        } else {
          grid[ny * W + nx] = OXYGEN; // Tags: Photosynthese
        }
      }
    }
  }
  
  // Transpiration: Gibt Wasser ab
  if (plantWaterGrid[i] > 20 && rng() < 0.005) {
    plantWaterGrid[i] -= 5;
    // Wasser in die Luft als Feuchtigkeit
    if (y > 0 && grid[(y - 1) * W + x] === EMPTY && rng() < 0.3) {
      grid[(y - 1) * W + x] = STEAM; // Vereinfacht: gibt Wasserdampf ab
      tempGrid[(y - 1) * W + x] = 20;
    }
  }
  
  // Herbst-Färbung
  const autumnFactor = getAutumnColorFactor();
  if (autumnFactor > 0.3) {
    plantHealthGrid[i] -= autumnFactor * 2;
  }
  
  // Blatt fällt im Herbst
  if (getCurrentSeason() === 3 && rng() < 0.02) {
    grid[i] = PLANT_DEAD;
    plantHealthGrid[i] = 0;
    return;
  }
  
  // Alterung
  if (ageGrid[i] > 120 && rng() < 0.005) {
    grid[i] = PLANT_DEAD;
    plantHealthGrid[i] = 0;
    return;
  }
}

// --- updateRootSystem(): Wurzel-System mit Safttransport ---
function updateRootSystem(x, y, matId) {
  const i = y * W + x;
  ageGrid[i]++;
  
  // Gesundheit
  plantHealthGrid[i] = calculatePlantHealth(x, y, i);
  
  // Wasser aus dem Boden aufnehmen
  let waterAbsorbed = false;
  for (let dy = 1; dy <= 4; dy++) {
    if (y + dy >= H) break;
    const ni = (y + dy) * W + x;
    if (grid[ni] === WATER) {
      plantWaterGrid[i] = Math.min(100, plantWaterGrid[i] + 10);
      soilNutrientGrid[ni] = Math.min(100, soilNutrientGrid[ni] + 1);
      if (rng() < 0.01) {
        grid[ni] = SAND_WET;
        waterAbsorbed = true;
      }
      break;
    } else if (grid[ni] === SAND_WET) {
      if (rng() < 0.005) {
        grid[ni] = SAND;
        plantWaterGrid[i] = Math.min(100, plantWaterGrid[i] + 5);
        waterAbsorbed = true;
      }
    }
  }
  
  // Nährstoffe aus DIRT aufnehmen
  if (!waterAbsorbed) {
    for (let dy = 1; dy <= 3; dy++) {
      if (y + dy >= H) break;
      const ni = (y + dy) * W + x;
      if (grid[ni] === DIRT && soilNutrientGrid[ni] > 5) {
        soilNutrientGrid[ni] -= 2;
        plantSapGrid[i] = Math.min(100, plantSapGrid[i] + 3);
      }
    }
  }
  
  // Wuchs: Wurzeln bilden sich weiter (langsamer)
  if (plantHealthGrid[i] > 25 && rng() < 0.004 * getSeasonGrowthFactor()) {
    // Nach unten
    if (y + 1 < H && grid[(y + 1) * W + x] === EMPTY) {
      grid[(y + 1) * W + x] = ROOT_SYSTEM;
      plantTypeGrid[(y + 1) * W + x] = plantTypeGrid[i];
      plantHealthGrid[(y + 1) * W + x] = plantHealthGrid[i];
      plantIdGrid[(y + 1) * W + x] = plantIdGrid[i];
      ageGrid[(y + 1) * W + x] = 0;
    }
    // Seitlich
    if (rng() < 0.5 && x > 0 && grid[y * W + (x - 1)] === EMPTY) {
      grid[y * W + (x - 1)] = ROOT_SYSTEM;
      plantTypeGrid[y * W + (x - 1)] = plantTypeGrid[i];
      plantHealthGrid[y * W + (x - 1)] = plantHealthGrid[i];
      plantIdGrid[y * W + (x - 1)] = plantIdGrid[i];
      ageGrid[y * W + (x - 1)] = 0;
    } else if (x + 1 < W && grid[y * W + (x + 1)] === EMPTY) {
      grid[y * W + (x + 1)] = ROOT_SYSTEM;
      plantTypeGrid[y * W + (x + 1)] = plantTypeGrid[i];
      plantHealthGrid[y * W + (x + 1)] = plantHealthGrid[i];
      plantIdGrid[y * W + (x + 1)] = plantIdGrid[i];
      ageGrid[y * W + (x + 1)] = 0;
    }
  }
  
  // Transportiere Wasser nach oben zur Pflanze
  if (y > 0 && plantWaterGrid[i] > 30) {
    const above = grid[(y - 1) * W + x];
    if (above === PLANT || above === PLANT_STEM || above === PLANT_MATURE ||
        above === PLANT_SPROUT || above === PLANT_ROOT || above === ROOT_SYSTEM) {
      const ni = (y - 1) * W + x;
      plantWaterGrid[ni] = Math.min(100, plantWaterGrid[ni] + plantWaterGrid[i] * 0.3);
      plantWaterGrid[i] *= 0.7;
    }
  }
  
  // Sterben wenn zu trocken
  if (plantWaterGrid[i] <= 0 && ageGrid[i] > 50 && rng() < 0.01) {
    grid[i] = PLANT_DEAD;
    plantHealthGrid[i] = 0;
    return;
  }
}

// --- updatePlantDead(): Zersetzungssystem (DEUTLICH VERLANGSAMT) ---
function updatePlantDead(x, y, matId) {
  const i = y * W + x;
  ageGrid[i]++;
  
  // Zersetzung durch Bakterien/Schimmel (sehr langsam)
  let decomposerNearby = false;
  const neighbors = [i-1, i+1, i-W, i+W, i-W-1, i-W+1, i+W-1, i+W+1];
  for (const ni of neighbors) {
    if (ni >= 0 && ni < N) {
      const nMat = grid[ni];
      if (nMat === BACTERIA || nMat === MOLD || nMat === MYCELIUM) {
        decomposerNearby = true;
        // Very slow decomposition
        if (rng() < 0.001) {
          grid[i] = DIRT;
          // Return nutrients to soil
          if (y + 1 < H) {
            const below = grid[(y + 1) * W + x];
            if (below === DIRT && soilNutrientGrid[(y + 1) * W + x] < 100) {
              soilNutrientGrid[(y + 1) * W + x] = Math.min(100, soilNutrientGrid[(y + 1) * W + x] + 3);
            }
          }
          return;
        }
      }
    }
  }

  // Very slow natural decomposition; dead plants persist a long time
  const decomposeRate = decomposerNearby ? 0.0005 : 0.0001;
  if (ageGrid[i] > 400 && rng() < decomposeRate) {
    grid[i] = DIRT;
    // Nährstoffe zurück
    if (y + 1 < H) {
      const ni = (y + 1) * W + x;
      if (grid[ni] === DIRT) {
        soilNutrientGrid[ni] = Math.min(100, soilNutrientGrid[ni] + 5);
      }
    }
    return;
  }
  
  // Bei Feuchtigkeit wird es zu Kompost (DEUTLICH VERLANGSAMT)
  let moistureNearby = 0;
  for (let dy = -2; dy <= 2; dy++) {
    for (let dx = -2; dx <= 2; dx++) {
      const nx = x + dx, ny = y + dy;
      if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
        if (grid[ny * W + nx] === WATER || grid[ny * W + nx] === SAND_WET) {
          moistureNearby += 2;
        }
      }
    }
  }
  
  // DEUTLICH VERLANGSAMT: moistureNearby >= 3 && ageGrid[i] > 200 && rng() < 0.0005
  if (moistureNearby >= 3 && ageGrid[i] > 200 && rng() < 0.0005) {
    grid[i] = DIRT;
    if (y + 1 < H) {
      const ni = (y + 1) * W + x;
      if (grid[ni] === DIRT) {
        soilNutrientGrid[ni] = Math.min(100, soilNutrientGrid[ni] + 15);
      }
    }
  }
}

/**
 * CHEMICAL REACTIONS - Biologisch/chemisch korrekte Reaktionen
 */
function checkChemicalReactions(x, y, matId) {
  const i = y * W + x;
  const mat = MATS[matId];
  
  // Check neighbors for reactions
  const neighbors = [
    { dx: -1, dy: 0 }, { dx: 1, dy: 0 }, { dx: 0, dy: -1 }, { dx: 0, dy: 1 }
  ];
  
  for (const { dx, dy } of neighbors) {
    const nx = x + dx, ny = y + dy;
    if (nx < 0 || nx >= W || ny < 0 || ny >= H) continue;
    const ni = ny * W + nx;
    const nId = grid[ni];
    const nMat = MATS[nId];
    if (!nMat) continue;
    
    // === COMBUSTION (Verbrennung) ===
    // Verbrennung benötigt: Brennstoff + Sauerstoff + Zündtemperatur
    if (matId === FIRE || tempGrid[i] > 300) {
      // Entzündung von brennbaren Materialien
      if (nMat.flammability > 0 && nId !== FIRE && nId !== SMOKE && nId !== ASH) {
        // Zündtemperatur muss erreicht sein
        const ignitionTemp = nMat.ignitionTemperature || 300;
        if (tempGrid[i] >= ignitionTemp && rng() < nMat.flammability * 0.03) {
          grid[ni] = FIRE;
          tempGrid[ni] = 700;
        }
      }
      // Wasser -> Dampf (bei >100°C)
      if (nId === WATER && tempGrid[i] >= 100) {
        grid[ni] = STEAM;
        tempGrid[ni] = Math.max(tempGrid[i], 100);
      }
      // Eis -> Wasser (bei >0°C)
      if (nId === ICE && tempGrid[i] > 0) {
        grid[ni] = WATER;
        tempGrid[ni] = Math.max(tempGrid[i], 0);
      }
      // Salz löst sich in Wasser
      if (nId === SALT && matId === WATER && rng() < 0.02) {
        grid[ni] = EMPTY;
        // Salzwasser ist leicht sauer
        phGrid[i] = Math.max(phGrid[i] - 0.1, 5.5);
      }
    }
    
    // === ACID REACTIONS (Säure-Reaktionen) ===
    if (matId === ACID) {
      // Säure + Metall -> Salz + Wasserstoff (korrekte Chemie!)
      // 2HCl + Fe -> FeCl₂ + H₂
      if (nId === METAL && rng() < 0.03) {
        grid[ni] = RUST; // Metall wird zu Metallionen (vereinfacht: Rost)
        if (rng() < 0.4) {
          grid[i] = EMPTY; // Säure verbraucht
        }
        // Wasserstoffgas produzieren (steigt auf)
        if (y > 0 && grid[(y-1) * W + x] === EMPTY && rng() < 0.5) {
          grid[(y-1) * W + x] = HYDROGEN;
        }
      }
      // Säure + Base (Neutralisation) - exotherm!
      // HCl + NaOH -> NaCl + H₂O
      if (nId === SODA || nId === BLOOD_ALKALI) {
        grid[ni] = DIRT; // Salz entsteht (vereinfacht: Erde)
        grid[i] = WATER;
        tempGrid[i] = 80; // Stark exotherm!
        tempGrid[ni] = 80;
        phGrid[i] = 7.0; // Neutral
      }
      // Säure + Schwefel -> Schwefeldioxid (SO₂)
      if (nId === SULFUR && rng() < 0.02) {
        grid[ni] = SMOKE; // SO₂
        if (rng() < 0.3) grid[i] = EMPTY;
      }
      // Säure + Carbonat (Kalkstein) -> CO₂
      // 2HCl + CaCO₃ -> CaCl₂ + H₂O + CO₂
      if (nId === STONE && rng() < 0.015) {
        grid[i] = EMPTY; // Säure verbraucht
        // CO₂-Gas entsteht (steigt nicht auf, ist schwerer als Luft)
        if (y < H-1 && grid[(y+1) * W + x] === EMPTY) {
          grid[(y+1) * W + x] = SMOKE; // CO₂ (als Smoke simuliert)
        }
      }
      // Säure zerstört organische Materie
      if (isPlant(nId) || nId === PLANT_DEAD || nId === WOOD || nId === OIL) {
        grid[ni] = ASH;
        if (rng() < 0.3) grid[i] = EMPTY;
      }
      // Säure frisst sich durch Materialien
      if (nMat.id !== ACID && nMat.id !== GLASS && nMat.id !== PLASTIC && rng() < 0.005) {
        grid[ni] = ASH;
      }
    }
    
    // === BASE (ALKALI) REACTIONS (Lauge-Reaktionen) ===
    if (matId === SODA || matId === BLOOD_ALKALI) {
      // Base + Säure (Neutralisation)
      if (nId === ACID) {
        grid[i] = WATER;
        grid[ni] = DIRT; // Salz
        tempGrid[i] = 80;
        tempGrid[ni] = 80;
        phGrid[i] = 7.0;
      }
      // Lauge + Öl -> Seife (Verseifung!)
      // Triglycerid + 3NaOH -> Glycerin + 3 Seifenmoleküle
      if (nId === OIL && rng() < 0.02) {
        grid[ni] = WATER; // Vereinfacht: Wasser
        if (rng() < 0.4) grid[i] = WATER;
      }
      // Lauge löst organische Materie (Holz, Pflanzen)
      if ((nId === WOOD || isPlant(nId)) && rng() < 0.01) {
        grid[ni] = ASH;
        if (rng() < 0.2) grid[i] = EMPTY;
      }
    }
    
    // === OXIDATION (Rostbildung) ===
    // 4Fe + 3O₂ -> 2Fe₂O₃ (Rost)
    // Benötigt: Metall + Sauerstoff + Feuchtigkeit (beschleunigt)
    if (nId === METAL && matId === OXYGEN) {
      // Feuchtigkeit beschleunigt Rostbildung
      const moistureFactor = phGrid[i] > 0 ? 2 : 1;
      if (rng() < 0.001 * moistureFactor) {
        grid[ni] = RUST;
        tempGrid[i] += 10; // Leicht exotherm
      }
    }
    // Rost kann durch Wasserstoff reduziert werden (bei hoher Temperatur)
    // Fe₂O₃ + 3H₂ -> 2Fe + 3H₂O
    if (nId === RUST && matId === HYDROGEN && tempGrid[i] > 250 && rng() < 0.03) {
      grid[ni] = METAL;
      grid[i] = STEAM;
    }
    // Rost kann durch Säure entfernt werden
    if (nId === RUST && matId === ACID && rng() < 0.02) {
      grid[ni] = EMPTY; // Rost gelöst
      if (rng() < 0.3) grid[i] = EMPTY;
    }
    
    // === HYDROGEN + CHLORINE → HCl REACTION ===
    // H2 + Cl2 → 2HCl (bei Licht oder Hitze)
    if ((matId === HYDROGEN && nId === CHLORINE) || (matId === CHLORINE && nId === HYDROGEN)) {
      if (matId === FIRE || nId === FIRE || tempGrid[i] > 200 || rng() < 0.002) {
        // Produziert HCl-Gas (Säure in Gasform)
        grid[i] = ACID;
        grid[ni] = ACID;
        tempGrid[i] = 100;
        tempGrid[ni] = 100;
      }
    }
    
    // === HYDROGEN + OXYGEN EXPLOSION ===
    if ((matId === HYDROGEN && nId === OXYGEN) || (matId === OXYGEN && nId === HYDROGEN)) {
      if (matId === FIRE || nId === FIRE || tempGrid[i] > 200 || tempGrid[ni] > 200 || rng() < 0.001) {
        // H2+O2 explosion creates water vapor and water droplets (not ash!)
        const explosionRadius = 8;
        for (let dy = -explosionRadius; dy <= explosionRadius; dy++) {
          for (let dx = -explosionRadius; dx <= explosionRadius; dx++) {
            if (dx * dx + dy * dy > explosionRadius * explosionRadius) continue;
            const nx = x + dx, ny = y + dy;
            if (nx < 0 || nx >= W || ny < 0 || ny >= H) continue;
            const ni = ny * W + nx;
            const neighborMat = MATS[grid[ni]];
            
            if (neighborMat && neighborMat.id !== WALL && neighborMat.id !== CLONE) {
              const dist = Math.sqrt(dx * dx + dy * dy);
              const intensity = 1 - dist / explosionRadius;
              
              if (grid[ni] === HYDROGEN || grid[ni] === OXYGEN) {
                // Convert unreacted gases to water
                if (tempGrid[ni] > 200) {
                  grid[ni] = STEAM;
                  tempGrid[ni] = 120;
                } else {
                  grid[ni] = WATER;
                  tempGrid[ni] = 30;
                }
              } else if (neighborMat.id === WATER) {
                // More water created
                tempGrid[ni] = Math.min(tempGrid[ni] + 50, 100);
              } else if (neighborMat.id === FIRE) {
                grid[ni] = STEAM;
                tempGrid[ni] = 100;
              } else if (neighborMat.id === URANIUM) {
                // Nuclear chain reaction!
                explode(nx, ny, explosionRadius * 0.5, false);
              } else if (neighborMat.flammability > 0 && rng() < intensity * 0.3) {
                grid[ni] = FIRE;
                tempGrid[ni] = 600 * intensity;
              } else if (neighborMat.id === WATER) {
                grid[ni] = STEAM;
                tempGrid[ni] = 100;
              }
            }
          }
        }
        // Create water droplets that fall as "rain" from explosion
        for (let k = 0; k < 15; k++) {
          const rx = x + Math.floor(rng() * explosionRadius * 2) - explosionRadius;
          const ry = y + Math.floor(rng() * explosionRadius * 2) - explosionRadius;
          if (rx >= 0 && rx < W && ry >= 0 && ry < H && grid[ry * W + rx] === EMPTY) {
            grid[ry * W + rx] = WATER;
            tempGrid[ry * W + rx] = 25;
          }
        }
        return true;
      }
    }
    
    // === LAVA + WATER -> STONE/OBSIDIAN + STEAM ===
    if (matId === LAVA && nId === WATER) {
      // Rapid cooling creates glass/obsidian, slow cooling creates stone
      grid[ni] = STEAM;
      if (rng() < 0.15) {
        grid[i] = GLASS; // Obsidian-like glass from rapid quenching
        tempGrid[i] = 100;
      } else if (rng() < 0.5) {
        grid[i] = STONE;
        tempGrid[i] = 200;
      }
    }
    // Water + Lava heat transfer
    if (matId === WATER && nId === LAVA) {
      grid[i] = STEAM;
      tempGrid[ni] = Math.max(tempGrid[ni], 500); // Lava stays hot
    }
    
    // === SULFUR + FIRE -> SMOKE (SO2) ===
    if (matId === FIRE && nId === SULFUR) {
      grid[ni] = SMOKE;
    }
    
    // === PHOSPHORUS AUTO-IGNITION ===
    if (nId === PHOSPHORUS && nMat.autoFlammable && tempGrid[i] > 44) {
      grid[ni] = FIRE;
      tempGrid[ni] = 600;
    }
    if (matId === FIRE && nId === PHOSPHORUS) {
      grid[ni] = FIRE;
      tempGrid[ni] = 800;
    }
    
    // === URANIUM RADIATION ===
    if (nId === URANIUM) {
      // Uranium emits radiation continuously - slower, more realistic
      if (rng() < 0.002) {
        // Radiation spreads in a cross pattern (realistic radiation diffusion)
        const radDirs = [{dx:0,dy:-1},{dx:0,dy:1},{dx:-1,dy:0},{dx:1,dy:0}];
        for (const {dx: d2x, dy: d2y} of radDirs) {
          const nnx = nx + d2x, nny = ny + d2y;
          if (nnx >= 0 && nnx < W && nny >= 0 && nny < H && grid[nny * W + nnx] === EMPTY && rng() < 0.15) {
            grid[nny * W + nnx] = RADIATION;
            break;
          }
        }
      }
      
      // Radiation damages nearby organic matter - less aggressive
      for (const {dx: d2x, dy: d2y} of neighbors) {
        const nnx = nx + d2x, nny = ny + d2y;
        if (nnx >= 0 && nnx < W && nny >= 0 && nny < H) {
          const nni = nny * W + nnx;
          const nMatId = grid[nni];
          
          // Radiation damages plants - slower
          if (isPlant(nMatId)) {
            if (rng() < 0.01) {
              grid[nni] = PLANT_DEAD;
              ageGrid[nni] = 0;
            }
          }
          // Radiation accelerates decay of dead plants
          if (nMatId === PLANT_DEAD && rng() < 0.02) {
            // Creates radioactive contaminated soil
            grid[nni] = DIRT;
            // Add radiation on top
            if (nny > 0 && grid[(nny-1) * W + nnx] === EMPTY) {
              grid[(nny-1) * W + nnx] = RADIATION;
            }
          }
          // Radiation damages mold - slower
          if (nMatId === MOLD && rng() < 0.01) {
            grid[nni] = ASH;
          }
          // Radiation affects bacteria - slower
          if (nMatId === BACTERIA && rng() < 0.015) {
            // Bacteria break down into radioactive ash
            grid[nni] = ASH;
            // Spread radiation
            for (const {dx: d3x, dy: d3y} of neighbors) {
              const mnx = nx + d3x, mny = ny + d3y;
              if (mnx >= 0 && mnx < W && mny >= 0 && mny < H && grid[mny * W + mnx] === EMPTY && rng() < 0.1) {
                grid[mny * W + mnx] = RADIATION;
                break;
              }
            }
          }
        }
      }
      
      // Radiation creates radioactive waste from nearby materials - slower
      if (rng() < 0.001) {
        for (const {dx: d2x, dy: d2y} of neighbors) {
          const nnx = nx + d2x, nny = ny + d2y;
          if (nnx >= 0 && nnx < W && nny >= 0 && nny < H) {
            const nMatId = grid[nny * W + nnx];
            // Contaminate ground materials - they become radioactive waste
            if ((nMatId === DIRT || nMatId === SAND || nMatId === SAND_DARK || nMatId === GRAVEL || nMatId === STONE) && rng() < 0.2) {
              // Mark material as contaminated by adding radiation on top
              if (nny > 0 && grid[(nny-1) * W + nnx] === EMPTY) {
                grid[(nny-1) * W + nnx] = RADIATION;
              }
              // The ground material itself slowly becomes radioactive ash
              if (rng() < 0.05) {
                grid[nny * W + nnx] = ASH; // Contaminated ash = radioactive waste
              }
              break;
            }
            // Water becomes radioactive waste water
            if (nMatId === WATER && rng() < 0.08) {
              // Water stays but becomes radioactive (shown by radiation particle)
              if (nny > 0 && grid[(nny-1) * W + nnx] === EMPTY) {
                grid[(nny-1) * W + nnx] = RADIATION;
              }
            }
          }
        }
      }
    }
    
    // Radiation affects living organisms - less aggressive
    if (matId === RADIATION) {
      // Radiation spreads to adjacent cells - slower
      if (rng() < 0.02) {
        const radDirs = [{dx:0,dy:-1},{dx:0,dy:1},{dx:-1,dy:0},{dx:1,dy:0}];
        for (const {dx: d2x, dy: d2y} of radDirs) {
          const nnx = nx + d2x, nny = ny + d2y;
          if (nnx >= 0 && nnx < W && nny >= 0 && nny < H && grid[nny * W + nnx] === EMPTY && rng() < 0.2) {
            grid[nny * W + nnx] = RADIATION;
            break;
          }
        }
      }
      
      // Radiation damages nearby organic matter in a larger radius - slower
      for (let dy = -2; dy <= 2; dy++) {
        for (let dx = -2; dx <= 2; dx++) {
          const nnx = x + dx, nny = y + dy;
          if (nnx >= 0 && nnx < W && nny >= 0 && nny < H) {
            const nMatId = grid[nny * W + nnx];
            const dist = Math.sqrt(dx * dx + dy * dy);
            const damageChance = Math.max(0.01, 0.06 - dist * 0.02);
            
            // Radiation kills plants on contact/nearby
            if (isPlant(nMatId) && rng() < damageChance) {
              grid[nny * W + nnx] = PLANT_DEAD;
              ageGrid[nny * W + nnx] = 0;
            }
            // Radiation kills bacteria on contact/nearby
            if (nMatId === BACTERIA && rng() < damageChance * 1.2) {
              grid[nny * W + nnx] = ASH;
            }
            // Radiation kills mold on contact/nearby
