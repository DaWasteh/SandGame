            if (nMatId === MOLD && rng() < damageChance * 0.8) {
              grid[nny * W + nnx] = ASH;
            }
            // Radiation damages organic matter
            if (isOrganic(nMatId) && nMatId !== MOLD && nMatId !== BACTERIA && rng() < damageChance * 0.5) {
              grid[nny * W + nnx] = PLANT_DEAD;
            }
          }
        }
      }
      
      // Radiation decays over time (slower)
      if (rng() < 0.06) grid[i] = EMPTY;
    }
    
    // === ALCOHOL + FIRE ===
    if (matId === FIRE && nId === ALCOHOL) {
      grid[ni] = FIRE;
      tempGrid[ni] = 800;
    }
    
    // === HONEY CARAMELIZATION ===
    if (nId === HONEY && tempGrid[i] > 110 && rng() < 0.02) {
      grid[ni] = ASH;
    }
    
    // === MERCURY + SULFUR -> MERCURY SULFIDE (red powder) ===
    if ((matId === MERCURY && nId === SULFUR) || (matId === SULFUR && nId === MERCURY)) {
      if (rng() < 0.01) {
        grid[i] = RUST; // Simplified: turns to red powder (using rust color)
        grid[ni] = RUST;
      }
    }
  }
  
  return false;
}

/**
 * EXPLOSION SYSTEM - Realistic blast physics
 * Handles TNT, fireballs, and other explosives with proper energy distribution
 */
function explode(cx, cy, radius, isTNT) {
  // TNT produces a more powerful, concentrated blast with different effects by zone
  const blastType = isTNT ? 'tnt' : 'fireball';
  const energy = isTNT ? 1500 : 1000; // TNT has higher energy density
  
  // Phase 1: Blast wave - instant destruction in center, pressure effects outward
  for (let dy = -radius; dy <= radius; dy++) {
    for (let dx = -radius; dx <= radius; dx++) {
      if (dx * dx + dy * dy > radius * radius) continue;
      const nx = cx + dx, ny = cy + dy;
      if (nx < 0 || nx >= W || ny < 0 || ny >= H) continue;
      const ni = ny * W + nx;
      const mat = MATS[grid[ni]];
      if (!mat) continue;
      
      const dist = Math.sqrt(dx * dx + dy * dy);
      const normDist = dist / radius; // 0 = center, 1 = edge
      
      // Define blast zones
      let intensity;
      if (blastType === 'tnt') {
        // TNT: very intense center, rapid falloff
        intensity = normDist < 0.3 ? 1.0 : Math.max(0, 1.0 - (normDist - 0.3) / 0.7);
      } else {
        // Fireball: more gradual falloff
        intensity = Math.max(0, 1.0 - normDist);
      }
      
      // Zone-based effects
      if (mat.id === WALL || mat.id === CLONE) {
        // Walls resist explosion but can crack
        if (blastType === 'tnt' && intensity > 0.8 && rng() < 0.3) {
          grid[ni] = STONE; // Wall cracks into stone
          tempGrid[ni] = 200;
        }
        continue;
      }
      
      if (mat.id === TNT) {
        // Chain reaction: adjacent TNT detonates
        if (intensity > 0.5) {
          explode(nx, ny, radius * 0.5, true);
        }
        continue;
      }
      
      if (mat.id === URANIUM) {
        // Nuclear chain reaction!
        explode(nx, ny, radius * 0.6, false);
        continue;
      }
      
      // Calculate thermal energy deposited
      const thermalEnergy = intensity * energy;
      
      if (blastType === 'tnt') {
        // TNT blast: crushing pressure + heat
        if (intensity > 0.7) {
          // Center zone: complete vaporization
          if (mat.id !== WALL && mat.id !== CLONE) {
            grid[ni] = SMOKE;
            tempGrid[ni] = thermalEnergy;
          }
        } else if (intensity > 0.4) {
          // Inner zone: combustion and melting
          if (mat.id === WATER) {
            grid[ni] = STEAM;
            tempGrid[ni] = 300;
          } else if (mat.id === ICE) {
            grid[ni] = WATER;
            tempGrid[ni] = 100;
          } else if (mat.oxidizable || mat.id === METAL) {
            if (thermalEnergy > mat.melting * 0.5) {
              grid[ni] = LAVA;
              tempGrid[ni] = thermalEnergy * 0.5;
            } else {
              grid[ni] = RUST;
            }
          } else if (mat.flammability > 0 || mat.id === OIL || mat.id === ALCOHOL || mat.id === HONEY) {
            grid[ni] = FIRE;
            tempGrid[ni] = thermalEnergy;
          } else if (mat.id === PLANT || mat.id === PLANT_FLOWER || mat.id === PLANT_DEAD || mat.id === WOOD) {
            grid[ni] = FIRE;
            tempGrid[ni] = thermalEnergy;
          } else if (mat.id === DIRT || mat.id === SAND || mat.id === SAND_DARK || mat.id === GRAVEL) {
            // Ground is compacted/vitrified
            if (intensity > 0.6 && rng() < 0.3) {
              grid[ni] = GLASS; // Sand vitrifies to glass
              tempGrid[ni] = 500;
            } else {
              grid[ni] = ASH; // Organic content burns
            }
          } else {
            grid[ni] = intensity > 0.6 ? FIRE : SMOKE;
            tempGrid[ni] = thermalEnergy * 0.5;
          }
        } else {
          // Outer zone: heat and smoke only
          if (mat.id === WATER) {
            grid[ni] = STEAM;
          } else if (mat.flammability > 0.5 && thermalEnergy > 200) {
            grid[ni] = FIRE;
            tempGrid[ni] = thermalEnergy;
          } else {
            grid[ni] = SMOKE;
            tempGrid[ni] = thermalEnergy * 0.3;
          }
        }
      } else {
        // Fireball explosion: more heat, less pressure
        if (mat.id === WATER) {
          grid[ni] = STEAM;
          tempGrid[ni] = Math.min(400, thermalEnergy);
        } else if (mat.flammability > 0 || mat.id === OIL || mat.id === ALCOHOL) {
          grid[ni] = FIRE;
          tempGrid[ni] = thermalEnergy;
        } else if (mat.id === PLANT || mat.id === PLANT_FLOWER || mat.id === PLANT_DEAD || mat.id === WOOD) {
          grid[ni] = FIRE;
          tempGrid[ni] = thermalEnergy;
        } else if (rng() < intensity * 0.6) {
          grid[ni] = intensity > 0.5 ? FIRE : SMOKE;
          tempGrid[ni] = thermalEnergy * 0.4;
        }
      }
    }
  }
  
  // TNT produces characteristic mushroom cloud
  if (blastType === 'tnt') {
    // Smoke column rises from explosion
    for (let i = 0; i < radius * 3; i++) {
      const smokeX = cx + Math.floor(rng() * radius * 2) - radius;
      const smokeY = cy - Math.floor(rng() * radius * 4);
      if (smokeX >= 0 && smokeX < W && smokeY >= 0 && smokeY < H && grid[smokeY * W + smokeX] === EMPTY) {
        grid[smokeY * W + smokeX] = SMOKE;
        tempGrid[smokeY * W + smokeX] = 80;
        ageGrid[smokeY * W + smokeX] = 0;
      }
    }
    // Ash falls back down
    for (let i = 0; i < radius; i++) {
      const ashX = cx + Math.floor(rng() * radius * 4) - radius * 2;
      const ashY = cy + Math.floor(rng() * radius);
      if (ashX >= 0 && ashX < W && ashY >= 0 && ashY < H && grid[ashY * W + ashX] === EMPTY) {
        grid[ashY * W + ashX] = ASH;
      }
    }
  }
}

// Special TNT detonation function
function detonateTNT(x, y) {
  const i = y * W + x;
  grid[i] = EMPTY; // TNT consumed
  explode(x, y, 12, true); // TNT has radius 12
}

/**
 * THERMAL PHYSICS - coupled to sun cycle and seasons
 */
function updateThermal(x, y, matId) {
  const i = y * W + x;
  const mat = MATS[matId];
  if (!mat || mat.heatCapacity === 0) return;

  // Heat conduction to neighbors
  if (mat.conductivity > 0 && rng() < 0.15) {
    const neighbors = [];
    if (x > 0) neighbors.push(i - 1);
    if (x < W - 1) neighbors.push(i + 1);
    if (y > 0) neighbors.push(i - W);
    if (y < H - 1) neighbors.push(i + W);

    if (neighbors.length > 0) {
      const ni = neighbors[Math.floor(rng() * neighbors.length)];
      const nMat = MATS[grid[ni]];
      if (!nMat) return;

      const tempDiff = tempGrid[i] - tempGrid[ni];
      if (Math.abs(tempDiff) > 0.5) {
        const transfer = tempDiff * 0.05 * Math.sqrt(mat.conductivity * nMat.conductivity);
        tempGrid[i] -= transfer;
        tempGrid[ni] += transfer;
      }
    }
  }

  // Ambient temperature influenced by sun cycle and season
  let ambientBase = 20;

  if (sunCycleEnabled) {
    // Season effect
    const s = getCurrentSeason();
    if (s === 0) ambientBase += 2;    // Frühling
    else if (s === 1) ambientBase += 8; // Sommer
    else if (s === 2) ambientBase -= 2; // Herbst
    else if (s === 3) ambientBase -= 10; // Winter

    // Day/night effect
    const sunlight = getSunlightIntensity();
    ambientBase += (sunlight - 0.5) * 6; // +3 at day, -3 at night
  }

  const ambientRate = 0.0015 / mat.heatCapacity;
  if (tempGrid[i] > ambientBase + 3) {
    tempGrid[i] -= ambientRate;
  } else if (tempGrid[i] < ambientBase - 3) {
    tempGrid[i] += ambientRate;
  }
  
  // === EGG COAGULATION - Realistic protein denaturation ===
  // Eggs coagulate at 62°C (albumen) and 70°C (yolk)
  if (matId === EGGS && mat.raw) {
    const coagTemp = mat.coagulationTemp || 62;
    if (tempGrid[i] >= coagTemp) {
      // Egg white coagulates - turns from transparent liquid to opaque solid
      grid[i] = COOKED_EGG;
      tempGrid[i] = Math.max(tempGrid[i], 62); // Keep current temperature
      // Cooked egg is now a solid that can be further processed
    }
    // Eggs can also freeze at very low temperatures
    if (tempGrid[i] < -2 && rng() < 0.01) {
      // Frozen egg becomes a solid powder-like substance
      grid[i] = COOKED_EGG;
      tempGrid[i] = -2;
    }
  }
  
  // Phase transitions
  // Melting
  if (mat.melting > 0 && tempGrid[i] >= mat.melting) {
    if (matId === ICE) grid[i] = WATER;
    else if (matId === STONE || matId === METAL || matId === WALL) grid[i] = LAVA;
    else if (matId === GLASS) grid[i] = EMPTY;
    else if (matId === WOOD) { grid[i] = FIRE; tempGrid[i] = 400; }
    else if (matId === RUST) grid[i] = METAL;
    else if (matId === BRASS) grid[i] = LAVA;
    else if (matId === COOKED_EGG) { grid[i] = FIRE; tempGrid[i] = 500; } // Cooked egg burns
  }
  
  // Freezing
  if (mat.melting > 0 && tempGrid[i] <= mat.melting && isLiquid(matId)) {
    if (matId === WATER) grid[i] = ICE;
    else if (matId === LAVA) { grid[i] = STONE; tempGrid[i] = 100; }
  }
  
  // Boiling
  if (mat.boiling > 0 && tempGrid[i] >= mat.boiling) {
    if (matId === WATER || matId === BLOOD) grid[i] = STEAM;
    else if (matId === OIL) { grid[i] = FIRE; tempGrid[i] = 500; }
    else if (matId === ACID) grid[i] = SMOKE;
    else if (matId === COOKED_EGG) { grid[i] = ASH; } // Cooked egg chars
    else if (matId === HONEY) { grid[i] = ASH; }
    else if (matId === ALCOHOL) { grid[i] = FIRE; tempGrid[i] = 600; }
    else if (matId === MERCURY) grid[i] = STEAM;
  }
  
  // === LAVA PHYSICS - Realistic cooling and crystallization ===
  if (matId === LAVA) {
    // Lava cools based on contact with other materials
    if (tempGrid[i] <= 700 && y + 1 < H) {
      // Cooling rate depends on surrounding materials
      const below = grid[(y + 1) * W + x];
      let coolingRate = 0.1; // Base cooling
      
      if (below === WATER || below === ICE) {
        // Rapid cooling on water/ice - forms obsidian-like glass
        coolingRate = 2.0;
        if (tempGrid[i] <= 800 && rng() < 0.05) {
          grid[i] = GLASS; // Obsidian formation
          tempGrid[i] = 100;
        }
      } else if (below === DIRT || below === SAND || below === SAND_DARK) {
        // Slow cooling on ground - forms stone
        coolingRate = 0.3;
        if (tempGrid[i] <= 600 && rng() < 0.02) {
          grid[i] = STONE;
          tempGrid[i] = 200;
        }
      } else {
        // Air cooling
        coolingRate = 0.05;
        if (tempGrid[i] <= 500 && rng() < 0.01) {
          grid[i] = STONE;
          tempGrid[i] = 150;
        }
      }
      
      tempGrid[i] -= coolingRate;
    }
    
    // Lava glows brighter when hotter
    if (tempGrid[i] > 1000) {
      tempGrid[i] = Math.min(1200, tempGrid[i]); // Max temperature
    }
    
    // Lava flows faster when hotter (lower viscosity)
    const viscosityFactor = Math.max(1, (tempGrid[i] - 500) / 200);
  }
  
  // Wet sand formation - water mixes with powder
  if (matId === WATER && y + 1 < H) {
    const below = grid[(y + 1) * W + x];
    if ((below === SAND || below === SAND_DARK || below === GRAVEL) && rng() < 0.02) {
      // Water soaks into powder, creating wet powder
      if (MATS[below] && MATS[below].capillary) {
        grid[(y + 1) * W + x] = SAND_WET;
        tempGrid[(y + 1) * W + x] = tempGrid[i]; // Share temperature
      }
    }
  }
  
  // Condensation
  if (matId === STEAM && tempGrid[i] <= 90) {
    grid[i] = WATER;
    tempGrid[i] = 80;
  }
  
  // Fire behavior
  if (matId === FIRE) {
    tempGrid[i] = Math.max(tempGrid[i], 600);
    ageGrid[i]++;
    
    // Fire produces smoke
    if (rng() < 0.3) {
      const dir = rng() < 0.5 ? -1 : 1;
      for (const d of [dir, -dir]) {
        if (x + d >= 0 && x + d < W && y - 1 >= 0 && grid[(y - 1) * W + x + d] === EMPTY && rng() < 0.2) {
          grid[(y - 1) * W + x + d] = SMOKE;
          tempGrid[(y - 1) * W + x + d] = 80;
          break;
        }
      }
    }
    
    // Fire dies out
    if (ageGrid[i] > 15 + rng() * 25 || rng() < 0.03) {
      grid[i] = rng() < 0.6 ? SMOKE : EMPTY;
      tempGrid[i] = 40;
    }
  }
  
  // Smoke behavior
  if (matId === SMOKE) {
    ageGrid[i]++;
    // Soot settles
    if (mat.soot && rng() < 0.01 && y + 1 < H && grid[(y + 1) * W + x] !== EMPTY) {
      grid[i] = ASH;
    }
    if (ageGrid[i] > 80 + rng() * 120) {
      grid[i] = EMPTY;
      tempGrid[i] = 20;
    }
  }
  
  // Radiation decay
  if (matId === RADIATION) {
    if (rng() < 0.1) grid[i] = EMPTY;
  }
}

/**
 * MAIN SIMULATION
 */
function simulate() {
  tick++;
  
  // Safety check to prevent crashes
  if (!grid || !tempGrid || !ageGrid || !W || !H) {
    return;
  }
  
  // Wind direction changes occasionally
  if (windActive && rng() < 0.01) {
    windDir = rng() < 0.5 ? -1 : 1;
  }
  
  // Process bottom-up for powders and liquids
  for (let y = H - 1; y >= 0; y--) {
    const reverse = rng() < 0.5;
    const xStart = reverse ? W - 1 : 0;
    const xEnd = reverse ? -1 : W;
    const xStep = reverse ? -1 : 1;
    
    for (let x = xStart; x !== xEnd; x += xStep) {
      const i = y * W + x;
      const matId = grid[i];
      if (matId === EMPTY) continue;
      
      const mat = MATS[matId];
      if (!mat) continue;
      
      // Update thermal physics
      updateThermal(x, y, matId);
      
      // Check chemical reactions
      checkChemicalReactions(x, y, matId);
      
      // Material-specific updates
      if (isPowder(matId)) {
        updatePowder(x, y, matId);
      } else if (isLiquid(matId)) {
        updateLiquid(x, y, matId);
      }
    }
  }
  
  // Process top-down for gases
  for (let y = 0; y < H; y++) {
    const reverse = rng() < 0.5;
    const xStart = reverse ? W - 1 : 0;
    const xEnd = reverse ? -1 : W;
    const xStep = reverse ? -1 : 1;
    
    for (let x = xStart; x !== xEnd; x += xStep) {
      const i = y * W + x;
      const matId = grid[i];
      if (!isGas(matId) && matId !== SMOKE && matId !== STEAM) continue;
      
      updateGas(x, y, matId);
    }
  }
  
  // === Saison-System aktualisieren ===
  if (sunCycleEnabled) {
    seasonTime++;
    if (seasonTime >= seasonLength) {
      seasonTime = 0;
      season = (season + 1) % 4;
    }
    seasonProgress = seasonTime / seasonLength;
  }
  
  // Process plants and organic matter
  for (let y = 0; y < H; y++) {
    const reverse = rng() < 0.5;
    const xStart = reverse ? W - 1 : 0;
    const xEnd = reverse ? -1 : W;
    const xStep = reverse ? -1 : 1;
    
    for (let x = xStart; x !== xEnd; x += xStep) {
      const i = y * W + x;
      const matId = grid[i];
      
      // === Biologie-Erweiterung: Dispatch zu spezifischen Update-Funktionen ===
      if (matId === PLANT_SEED) {
        updatePlantSeed(x, y, matId);
      } else if (matId === PLANT_SPROUT) {
        updatePlantSprout(x, y, matId);
      } else if (matId === PLANT_STEM) {
        updatePlantStem(x, y, matId);
      } else if (matId === PLANT_MATURE) {
        updatePlantMature(x, y, matId);
      } else if (matId === FLOWER_DANDELION || matId === FLOWER_TULIP || matId === FLOWER_POPPY) {
        updateFlower(x, y, matId);
      } else if (matId === LEAF_OAK || matId === LEAF_MAPLE) {
        updateLeaf(x, y, matId);
      } else if (matId === ROOT_SYSTEM) {
        updateRootSystem(x, y, matId);
      } else if (matId === POLLEN) {
        // Pollen verfliegt
        ageGrid[i]++;
        if (ageGrid[i] > 30 || rng() < 0.05) {
          grid[i] = EMPTY;
        } else if (y > 0 && grid[(y - 1) * W + x] === EMPTY && rng() < 0.1) {
          swap(x, y, x, y - 1);
        }
      } else if (matId === PLANT_DEAD) {
        updatePlantDead(x, y, matId);
      } else if (isPlant(matId)) {
        // Alte Pflanzen (PLANT, PLANT_FLOWER, PLANT_ROOT, PLANT_LEAF) - backward compatibility
        updatePlant(x, y, matId);
      } else if (matId === SPORE) {
        updateSpore(x, y, matId);
      } else if (matId === MOLD) {
        updateMold(x, y, matId);
      } else if (matId === BACTERIA) {
        updateBacteria(x, y, matId);
      }
    }
  }
  
  // Rain effect
  if (rainActive) {
    for (let i = 0; i < 80; i++) {
      const x = Math.floor(rng() * W);
      if (grid[x] === EMPTY) {
        grid[x] = WATER;
        tempGrid[x] = 18;
      }
    }
  }
  
  // Fire rain effect
  if (fireActive) {
    for (let i = 0; i < 30; i++) {
      const x = Math.floor(rng() * W);
      if (grid[x] === EMPTY) {
        grid[x] = FIREBALL;
        tempGrid[x] = 1000;
        ageGrid[x] = 0;
      }
    }
  }
  
  // Fireball physics
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const i = y * W + x;
      if (grid[i] === FIREBALL) {
        ageGrid[i]++;
        // Fireballs fall fast
        if (y + 1 < H && grid[(y + 1) * W + x] === EMPTY && rng() < 0.5) {
          swap(x, y, x, y + 1);
        } else if (rng() < 0.3) {
          // Explode on impact or after time
          explode(x, y, 12, false);
        }
        if (ageGrid[i] > 100) {
          explode(x, y, 8, false);
        }
      }
    }
  }
  
  // TNT physics - realistic detonation
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const i = y * W + x;
      if (grid[i] === TNT) {
        // TNT detonates when:
        // 1. Exposed to high temperature (>300°C)
        // 2. Hit by fire or explosion
        // 3. Hit by shock wave (adjacent explosion)
        // 4. Struck by lightning (rare)
        
        if (tempGrid[i] > 300 || grid[i-1] === FIRE || grid[i+1] === FIRE ||
            grid[i-W] === FIRE || grid[i+W] === FIRE ||
            grid[i-1] === FIREBALL || grid[i+1] === FIREBALL ||
            grid[i-W] === FIREBALL || grid[i+W] === FIREBALL) {
          detonateTNT(x, y);
          break;
        }
        
        // TNT slowly degrades over very long time
        if (ageGrid[i] > 10000 && rng() < 0.001) {
          grid[i] = ASH; // Decomposes to harmless ash
        }
      }
    }
  }
  
  // Ecosystem generation - Enhanced with new biology system
  if (ecosystemActive) {
    // Add a complete ecosystem: dirt base, water, seeds, plants
    if (tick % 50 === 0) {
      // Create a small pond with ecosystem
      const px = Math.floor(rng() * (W - 30)) + 15;
      const py = Math.floor(rng() * (H - 15)) + 5;
      
      // Dirt layer with nutrients
      for (let dy = 0; dy < 4; dy++) {
        for (let dx = -8; dx <= 8; dx++) {
          const nx = px + dx, ny = py + dy;
          if (nx >= 0 && nx < W && ny >= 0 && ny < H && grid[ny * W + nx] === EMPTY) {
            grid[ny * W + nx] = DIRT;
            const ni = ny * W + nx;
            soilNutrientGrid[ni] = 50 + rng() * 40;
          }
        }
      }
      
      // Water pool
      for (let dx = -4; dx <= 4; dx++) {
        for (let dy = 4; dy <= 5; dy++) {
          const nx = px + dx, ny = py + dy;
          if (nx >= 0 && nx < W && ny >= 0 && ny < H && grid[ny * W + nx] === EMPTY) {
            grid[ny * W + nx] = WATER;
            tempGrid[ny * W + nx] = 18;
          }
        }
      }
      
      // Plant seeds on dirt edges (new biology system)
      for (let dx = -8; dx <= 8; dx++) {
        for (let dy = -1; dy <= 1; dy++) {
          const nx = px + dx, ny = py + dy;
          if (nx >= 0 && nx < W && ny >= 0 && ny < H && grid[ny * W + nx] === DIRT && rng() < 0.3) {
            // Set new seed types
            const seedType = rng();
            let seedMat;
            if (seedType < 0.5) {
              seedMat = PLANT_SEED;
            } else if (seedType < 0.8) {
              seedMat = SEED_SUNFLOWER;
            } else {
              seedMat = SEED_WHEAT;
            }
            grid[ny * W + nx] = seedMat;
            plantTypeGrid[ny * W + nx] = Math.floor(rng() * 2) + 1;
            ageGrid[ny * W + nx] = 0;
          }
        }
      }
      
      // Some mature plants
      if (rng() < 0.3) {
        const mx = px + Math.floor(rng() * 10) - 5;
        const my = py - 1;
        if (mx >= 0 && mx < W && my >= 0 && my < H && grid[my * W + mx] === EMPTY) {
          // Create a complete plant structure
          grid[my * W + mx] = PLANT_MATURE;
          plantTypeGrid[my * W + mx] = 1;
          plantStageGrid[my * W + mx] = 3;
          plantHealthGrid[my * W + mx] = 70 + rng() * 30;
          plantSapGrid[my * W + mx] = 50 + rng() * 50;
          plantIdGrid[my * W + mx] = nextPlantId++;
          ageGrid[my * W + mx] = 0;
          
          // Add leaves
          if (mx + 1 < W && grid[my * W + (mx + 1)] === EMPTY) {
            grid[my * W + (mx + 1)] = LEAF_OAK;
            plantTypeGrid[my * W + (mx + 1)] = 1;
            plantHealthGrid[my * W + (mx + 1)] = 70;
            ageGrid[my * W + (mx + 1)] = 0;
          }
          if (mx > 0 && grid[my * W + (mx - 1)] === EMPTY) {
            grid[my * W + (mx - 1)] = LEAF_MAPLE;
            plantTypeGrid[my * W + (mx - 1)] = 1;
            plantHealthGrid[my * W + (mx - 1)] = 70;
            ageGrid[my * W + (mx - 1)] = 0;
          }
        }
      }
    }
  }
  
  // === Sonnenzyklus-Simulation ===
  if (sunCycleEnabled) {
    sunCycleTime += sunCycleSpeed;
    const cycleLength = 100; // Vollständiger Tag/Nacht-Zyklus
    const phase = (sunCycleTime % cycleLength) / cycleLength;
    isDaytime = phase < 0.5;
    
    // Sonnenintensität berechnen (sinusförmig für sanften Übergang)
    if (isDaytime) {
      // Tag: 0% am Horizont -> 100% mittags -> 0% am Horizont
      const dayPhase = phase * 2; // 0-1 für den Tag
      sunIntensity = Math.sin(dayPhase * Math.PI);
    } else {
      // Nacht: schwaches Mondlicht
      const nightPhase = (phase - 0.5) * 2; // 0-1 für die Nacht
      sunIntensity = Math.sin(nightPhase * Math.PI) * 0.15; // 15% Mondlicht
    }
    sunIntensity = Math.max(0, Math.min(1, sunIntensity));
    
    // UI aktualisieren
    const sunIndicator = document.getElementById("sunCycleIndicator");
    const sunText = document.getElementById("sunCycleText");
    const sunProgress = document.getElementById("sunCycleProgress");
    
    sunText.textContent = isDaytime ? "Tag" : "Nacht";
    sunProgress.textContent = `(${Math.round(sunIntensity * 100)}%)`;
    sunIndicator.className = "sun-cycle-indicator " + (isDaytime ? "day" : "night");
    
    // === Saison-Anzeiger aktualisieren ===
    const seasonNames = ['🌸 Frühling', '☀️ Sommer', '🍂 Herbst', '❄️ Winter'];
    const seasonIndicator = document.getElementById('seasonIndicator');
    if (seasonIndicator) {
      seasonIndicator.textContent = seasonNames[getCurrentSeason()];
    }
  }
}

/**
 * RENDERING
 */
function render() {
  // Global brightness based on sun cycle
  const nightFactor = sunCycleEnabled ? (1.0 - getSunlightIntensity()) * 0.25 : 0;

  for (let i = 0; i < N; i++) {
    const matId = grid[i];
    const ci = i * 4;

    if (matId === EMPTY) {
      // Slightly adjust background for day/night
      let r = 12, g = 12, b = 15;
      if (sunCycleEnabled && nightFactor > 0) {
        r = Math.max(0, r - nightFactor * 10);
        g = Math.max(0, g - nightFactor * 10);
        b = Math.max(0, b + nightFactor * 5);
      }
      pix[ci] = r; pix[ci+1] = g; pix[ci+2] = b; pix[ci+3] = 255;
      continue;
    }
    
    const mat = MATS[matId];
    let r = mat.color[0];
    let g = mat.color[1];
    let b = mat.color[2];
    
    // Temperature effects
    const t = tempGrid[i];
    const seed = colorSeedGrid[i];
    const baseNoise = (seed % 25) - 12;
    
    if (t > 30) {
      const heatFactor = Math.min(1, Math.max(0, (t - 30) / 600));
      
      // Incandescence: red -> orange -> yellow -> white
      r += heatFactor * 150;
      g += heatFactor * (heatFactor > 0.5 ? 100 : 40);
      b += heatFactor * (heatFactor > 0.8 ? 80 : 0);
      
      // Glow effect for very hot objects
      if (t > 400) {
        const glow = (heatFactor - 0.5) * 60;
        r += glow; g += glow * 0.7; b += glow * 0.3;
      }
    }
    
    // Cold effects
    if (t < 0) {
      const coldFactor = Math.min(1, Math.abs(t) / 50);
      b = Math.min(255, b + coldFactor * 40);
      r = Math.max(0, r - coldFactor * 20);
    }
    
    // Base texture noise
    r += baseNoise;
    g += baseNoise;
    b += baseNoise;
    
    // pH visualization
    const ph = phGrid[i];
    if (ph !== undefined && ph !== null && mat.ph !== 7.0) {
      if (ph < 4) {
        r = Math.min(255, r + (4 - ph) * 15);
      } else if (ph > 10) {
        b = Math.min(255, b + (ph - 10) * 15);
      }
    }
    
    // Sonnenzyklus-Effekte auf Pflanzen (Photosynthese vs. Respiration)
    if (sunCycleEnabled && !isDaytime && (matId === PLANT || matId === PLANT_LEAF)) {
      // Nachts: Pflanzen atmen CO2 aus statt O2 zu produzieren
      // Leicht dunkleres Grün für nächtliche Pflanzen
      g *= 0.7;
      r *= 0.8;
    }
    
    // Radiation visualization
    if (radiationGrid[i] > 0) {
      const rad = Math.min(1, radiationGrid[i] / 50);
      r = r * (1 - rad) + 50 * rad;
      g = g * (1 - rad) + 255 * rad;
      b = b * (1 - rad) + 50 * rad;
    }
    
    // Special rendering
    if (matId === FIRE) {
      const flicker = Math.sin(tick * 0.3 + seed) * 40;
      r = 255;
      g = 120 + flicker;
      b = 20 + flicker * 0.3;
    }
    
    if (matId === LAVA) {
      const bubble = Math.sin(tick * 0.05 + seed * 0.1) * 30;
      r = 255;
      g = 60 + bubble;
      b = 10 + bubble * 0.2;
    }
    
    if (matId === PLANT) {
      // Health-based green intensity
      const health = Math.max(0, Math.min(1, 1 - Math.abs(t - 25) / 50));
      g = 184 + health * 40;
      // Variation based on age
      const ageVar = Math.sin(ageGrid[i] * 0.1) * 15;
      g += ageVar;
    }
    
    // === Biologie-Erweiterung: Neue Pflanzen-Darstellung ===
    if (matId === PLANT_SEED) {
      // Samen: Braun mit kleiner Variation
      r = 139 + baseNoise;
      g = 90 + baseNoise;
      b = 43 + baseNoise;
    }
    
    if (matId === PLANT_SPROUT) {
      // Keimling: Helles Grün
      const health = plantHealthGrid[i] / 100 || 0.5;
      r = 120 * health + 50;
      g = 200 * health + 55;
      b = 80 * health + 30;
    }
    
    if (matId === PLANT_STEM) {
      // Stamm: Mittelgrün mit Gesundheits-Abhängigkeit
      const health = plantHealthGrid[i] / 100 || 0.5;
      r = 34 * health + 20;
      g = 139 * health + 45;
      b = 34 * health + 10;
      // Herbst-Färbung
      const autumn = getAutumnColorFactor();
      if (autumn > 0) {
        r = r * (1 - autumn * 0.5) + 180 * autumn * 0.5;
        g = g * (1 - autumn * 0.7) + 100 * autumn * 0.7;
      }
    }
    
    if (matId === PLANT_MATURE) {
      // Erwachsene Pflanze: Dunkles Grün
      const health = plantHealthGrid[i] / 100 || 0.5;
      r = 0 * health + 20;
      g = 100 * health + 84;
      b = 0 * health + 20;
      // Herbst-Färbung
      const autumn = getAutumnColorFactor();
      if (autumn > 0) {
        r = r * (1 - autumn * 0.6) + 160 * autumn * 0.6;
        g = g * (1 - autumn * 0.5) + 80 * autumn * 0.5;
      }
    }
    
    if (matId === FLOWER_DANDELION) {
      // Gänseblümchen: Gelb
      r = 255;
      g = 255;
      b = 100 + baseNoise;
    }
    
    if (matId === FLOWER_TULIP) {
      // Tulpe: Rot
      r = 255;
      g = 50 + baseNoise;
      b = 50 + baseNoise;
    }
    
    if (matId === FLOWER_POPPY) {
      // Mohn: Orange-Rot
      r = 220 + baseNoise;
      g = 50 + baseNoise;
      b = 30 + baseNoise;
    }
    
    if (matId === LEAF_OAK || matId === LEAF_MAPLE) {
      // Blätter: Grün mit Gesundheits- und Herbst-Effekt
      const health = plantHealthGrid[i] / 100 || 0.5;
      const isMaple = matId === LEAF_MAPLE;
      
      if (isMaple) {
        r = 40 * health + 30;
        g = 140 * health + 50;
        b = 40 * health + 20;
      } else {
        r = 34 * health + 25;
        g = 120 * health + 40;
        b = 34 * health + 20;
      }
      
      // Herbst-Färbung
      const autumn = getAutumnColorFactor();
      if (autumn > 0) {
        const autumnR = isMaple ? 220 : 180;
        const autumnG = isMaple ? 60 : 100;
        const autumnB = 20;
        r = r * (1 - autumn) + autumnR * autumn;
        g = g * (1 - autumn) + autumnG * autumn;
        b = b * (1 - autumn) + autumnB * autumn;
      }
    }
    
    if (matId === ROOT_SYSTEM) {
      // Wurzeln: Hellbraun
      r = 160 + baseNoise;
      g = 120 + baseNoise;
      b = 60 + baseNoise;
    }
    
    if (matId === PLANT_DEAD) {
      // Tote Pflanze: Braun/Gelb
      r = 139 + baseNoise;
      g = 115 + baseNoise;
      b = 55 + baseNoise;
    }
    
    if (matId === POLLEN) {
      // Pollen: Hellgelb, transparent
      r = 255;
      g = 255;
      b = 150 + baseNoise;
    }
    
    if (matId === SEED_SUNFLOWER) {
      // Sonnenblumensamen: Dunkel
      r = 60 + baseNoise;
      g = 40 + baseNoise;
      b = 20 + baseNoise;
    }
    
    if (matId === SEED_WHEAT) {
      // Weizen: Goldgelb
      r = 218 + baseNoise;
      g = 165 + baseNoise;
      b = 32 + baseNoise;
    }
    
    if (matId === PLANT_FLOWER) {
      // Colorful flower
      const hue = (seed * 37 + tick * 0.01) % 360;
      const sat = 0.8;
      const val = 0.9;
      // Simple HSV to RGB
      const c = val * sat;
      const x = c * (1 - Math.abs((hue / 60) % 2 - 1));
      const m = val - c;
      let fr, fg, fb;
      if (hue < 60) { fr = c; fg = x; fb = 0; }
      else if (hue < 120) { fr = x; fg = c; fb = 0; }
      else if (hue < 180) { fr = 0; fg = c; fb = x; }
      else if (hue < 240) { fr = 0; fg = x; fb = c; }
      else if (hue < 300) { fr = x; fg = 0; fb = c; }
      else { fr = c; fg = 0; fb = x; }
      r = fr * 255 + m * 255;
      g = fg * 255 + m * 255;
      b = fb * 255 + m * 255;
    }
    
    if (matId === STEAM) {
      const alpha = Math.max(0.3, 1 - ageGrid[i] / 100);
      r = 200 + (1 - alpha) * 55;
      g = 210 + (1 - alpha) * 45;
      b = 225 + (1 - alpha) * 30;
    }
    
    if (matId === SMOKE) {
      const alpha = Math.max(0.2, 1 - ageGrid[i] / 120);
      const v = 70 + (1 - alpha) * 40;
      r = v; g = v; b = v;
    }
    
    if (matId === URANIUM) {
      const pulse = Math.sin(tick * 0.05 + seed) * 30;
      g = 180 + pulse;
    }
    
    if (matId === CLONE) {
      const pulse = Math.sin(tick * 0.08) * 40;
      r = 255; g = pulse; b = 255;
    }
    
    if (matId === BACTERIA) {
      const pulse = Math.sin(tick * 0.1 + seed * 0.5) * 20;
      g = 255;
      r = 80 + pulse;
    }
    
    // Apply night dimming
    if (nightFactor > 0) {
      r = Math.max(0, r - nightFactor * 60);
      g = Math.max(0, g - nightFactor * 60);
      b = Math.max(0, b - nightFactor * 40);
    }

    pix[ci]   = Math.max(0, Math.min(255, r));
    pix[ci+1] = Math.max(0, Math.min(255, g));
    pix[ci+2] = Math.max(0, Math.min(255, b));
    pix[ci+3] = 255;
  }
  
  ctx.putImageData(img, 0, 0);
}

/**
 * INITIALIZATION
 */
function resize() {
  // Use user-settable grid width, calculate height based on aspect ratio
  // Optimiert für Performance: Maximalgröße reduziert auf 320 (102.400 Zellen statt 250.000)
  W = Math.max(320, targetGridWidth);
  const aspectRatio = window.innerHeight / window.innerWidth;
  H = Math.floor(W * aspectRatio);
  
  // Clamp grid size für optimale Performance
  W = Math.max(50, Math.min(320, W));
  H = Math.max(50, Math.min(320, H));
  
  // Grid-Größe in UI aktualisieren
  const gridSlider = document.getElementById("gridR");
  if (gridSlider) {
    gridSlider.max = "320";
    gridSlider.value = Math.min(W, 320);
  }
  
  N = W * H;
  canvas.width = W;
  canvas.height = H;
  
  // Preserve existing data if resizing
  const oldGrid = grid, oldTemp = tempGrid, oldAge = ageGrid;
  const oldW = W, oldH = H;
  
  grid = new Uint8Array(N);
  tempGrid = new Float32Array(N).fill(20);
  ageGrid = new Uint16Array(N);
  colorSeedGrid = new Uint16Array(N);
  phGrid = new Float32Array(N).fill(7.0);
  soluteGrid = new Float32Array(N);
  electricalGrid = new Float32Array(N);
  radiationGrid = new Float32Array(N);
  
  // === Biologie-Erweiterung: Neue Grid-Systeme ===
  plantTypeGrid = new Uint8Array(N);
  plantStageGrid = new Uint8Array(N);
  plantHealthGrid = new Uint8Array(N);
  plantSapGrid = new Uint8Array(N);
  soilNutrientGrid = new Float32Array(N);
  plantWaterGrid = new Uint8Array(N);
  plantIdGrid = new Uint32Array(N);
  
  // Initialisiere Bodennährstoffe für DIRT-Zellen
  for (let i = 0; i < N; i++) {
    if (grid[i] === DIRT) {
      soilNutrientGrid[i] = 50 + rng() * 30; // 50-80 Nährstoffe
    }
  }
  
  // Copy old data to new grid
  if (oldGrid && oldGrid.length > 0) {
    const newW2 = W, oldW2 = Math.min(oldW, W);
    const copyH = Math.min(oldH, H);
    for (let y = 0; y < copyH; y++) {
      for (let x = 0; x < oldW2; x++) {
        const oldIdx = y * oldW + x;
        const newIdx = y * newW2 + x;
        grid[newIdx] = oldGrid[oldIdx];
        tempGrid[newIdx] = oldTemp ? oldTemp[oldIdx] : 20;
        ageGrid[newIdx] = oldAge ? oldAge[oldIdx] : 0;
      }
    }
  }
  
  for (let i = 0; i < N; i++) {
    if (colorSeedGrid[i] === 0) {
      colorSeedGrid[i] = Math.floor(rng() * 1000);
    }
  }
  
  img = ctx.createImageData(W, H);
  pix = img.data;
}

function buildUI() {
  const containers = {
    powder: document.getElementById("matGridPowder"),
    liquid: document.getElementById("matGridLiquid"),
    gas: document.getElementById("matGridGas"),
    solid: document.getElementById("matGridSolid"),
    special: document.getElementById("matGridSpecial")
  };
  
  // Clear containers
  for (const key in containers) containers[key].innerHTML = "";
  
  for (const id in MATS) {
    if (id == EMPTY) continue;
    const m = MATS[id];
    const btn = document.createElement("button");
    btn.textContent = m.name;
    btn.title = `${m.name}\nDichte: ${m.density} | Schmelzpunkt: ${m.melting}°C | Siedepunkt: ${m.boiling}°C\nEntzündung: ${Math.round(m.flammability * 100)}% | pH: ${m.ph}`;
    if (m.id === curMat) btn.classList.add("active");
    btn.onclick = () => {
      curMat = m.id;
      buildUI();
    };
    
    let containerKey;
    switch (m.type) {
      case TYPE.POWDER: containerKey = "powder"; break;
      case TYPE.LIQUID: containerKey = "liquid"; break;
      case TYPE.GAS: containerKey = "gas"; break;
      case TYPE.SOLID: containerKey = "solid"; break;
      default: containerKey = "special";
    }
    
    containers[containerKey].appendChild(btn);
  }
}

// Input handling
let isDrawing = false, isErasing = false;

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (W / rect.width);
  const y = (e.clientY - rect.top) * (H / rect.height);
  return { x: Math.floor(x), y: Math.floor(y) };
}

function paintAt(x, y) {
  for (let dy = -bsz; dy <= bsz; dy++) {
    for (let dx = -bsz; dx <= bsz; dx++) {
      if (dx * dx + dy * dy > bsz * bsz) continue;
      if (rng() > 0.75) continue;
      
      const nx = x + dx, ny = y + dy;
      if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
        const idx = ny * W + nx;
        if (isErasing) {
          grid[idx] = EMPTY;
          tempGrid[idx] = 20;
          ageGrid[idx] = 0;
        } else {
          grid[idx] = curMat;
          tempGrid[idx] = MATS[curMat].temp || 20;
          ageGrid[idx] = 0;
          phGrid[idx] = MATS[curMat].ph || 7.0;
        }
      }
    }
  }
}

function initInput() {
  canvas.addEventListener("pointerdown", e => {
    e.preventDefault();
    try {
      isDrawing = true;
      isErasing = e.button === 2 || e.shiftKey;
      const pos = getPos(e);
      paintAt(pos.x, pos.y);
    } catch (err) {
      console.error("Pointer down error:", err);
    }
  });
  
  window.addEventListener("pointermove", e => {
    if (!isDrawing) return;
    try {
      const pos = getPos(e);
      paintAt(pos.x, pos.y);
    } catch (err) {
      console.error("Pointer move error:", err);
    }
  });
  
  window.addEventListener("pointerup", () => {
    isDrawing = false;
    isErasing = false;
  });
  
  canvas.addEventListener("contextmenu", e => e.preventDefault());
}

function initUI() {
  document.getElementById("gridR").oninput = function() {
    const newWidth = parseInt(this.value);
    if (newWidth !== targetGridWidth) {
      targetGridWidth = newWidth;
      resize();
    }
  };
  document.getElementById("brushR").oninput = function() { bsz = parseInt(this.value); };
  document.getElementById("speedR").oninput = function() { spd = parseInt(this.value); };
  document.getElementById("photoR").oninput = function() { photoActivity = parseInt(this.value) / 100; };

  // Sun cycle speed slider
  document.getElementById("sunSpeedR").oninput = function() {
    const v = parseInt(this.value);
    // Map 1-100 to a reasonable speed range
    sunCycleSpeed = 0.05 + (v / 100) * 2.0;
  };
  // Initialize speed from default slider value
  sunCycleSpeed = 0.05 + (30 / 100) * 2.0;
  
  const pauseBtn = document.getElementById("pauseBtn");
  if (pauseBtn) {
    pauseBtn.onclick = function() {
      try {
        paused = !paused;
        this.textContent = paused ? "Fortsetzen" : "Pause";
      } catch (err) {
        console.error("Pause button error:", err);
      }
    };
  }
  
  const clearBtn = document.getElementById("clearBtn");
  if (clearBtn) {
    clearBtn.onclick = () => {
      try {
        if (grid) grid.fill(EMPTY);
        if (tempGrid) tempGrid.fill(20);
        if (ageGrid) ageGrid.fill(0);
        if (phGrid) phGrid.fill(7.0);
        if (soluteGrid) soluteGrid.fill(0);
        if (electricalGrid) electricalGrid.fill(0);
        if (radiationGrid) radiationGrid.fill(0);
        // === Biologie-Erweiterung: Neue Grids zurücksetzen ===
        if (plantTypeGrid) plantTypeGrid.fill(0);
        if (plantStageGrid) plantStageGrid.fill(0);
        if (plantHealthGrid) plantHealthGrid.fill(0);
        if (plantSapGrid) plantSapGrid.fill(0);
        if (plantWaterGrid) plantWaterGrid.fill(0);
        if (plantIdGrid) plantIdGrid.fill(0);
        if (soilNutrientGrid) soilNutrientGrid.fill(0);
        nextPlantId = 1;
        season = 0;
        seasonTime = 0;
        seasonProgress = 0;
      } catch (err) {
        console.error("Clear button error:", err);
      }
    };
  }
  
  const rainBtn = document.getElementById("rainBtn");
  const fireBtn = document.getElementById("fireBtn");
  const windBtn = document.getElementById("windBtn");
  const seedBtn = document.getElementById("seedBtn");
  
  if (rainBtn) {
    rainBtn.onclick = () => {
      try {
        rainActive = !rainActive;
        fireActive = false;
        windActive = false;
        ecosystemActive = false;
        rainBtn.classList.toggle("active", rainActive);
        if (fireBtn) fireBtn.classList.remove("active");
        if (windBtn) windBtn.classList.remove("active");
        if (seedBtn) seedBtn.classList.remove("active");
      } catch (err) {
        console.error("Rain button error:", err);
      }
    };
  }
  
  if (fireBtn) {
    fireBtn.onclick = () => {
      try {
        fireActive = !fireActive;
        rainActive = false;
        windActive = false;
        ecosystemActive = false;
        fireBtn.classList.toggle("active", fireActive);
        if (rainBtn) rainBtn.classList.remove("active");
        if (windBtn) windBtn.classList.remove("active");
        if (seedBtn) seedBtn.classList.remove("active");
      } catch (err) {
        console.error("Fire button error:", err);
      }
    };
  }
  
  if (windBtn) {
    windBtn.onclick = () => {
      try {
        windActive = !windActive;
        rainActive = false;
        fireActive = false;
        ecosystemActive = false;
        windBtn.classList.toggle("active", windActive);
        if (rainBtn) rainBtn.classList.remove("active");
        if (fireBtn) fireBtn.classList.remove("active");
        if (seedBtn) seedBtn.classList.remove("active");
      } catch (err) {
        console.error("Wind button error:", err);
      }
    };
  }
  
  if (seedBtn) {
    seedBtn.onclick = () => {
      try {
        ecosystemActive = !ecosystemActive;
        rainActive = false;
        fireActive = false;
        windActive = false;
        seedBtn.classList.toggle("active", ecosystemActive);
        if (rainBtn) rainBtn.classList.remove("active");
        if (fireBtn) fireBtn.classList.remove("active");
        if (windBtn) windBtn.classList.remove("active");
      } catch (err) {
        console.error("Seed button error:", err);
      }
    };
  }
  
  // Sonnenzyklus-Button Handler (uses HTML button)
  const sunCycleToggle = document.getElementById("sunCycleToggle");
  if (sunCycleToggle) {
    sunCycleToggle.onclick = () => {
      sunCycleEnabled = !sunCycleEnabled;
      sunCycleToggle.textContent = sunCycleEnabled ? "✅ Deaktivieren" : "☀️ Aktivieren";
      document.getElementById("sunCycleIndicator").style.display = sunCycleEnabled ? "flex" : "none";
      document.getElementById("seasonIndicator").style.display = sunCycleEnabled ? "flex" : "none";
    };
  }
  
  document.getElementById("toggleUI").onclick = () => {
    const ui = document.getElementById("ui");
    ui.classList.toggle("hidden");
    document.getElementById("toggleUI").textContent = ui.classList.contains("hidden") ? "Anzeigen" : "Ausblenden";
  };
  
  window.addEventListener("keydown", e => {
    const key = e.key.toLowerCase();
    
    if (key === " ") {
      e.preventDefault();
      paused = !paused;
      document.getElementById("pauseBtn").textContent = paused ? "Fortsetzen" : "Pause";
    }
    if (key === "c") {
      grid.fill(EMPTY);
      tempGrid.fill(20);
      ageGrid.fill(0);
      phGrid.fill(7.0);
    }
    if (key === "h") document.getElementById("toggleUI").click();
    
    if (KEY_MAP[key] !== undefined) {
      curMat = KEY_MAP[key];
      buildUI();
    }
  });
}

// Main Loop
function loop(timestamp) {
  requestAnimationFrame(loop);
  
  if (!paused) {
    // Performance-Optimierung: Begrenze die Anzahl der Simulations-Ticks basierend auf FPS
    const maxTicks = Math.min(spd, 8); // Maximal 8 Ticks pro Frame für bessere Performance
    for (let s = 0; s < maxTicks; s++) {
      simulate();
    }
  }
  
  render();
  
  frameCount++;
  if (timestamp - fpsTimer > 1000) {
    lastFps = frameCount;
    // Performance-Optimierung: Zähle nur alle 4. Zelle für Partikelanzahl
    let particleCount = 0;
    for (let i = 0; i < N; i += 4) {
      if (grid[i] !== EMPTY) particleCount++;
    }
    // Schätzung auf 4x hochrechnen (grobe Abschätzung)
    document.getElementById("st").textContent = `${lastFps} FPS | ${(particleCount * 4).toLocaleString()} Partikel`;
    frameCount = 0;
    fpsTimer = timestamp;
  }
}

  canvas = document.getElementById("c");

  seedRng(12345);
  resize();
  buildUI();

  initUI();
  initImageImport();
  
  requestAnimationFrame(loop);
}

} else {

}
/**
 * IMAGE IMPORT & COLOR-TO-MATERIAL MAPPING
 */
let colorMapping = {}; // { "rgb(r,g,b)": materialId }
let importedImage = null;
let simulationPausedForImport = false;

// Color distance function
function colorDistance(c1, c2) {
  return Math.sqrt(
    Math.pow(c1[0] - c2[0], 2) +
    Math.pow(c1[1] - c2[1], 2) +
    Math.pow(c1[2] - c2[2], 2)
  );
}

// Find closest material color
function findClosestMaterial(r, g, b, maxDist) {
  maxDist = maxDist || 80;
  let bestId = EMPTY;
  let bestDist = maxDist;
  
  for (let id in MATS) {
    if (id == 0) continue; // skip EMPTY
    let matColor = MATS[id].color;
    let dist = colorDistance([r, g, b], matColor);
    if (dist < bestDist) {
      bestDist = dist;
      bestId = parseInt(id);
    }
  }
  return { id: bestId, distance: bestDist };
}

// Update the mapping list display
function updateMappingList() {
  const listEl = document.getElementById('mappingList');
  if (!listEl) return;
  
  let html = '';
  for (let key in colorMapping) {
    const matId = colorMapping[key];
    const mat = MATS[matId];
    const matName = mat ? mat.name : 'Unknown';
    html += `<div style="margin: 2px 0; display: flex; align-items: center; gap: 5px;">
      <span style="display: inline-block; width: 20px; height: 12px; background: ${key}; border: 1px solid #555;"></span>
      <span>${key} &rarr; ${matName}</span>
    </div>`;
  }
  listEl.innerHTML = html;
}

// Show mapping panel
function showMappingPanel() {

}

// Load image file
function loadImageFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      importedImage = img;
      
      // Create canvas to read pixel data
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      
      // Scale image to fit current grid
      const scale = Math.min(W / img.width, H / img.height, 1);
      canvas.width = Math.floor(img.width * scale);
      canvas.height = Math.floor(img.height * scale);
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const pixels = imageData.data;
      
      // Collect unique colors
      const uniqueColors = {};
      for (let i = 0; i < pixels.length; i += 4) {
        const key = `rgb(${pixels[i]},${pixels[i+1]},${pixels[i+2]})`;
        if (!uniqueColors[key]) {
          uniqueColors[key] = { r: pixels[i], g: pixels[i+1], b: pixels[i+2], count: 0 };
        }
        uniqueColors[key].count++;
      }
      
      // Sort by frequency
      const sortedColors = Object.values(uniqueColors)
        .sort((a, b) => b.count - a.count)
        .slice(0, 50); // Top 50 colors
      
      // Auto-assign based on color proximity
      colorMapping = {};
      for (const color of sortedColors) {
        const result = findClosestMaterial(color.r, color.g, color.b);
        if (result.id !== EMPTY) {
          const key = `rgb(${color.r},${color.g},${color.b})`;
          colorMapping[key] = result.id;
        }
      }
      
      updateMappingList();
      showMappingPanel();
      
      // Show info
      const info = document.getElementById('info');
      if (info) {
        info.innerHTML = `Bild geladen: ${canvas.width}x${canvas.height} Pixel, ${Object.keys(colorMapping).length} Farben erkannt`;
        info.classList.add('visible');
        setTimeout(() => info.classList.remove('visible'), 5000);
      }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// Apply color mapping to grid
function applyImageToGrid() {
  if (!importedImage) {
    alert('Bitte zuerst ein Bild importieren!');
    return;
  }
  
  // Pause simulation
  paused = true;
  simulationPausedForImport = true;
  updatePauseButton();
  
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  
  const scale = Math.min(W / importedImage.width, H / importedImage.height, 1);
  canvas.width = Math.floor(importedImage.width * scale);
  canvas.height = Math.floor(importedImage.height * scale);
  ctx.drawImage(importedImage, 0, 0, canvas.width, canvas.height);
  
  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const pixels = imageData.data;
  
  // Clear grid first
  for (let i = 0; i < N; i++) {
    grid[i] = EMPTY;
    tempGrid[i] = 20;
    phGrid[i] = 7;
  }
  
  // Center offset
  const offsetX = Math.floor((W - canvas.width) / 2);
  const offsetY = Math.floor((H - canvas.height) / 2);
  
  // Map pixels to grid
  for (let y = 0; y < canvas.height; y++) {
    for (let x = 0; x < canvas.width; x++) {
      const pxIdx = (y * canvas.width + x) * 4;
      const r = pixels[pxIdx];
      const g = pixels[pxIdx + 1];
      const b = pixels[pxIdx + 2];
      const a = pixels[pxIdx + 3];
      
      if (a < 128) continue; // Skip transparent pixels
      
      const key = `rgb(${r},${g},${b})`;
      let matId = colorMapping[key];
      
      // If not in mapping, find closest
      if (!matId || matId === EMPTY) {
        const result = findClosestMaterial(r, g, b, 50);
        matId = result.id;
      }
      
      if (matId && matId !== EMPTY) {
        const gx = x + offsetX;
        const gy = y + offsetY;
        if (gx >= 0 && gx < W && gy >= 0 && gy < H) {
          grid[gy * W + gx] = matId;
          tempGrid[gy * W + gx] = 20;
          phGrid[gy * W + gx] = 7;
        }
      }
    }
  }
  
  // Update button state
  const playBtn = document.getElementById('playMappingBtn');
  if (playBtn) {
    playBtn.textContent = 'Simulation pausiert - Klicke zum Starten';
    playBtn.onclick = startSimulation;
  }
  
  // Show info
  const info = document.getElementById('info');
  if (info) {
    info.innerHTML = 'Bild angewendet! Klicke "Simulation starten" zum Starten.';
    info.classList.add('visible');
    setTimeout(() => info.classList.remove('visible'), 3000);
  }
}

// Start the simulation
function startSimulation() {
  paused = false;
  simulationPausedForImport = false;
  updatePauseButton();
  
  const playBtn = document.getElementById('playMappingBtn');
  if (playBtn) {
    playBtn.textContent = 'Simulation starten';
    playBtn.onclick = startSimulation;
  }
  
  const info = document.getElementById('info');
  if (info) {
    info.innerHTML = 'Simulation l\u00e4uft!';
    info.classList.add('visible');
    setTimeout(() => info.classList.remove('visible'), 2000);
  }
}

function updatePauseButton() {
  const pauseBtn = document.getElementById('pauseBtn');
  if (pauseBtn) {
    pauseBtn.textContent = paused ? 'Fortsetzen' : 'Pause';
  }
}

// Initialize image import event listeners
function initImageImport() {
  const importBtn = document.getElementById('importImgBtn');
  const fileInput = document.getElementById('imgFileInput');
  const autoMapBtn = document.getElementById('autoMapBtn');
  const applyBtn = document.getElementById('applyMappingBtn');
  const playBtn = document.getElementById('playMappingBtn');
  
  if (importBtn && fileInput) {
    importBtn.addEventListener('click', () => fileInput.click());
  }
  
  if (fileInput) {
    fileInput.addEventListener('change', (e) => {
      loadImageFile(e.target.files[0]);
    });
  }
  
  if (autoMapBtn) {
    autoMapBtn.addEventListener('click', autoMapColors);
  }
  
  if (applyBtn) {
    applyBtn.addEventListener('click', applyImageToGrid);
  }
  
  if (playBtn) {
    playBtn.addEventListener('click', startSimulation);
  }
}
