    if (y - 1 >= 0 && grid[(y - 1) * W + x] === WATER) { grid[(y - 1) * W + x] = OXYGEN; aclAddNeighbors(x, y - 1, 1); }
  }
}

// --- updateCloud(): Wolke driftet mit Wind, regnet ab, löst sich auf ---
// FIX: Wolken bleiben länger sichtbar und lösen sich langsamer auf
function updateCloud(x, y, matId) {
  const i = y * W + x;
  ageGrid[i]++;

  // Horizontaler Drift mit der Windrichtung (oder leichter Eigendrift)
  const drift = windActive ? windDir : (((x + tick) >> 5) & 1 ? 1 : -1);
  const speed = windActive ? 0.8 : 0.25;
  if (rng() < speed) {
    if (tryMove(x, y, x + drift, y, matId)) return;
    if (tryMove(x, y, x - drift, y, matId)) return;
  }
  // leichtes Auf/Ab, bleibt aber im oberen Bereich
  if (y > 2 && rng() < 0.05) { if (tryMove(x, y, x, y - 1, matId)) return; }
  if (y < H * 0.35 && rng() < 0.03) { if (tryMove(x, y, x, y + 1, matId)) return; }

  // Abregnen, wenn dicht genug (mehrere Wolken-Nachbarn)
  let cloudN = 0;
  for (let dx = -2; dx <= 2; dx++) {
    const nx = x + dx;
    if (nx >= 0 && nx < W && grid[y * W + nx] === CLOUD) cloudN++;
  }
  // Regnen: häufiger bei dichten Wolken, aber nicht zu aggressiv
  if (cloudN >= 4 && rng() < 0.015 && y + 1 < H && grid[(y + 1) * W + x] === EMPTY) {
    grid[(y + 1) * W + x] = WATER;
    tempGrid[(y + 1) * W + x] = 14;
    aclAddNeighbors(x, y + 1, 1);
  }

  // AUFLÖSEN: Wolken sind vergänglich, aber länger haltbar
  // FIX: Deutlich längere Lebensdauer
  const lowOrTrapped = y > H * 0.5 || cloudN >= 5;
  const dissolveAge = lowOrTrapped ? 300 : 1200;
  const dissolveRate = lowOrTrapped ? 0.008 : 0.001;
  if (ageGrid[i] > dissolveAge && rng() < dissolveRate) {
    grid[i] = EMPTY;
    aclAddNeighbors(x, y, 1);
  }
}

function updateFlower(x, y, matId) {
  const i = y * W + x;
  ageGrid[i]++;
  
  // Prüfe Unterstützung
  let supported = false;
  if (y + 1 < H) {
    const below = grid[(y + 1) * W + x];
    supported = (below === PLANT || below === PLANT_STEM || below === PLANT_MATURE ||
                 below === ROOT_SYSTEM || below === PLANT_ROOT || below === DIRT ||
                 below === SAND || below === SAND_WET);
  }
  
  // Fällt wenn nicht unterstützt
  if (!supported && y + 1 < H && grid[(y + 1) * W + x] === EMPTY && rng() < 0.8) {
    swap(x, y, x, y + 1);
    return;
  }
  
  // Gesundheit
  plantHealthGrid[i] = calculatePlantHealth(x, y, i);
  
  // Pollen produzieren (an sonnigen Tagen)
  if (plantHealthGrid[i] > 30 && getSunlightIntensity() > 0.5 && rng() < 0.01) {
    const mat = MATS[matId];
    const attraction = mat.pollinatorAttraction || 0.5;
    
    // Pollen als Gas-Partikel
    if (y > 0 && grid[(y - 1) * W + x] === EMPTY && rng() < attraction * 0.3) {
      grid[(y - 1) * W + x] = POLLEN;
      plantHealthGrid[i] -= 5;
    }
  }
  
  // === BESTÄUBUNGSSYSTEM Phase 5.2 ===
  // Pollen trifft auf andere Blume → Samenproduktion
  if (tick % 10 === 0) { // Nicht jeden Tick prüfen
    for (let dy = -3; dy <= 3; dy++) {
      for (let dx = -3; dx <= 3; dx++) {
        const nx = x + dx, ny = y + dy;
        if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
          const ni = ny * W + nx;
          if (grid[ni] === POLLEN) {
            // Pollen wird von Blume aufgenommen
            grid[ni] = EMPTY;
            // Bestäubung erfolgreich → Samenproduktion
            if (rng() < 0.4) {
              // FLOWER_SEED direkt neben der Blume produzieren
              const seedDir = Math.floor(rng() * 4);
              const sdx = [0, 0, -1, 1][seedDir];
              const sdy = [1, -1, 0, 0][seedDir];
              const sx = x + sdx, sy = y + sdy;
              if (sx >= 0 && sx < W && sy >= 0 && sy < H) {
                const syBelow = sy + 1;
                if (syBelow >= 0 && syBelow < H && grid[sy * W + sx] === EMPTY) {
                  const ground = grid[syBelow * W + sx];
                  if (ground === DIRT || ground === SAND || ground === SAND_WET || ground === SAND_DARK) {
                    grid[sy * W + sx] = FLOWER_SEED;
                    plantTypeGrid[sy * W + sx] = plantTypeGrid[i];
                    ageGrid[sy * W + sx] = 0;
                    plantHealthGrid[i] = Math.min(100, plantHealthGrid[i] + 10); // Bestäubung stärkt Pflanze
                  }
                }
              }
            }
            aclAddNeighbors(x, y, 1);
            break;
          }
        }
      }
    }
  }
  
  // Samen produzieren (Phase 2.2: Blumenwiesen-Logik, häufiger + FLOWER_SEED)
  if (ageGrid[i] > 10 && plantHealthGrid[i] > 20 && rng() < 0.05 * getSeasonGrowthFactor()) {
    const mat = MATS[matId];
    const windEffect = windActive ? windDir * 2 : 0;
    
    for (let attempt = 0; attempt < 4; attempt++) {
      const angle = rng() * Math.PI * 2;
      const dist = 1 + Math.floor(rng() * 3);
      const sx = Math.floor(x + Math.cos(angle) * dist + windEffect);
      const sy = Math.floor(y + Math.sin(angle) * dist);
      
      if (sx >= 0 && sx < W && sy >= 0 && sy < H && grid[sy * W + sx] === EMPTY) {
        // Samen auf Erde/Sand keimen lassen
        if (sy + 1 < H) {
          const ground = grid[(sy + 1) * W + sx];
          if (ground === DIRT || ground === SAND || ground === SAND_WET || ground === SAND_DARK) {
            // Setze Samen
            if (rng() < 0.7) {
              grid[sy * W + sx] = PLANT_SEED;
            } else {
              grid[sy * W + sx] = SEED_SUNFLOWER;
            }
            plantTypeGrid[sy * W + sx] = plantTypeGrid[i];
            ageGrid[sy * W + sx] = 0;
            break;
          }
        }
      }
    }
  }
  
  // Verblühen
  if (ageGrid[i] > 100 && rng() < 0.01) {
    grid[i] = PLANT_DEAD;
    plantHealthGrid[i] = 0;
    return;
  }
  
  // Herbst: Blumen sterben
  if (getCurrentSeason() === 2 && ageGrid[i] > 50 && rng() < 0.02) {
    grid[i] = PLANT_DEAD;
    return;
  }
}

// --- updateLeaf(): Blatt-System mit Transpiration ---
// FIX: Abgeleitete Blätter fallen zuverlässig und werden vom Wind erfasst
function updateLeaf(x, y, matId) {
  const i = y * W + x;
  ageGrid[i]++;

  // ABGELÖSTE BLÄTTER fallen sofort und taumeln seitwärts
  if (leafDetached(x, y)) {
    // Hohe Fallwahrscheinlichkeit für abgeleitete Blätter
    if (y + 1 < H) {
      const below = grid[(y + 1) * W + x];
      if (below === EMPTY || isGas(below)) {
        // Sofortiges Fallen mit Taumeln
        const dir = rng() < 0.5 ? -1 : 1;
        if (tryMove(x, y, x, y + 1, matId)) return;
        if (tryMove(x, y, x + dir, y + 1, matId)) return;
        if (tryMove(x, y, x - dir, y + 1, matId)) return;
      } else if (below === WATER) {
        // Blatt treibt auf Wasser – bleibt liegen
      } else if (below === LEAF_OAK || below === LEAF_MAPLE || below === PLANT_LEAF) {
        // Auf anderem Blatt: seitliches Rutschen
        const dir = rng() < 0.5 ? -1 : 1;
        if (tryMove(x, y, x + dir, y, matId)) return;
        if (tryMove(x, y, x - dir, y, matId)) return;
      } else if (isPlant(below)) {
        // Auf Pflanzenteil: seitlich weg und fallen
        const dir = rng() < 0.5 ? -1 : 1;
        if (tryMove(x, y, x + dir, y, matId)) return;
        if (tryMove(x, y, x - dir, y, matId)) return;
      } else if (isSolid(below) || below === WALL || below === STONE) {
        // Feststoff: seitlich weichen und fallen
        const dir = rng() < 0.5 ? -1 : 1;
        if (tryMove(x, y, x + dir, y, matId)) return;
        if (tryMove(x, y, x - dir, y, matId)) return;
      }
    }
    // Wenn unten nichts ist und wir nicht fallen können -> einfach fallen lassen
    // (Wind advektion übernimmt den Rest)
    return;
  }
  
  // Gesundheit
  plantHealthGrid[i] = calculatePlantHealth(x, y, i);
  
  // Aktive Photosynthese
  const sunlight = getSunlightIntensity();
  const lightFactor = hasUnobstructedLight(x, y);
  const effectiveLight = sunlight * lightFactor;
  
  if (effectiveLight > 0.1 && photoActivity > 0) {
    const temp = tempGrid[i];
    const tempFactor = (temp >= 10 && temp <= 35) ? 1.0 :
                       (temp >= 0 && temp <= 45) ? 0.5 : 0.1;
    
    // CO2 aufnehmen und O2 produzieren
    let co2Nearby = false;
    for (let dy = -3; dy <= 3; dy++) {
      for (let dx = -3; dx <= 3; dx++) {
        const nx = x + dx, ny = y + dy;
        if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
          if (grid[ny * W + nx] === CO2) {
            co2Nearby = true;
            if (rng() < 0.02) {
              grid[ny * W + nx] = EMPTY;
            }
          }
        }
      }
    }
    
    const photoRate = 0.003 * photoActivity * effectiveLight * tempFactor;
    if (rng() < photoRate) {
      const dir = Math.floor(rng() * 4);
      const dx = [0, 0, -1, 1][dir];
      const dy = [-1, 1, 0, 0][dir];
      const nx = x + dx, ny = y + dy;
      if (nx >= 0 && nx < W && ny >= 0 && ny < H && grid[ny * W + nx] === EMPTY) {
        if (sunCycleEnabled && !isDaytime) {
          grid[ny * W + nx] = CO2; // Nachts: Atmung
        } else {
          grid[ny * W + nx] = OXYGEN; // Tags: Photosynthese
        }
      }
    }
  }
  
  // Transpiration: Gibt Wasser ab
  if (plantWaterGrid[i] > 20 && rng() < 0.005) {
    plantWaterGrid[i] -= 5;
    // Wasser in die Luft als Feuchtigkeit
    if (y > 0 && grid[(y - 1) * W + x] === EMPTY && rng() < 0.3) {
      grid[(y - 1) * W + x] = STEAM; // Vereinfacht: gibt Wasserdampf ab
      tempGrid[(y - 1) * W + x] = 20;
    }
  }
  
  // Herbst-Färbung
  const autumnFactor = getAutumnColorFactor();
  if (autumnFactor > 0.3) {
    plantHealthGrid[i] -= autumnFactor * 2;
  }
  
  // Blatt fällt im Herbst/Winter (Laubabwurf) – im Frühling/Sommer bleiben Blätter.
  const ls = getCurrentSeason();
  if (ls === 3 && rng() < 0.015) { // Winter: Laubabwurf
    grid[i] = PLANT_DEAD;
    plantHealthGrid[i] = 0;
    return;
  }
  if (ls === 2 && rng() < 0.004) { // Herbst: beginnender Abwurf
    grid[i] = PLANT_DEAD;
    plantHealthGrid[i] = 0;
    return;
  }
  
  // Alterung: nur sehr alte UND ungesunde Blätter sterben (verhindert kahle Bäume).
  if (ageGrid[i] > 400 && plantHealthGrid[i] < 30 && rng() < 0.004) {
    grid[i] = PLANT_DEAD;
    plantHealthGrid[i] = 0;
    return;
  }
}

// --- updateRootSystem(): Wurzel-System mit Safttransport (Phase 1.4) ---
function updateRootSystem(x, y, matId) {
  const i = y * W + x;
  ageGrid[i]++;

  // Gesundheit
  plantHealthGrid[i] = calculatePlantHealth(x, y, i);

  // Wasser aus dem Boden aufnehmen
  let waterAbsorbed = false;
  for (let dy = 1; dy <= 5; dy++) {
    if (y + dy >= H) break;
    const ni = (y + dy) * W + x;
    if (grid[ni] === WATER) {
      plantWaterGrid[i] = Math.min(100, plantWaterGrid[i] + 12);
      soilNutrientGrid[ni] = Math.min(100, soilNutrientGrid[ni] + 1);
      if (rng() < 0.015) {
        grid[ni] = SAND_WET;
        waterAbsorbed = true;
      }
      break;
    } else if (grid[ni] === SAND_WET) {
      if (rng() < 0.008) {
        grid[ni] = SAND;
        plantWaterGrid[i] = Math.min(100, plantWaterGrid[i] + 6);
        waterAbsorbed = true;
      }
    }
  }

  // Nährstoffe aus DIRT aufnehmen
  if (!waterAbsorbed) {
    for (let dy = 1; dy <= 4; dy++) {
      if (y + dy >= H) break;
      const ni = (y + dy) * W + x;
      if (grid[ni] === DIRT && soilNutrientGrid[ni] > 5) {
        soilNutrientGrid[ni] -= 2;
        plantSapGrid[i] = Math.min(100, plantSapGrid[i] + 4);
      }
    }
  }

  // Wuchs: Wurzeln bilden sich weiter (breiter und tiefer)
  if (plantHealthGrid[i] > 25 && rng() < 0.006 * getSeasonGrowthFactor()) {
    // Nach unten
    if (y + 1 < H && grid[(y + 1) * W + x] === EMPTY) {
      grid[(y + 1) * W + x] = ROOT_SYSTEM;
      plantTypeGrid[(y + 1) * W + x] = plantTypeGrid[i];
      plantHealthGrid[(y + 1) * W + x] = plantHealthGrid[i];
      plantIdGrid[(y + 1) * W + x] = plantIdGrid[i];
      ageGrid[(y + 1) * W + x] = 0;
    }
    // Seitlich (beidseitig, mehr Verzweigung)
    if (rng() < 0.6 && x > 0 && grid[y * W + (x - 1)] === EMPTY) {
      grid[y * W + (x - 1)] = ROOT_SYSTEM;
      plantTypeGrid[y * W + (x - 1)] = plantTypeGrid[i];
      plantHealthGrid[y * W + (x - 1)] = plantHealthGrid[i];
      plantIdGrid[y * W + (x - 1)] = plantIdGrid[i];
      ageGrid[y * W + (x - 1)] = 0;
    } else if (x + 1 < W && grid[y * W + (x + 1)] === EMPTY) {
      grid[y * W + (x + 1)] = ROOT_SYSTEM;
      plantTypeGrid[y * W + (x + 1)] = plantTypeGrid[i];
      plantHealthGrid[y * W + (x + 1)] = plantHealthGrid[i];
      plantIdGrid[y * W + (x + 1)] = plantIdGrid[i];
      ageGrid[y * W + (x + 1)] = 0;
    }
  }

  // Transportiere Wasser nach oben zur Pflanze
  if (y > 0 && plantWaterGrid[i] > 30) {
    const above = grid[(y - 1) * W + x];
    if (above === PLANT || above === PLANT_STEM || above === PLANT_MATURE ||
        above === PLANT_SPROUT || above === PLANT_ROOT || above === ROOT_SYSTEM) {
      const ni = (y - 1) * W + x;
      plantWaterGrid[ni] = Math.min(100, plantWaterGrid[ni] + plantWaterGrid[i] * 0.35);
      plantWaterGrid[i] *= 0.65;
    }
  }

  // Sterben wenn zu trocken
  if (plantWaterGrid[i] <= 0 && ageGrid[i] > 50 && rng() < 0.01) {
    grid[i] = PLANT_DEAD;
    plantHealthGrid[i] = 0;
    return;
  }
}

// --- updatePlantDead(): Zersetzungssystem (DEUTLICH VERLANGSAMT) ---
function updatePlantDead(x, y, matId) {
  const i = y * W + x;
  ageGrid[i]++;
  
  // Zersetzung durch Bakterien/Schimmel (sehr langsam)
  let decomposerNearby = false;
  const neighbors = [i-1, i+1, i-W, i+W, i-W-1, i-W+1, i+W-1, i+W+1];
  for (const ni of neighbors) {
    if (ni >= 0 && ni < N) {
      const nMat = grid[ni];
      if (nMat === BACTERIA || nMat === MOLD || nMat === MYCELIUM) {
        decomposerNearby = true;
        // Very slow decomposition
        if (rng() < 0.001) {
          grid[i] = DIRT;
          // Return nutrients to soil
          if (y + 1 < H) {
            const below = grid[(y + 1) * W + x];
            if (below === DIRT && soilNutrientGrid[(y + 1) * W + x] < 100) {
              soilNutrientGrid[(y + 1) * W + x] = Math.min(100, soilNutrientGrid[(y + 1) * W + x] + 3);
            }
          }
          return;
        }
      }
    }
  }

  // Very slow natural decomposition; dead plants persist a long time
  const decomposeRate = decomposerNearby ? 0.0005 : 0.0001;
  if (ageGrid[i] > 400 && rng() < decomposeRate) {
    grid[i] = DIRT;
    // Nährstoffe zurück
    if (y + 1 < H) {
      const ni = (y + 1) * W + x;
      if (grid[ni] === DIRT) {
        soilNutrientGrid[ni] = Math.min(100, soilNutrientGrid[ni] + 5);
      }
    }
    return;
  }
  
  // Bei Feuchtigkeit wird es zu Kompost (DEUTLICH VERLANGSAMT)
  let moistureNearby = 0;
  for (let dy = -2; dy <= 2; dy++) {
    for (let dx = -2; dx <= 2; dx++) {
      const nx = x + dx, ny = y + dy;
      if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
        if (grid[ny * W + nx] === WATER || grid[ny * W + nx] === SAND_WET) {
          moistureNearby += 2;
        }
      }
    }
  }
  
  // DEUTLICH VERLANGSAMT: moistureNearby >= 3 && ageGrid[i] > 200 && rng() < 0.0005
  if (moistureNearby >= 3 && ageGrid[i] > 200 && rng() < 0.0005) {
    grid[i] = DIRT;
    if (y + 1 < H) {
      const ni = (y + 1) * W + x;
      if (grid[ni] === DIRT) {
        soilNutrientGrid[ni] = Math.min(100, soilNutrientGrid[ni] + 15);
      }
    }
  }
}

// --- updateFlowerSeed(): Blumen-Samen (Phase 2.1) ---
function updateFlowerSeed(x, y, matId) {
  const i = y * W + x;
  ageGrid[i]++;

  // Feuchtigkeit
  let moistureLevel = 0;
  for (let dy = -2; dy <= 2; dy++) {
    for (let dx = -2; dx <= 2; dx++) {
      const nx = x + dx, ny = y + dy;
      if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
        const ni = ny * W + nx;
        if (grid[ni] === WATER) moistureLevel += 3;
        if (grid[ni] === SAND_WET || grid[ni] === DIRT) moistureLevel += 1;
      }
    }
  }

  // Bodenkontakt
  let onSoil = false;
  if (y + 1 < H) {
    const below = grid[(y + 1) * W + x];
    onSoil = (below === DIRT || below === SAND_WET || below === SAND || below === SAND_DARK || below === STONE || below === WALL || below === GRAVEL);
  }

  // Keimung zu Blume
  if (onSoil && moistureLevel >= 2 && ageGrid[i] > 5) {
    const temp = tempGrid[i];
    if (temp >= 10 && temp <= 30 && rng() < 0.006 * getSeasonGrowthFactor()) {
      const r = rng();
      if (r < 0.4) {
        grid[i] = FLOWER_DANDELION;
      } else if (r < 0.7) {
        grid[i] = FLOWER_TULIP;
      } else {
        grid[i] = FLOWER_POPPY;
      }
      plantTypeGrid[i] = 1;
      plantStageGrid[i] = 4;
      plantHealthGrid[i] = 60;
      ageGrid[i] = 0;
      return;
    }
  }

  // Verdirbt bei Stauwasser
  if (moistureLevel >= 6 && ageGrid[i] > 100 && rng() < 0.005) {
    grid[i] = DIRT;
  }

  // Alterung
  if (ageGrid[i] > 1000 && rng() < 0.001) {
    grid[i] = DIRT;
  }
}

// --- updateMushroom(): Pilz (Phase 3.2) ---
function updateMushroom(x, y, matId) {
  const i = y * W + x;
  ageGrid[i]++;

  // Feuchtigkeit (inkl. normaler Erde als leichte Bodenfeuchte, damit gemalte
  // Pilze auf gewöhnlichem Boden nicht sofort vergehen).
  let moistureLevel = 0;
  for (let dy = -2; dy <= 2; dy++) {
    for (let dx = -2; dx <= 2; dx++) {
      const nx = x + dx, ny = y + dy;
      if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
        const ni = ny * W + nx;
        if (grid[ni] === WATER) moistureLevel += 3;
        if (grid[ni] === SAND_WET) moistureLevel += 2;
        if (grid[ni] === STEAM) moistureLevel += 1;
        if (grid[ni] === DIRT || grid[ni] === MYCELIUM) moistureLevel += 0.5;
      }
    }
  }

  // Nur in echter Dürre (kein Boden, kein Wasser) vergeht der Pilz – sehr langsam.
  if (moistureLevel < 1 && ageGrid[i] > 300 && rng() < 0.004) {
    grid[i] = DIRT;
    return;
  }

  // Sporen produzieren
  if (ageGrid[i] > 20 && moistureLevel >= 2 && rng() < 0.02) {
    if (y > 0 && grid[(y - 1) * W + x] === EMPTY) {
      grid[(y - 1) * W + x] = SPORE;
      ageGrid[(y - 1) * W + x] = 0;
    }
  }

  // Alterung
  if (ageGrid[i] > 300 && rng() < 0.003) {
    grid[i] = DIRT;
  }
}

/**
 * CHEMICAL REACTIONS - Biologisch/chemisch korrekte Reaktionen
 */
function checkChemicalReactions(x, y, matId) {
  const i = y * W + x;
  const mat = MATS[matId];
  
  // Check neighbors for reactions
  const neighbors = [
    { dx: -1, dy: 0 }, { dx: 1, dy: 0 }, { dx: 0, dy: -1 }, { dx: 0, dy: 1 }
  ];
  
  for (const { dx, dy } of neighbors) {
    const nx = x + dx, ny = y + dy;
    if (nx < 0 || nx >= W || ny < 0 || ny >= H) continue;
    const ni = ny * W + nx;
    const nId = grid[ni];
    const nMat = MATS[nId];
    if (!nMat) continue;
    
    // === COMBUSTION (Verbrennung) - Arrhenius-Kinetik Phase 4.1 ===
    // Reaktionsrate: k = A * exp(-Ea / (R * T))
    // Verbrennung benötigt: Brennstoff + Sauerstoff + Zündtemperatur
    if (matId === FIRE || tempGrid[i] > 300) {
      // Entzündung von brennbaren Materialien mit Arrhenius-Kinetik
      if (nMat.flammability > 0 && nId !== FIRE && nId !== SMOKE && nId !== ASH) {
        const ignitionTemp = nMat.ignitionTemperature || 300;
        const T = Math.max(1, tempGrid[i] + 273.15); // Kelvin
        const R = 8.314; // Gaskonstante
        const Ea = ignitionTemp * R; // Aktivierungsenergie aus Zündtemperatur
        const A = nMat.flammability; // Präexponentieller Faktor
        // Arrhenius-Rate, neu skaliert: Feuer entzündet Brennstoff jetzt zuverlässig,
        // bleibt aber temperaturabhängig (heißeres Feuer zündet schneller).
        const rate = Math.min(0.9, A * Math.exp(-Ea / (R * T)) * 1.2);
        if (tempGrid[i] >= ignitionTemp && rng() < rate) {
          grid[ni] = FIRE;
          tempGrid[ni] = Math.max(700, tempGrid[i]);
          aclAddNeighbors(nx, ny, 2); // Feuer breitet sich aus
        }
      }
      // Wasser -> Dampf (bei >100°C)
      if (nId === WATER && tempGrid[i] >= 100) {
        grid[ni] = STEAM;
        tempGrid[ni] = Math.max(tempGrid[i], 100);
      }
      // Eis -> Wasser (bei >0°C)
      if (nId === ICE && tempGrid[i] > 0) {
        grid[ni] = WATER;
        tempGrid[ni] = Math.max(tempGrid[i], 0);
      }
      // Salz löst sich in Wasser
      if (nId === SALT && matId === WATER && rng() < 0.02) {
        grid[ni] = EMPTY;
        // Salzwasser ist leicht sauer
        phGrid[i] = Math.max(phGrid[i] - 0.1, 5.5);
      }
    }
    
    // === ELEKTROLYSE-SYSTEM Phase 4.2 ===
    // Elektrische Leitfähigkeit ermöglicht Elektrolyse von Wasser
    // 2H₂O → 2H₂ + O₂ (bei Stromfluss)
    if (matId === WATER && nMat.electrical > 0.5 && electricalGrid[i] > 0.5) {
      // Prüfe ob elektrische Verbindung zu einer Spannungsquelle
      let hasCurrent = false;
      const checkNeighbors = [i-1, i+1, i-W, i+W];
      for (const cn of checkNeighbors) {
        if (cn >= 0 && cn < N) {
          const cnMat = MATS[grid[cn]];
          if (cnMat && cnMat.electrical > 1.0 && electricalGrid[cn] > 0.5) {
            hasCurrent = true;
            break;
          }
        }
      }
      
      if (hasCurrent && rng() < 0.002 * electricalGrid[i]) {
        // Elektrolyse: Wasser wird in Wasserstoff und Sauerstoff gespalten
        grid[i] = EMPTY;
        electricalGrid[i] = 0;
        // Wasserstoff steigt auf
        if (y > 0 && grid[(y-1) * W + x] === EMPTY) {
          grid[(y-1) * W + x] = HYDROGEN;
          electricalGrid[(y-1) * W + x] = 0;
        }
        // Sauerstoff bleibt etwas darunter
        if (y > 1 && grid[(y-2) * W + x] === EMPTY) {
          grid[(y-2) * W + x] = OXYGEN;
          electricalGrid[(y-2) * W + x] = 0;
        }
        aclAddNeighbors(x, y, 2);
      }
    }
    
    // === DYNAMISCHE LEGIERUNGSBILDUNG Phase 4.4 ===
    // Metalle können bei hoher Temperatur legieren
    if (isSolid(matId) && nMat.oxidizable && nId !== matId && nMat.oxidizable) {
      // Beide Metalle müssen schmelzfähig sein
      if (tempGrid[i] > Math.min(MATS[matId].melting, nMat.melting) * 0.8) {
        // Prüfe auf mögliche Legierungskombinationen
        const alloyMap = {
          [METAL + '_' + SAND]: BRASS, // Kupfer + Zink → Messing (vereinfacht)
        };
        // Generische Legierungsbildung: Zwei verschiedene Metalle → BRASS
        if ((matId === METAL || matId === BRASS) && (nId === METAL || nId === BRASS) && matId !== nId) {
          if (rng() < 0.001) {
            grid[i] = BRASS;
            grid[ni] = BRASS;
            tempGrid[i] = tempGrid[i];
            tempGrid[ni] = tempGrid[ni];
            aclAddNeighbors(x, y, 1);
          }
        }
        // Metall + Lava → geschmolzene Legierung
        if ((matId === METAL && matId === BRASS) && nId === LAVA) {
          if (rng() < 0.002) {
            grid[i] = BRASS;
            aclAddNeighbors(x, y, 1);
          }
        }
      }
    }
    
    // === ACID REACTIONS (Säure-Reaktionen) ===
    if (matId === ACID) {
      // Säure + Metall -> Salz + Wasserstoff (korrekte Chemie!)
      // 2HCl + Fe -> FeCl₂ + H₂
      if (nId === METAL && rng() < 0.03) {
        grid[ni] = RUST; // Metall wird zu Metallionen (vereinfacht: Rost)
        if (rng() < 0.4) {
          grid[i] = EMPTY; // Säure verbraucht
        }
        // Wasserstoffgas produzieren (steigt auf)
        if (y > 0 && grid[(y-1) * W + x] === EMPTY && rng() < 0.5) {
          grid[(y-1) * W + x] = HYDROGEN;
        }
      }
      // Säure + Base (Neutralisation) - exotherm!
      // HCl + NaOH -> NaCl + H₂O
      if (nId === SODA || nId === BLOOD_ALKALI) {
        grid[ni] = DIRT; // Salz entsteht (vereinfacht: Erde)
        grid[i] = WATER;
        tempGrid[i] = 80; // Stark exotherm!
        tempGrid[ni] = 80;
        phGrid[i] = 7.0; // Neutral
      }
      // Säure + Schwefel -> Schwefeldioxid (SO₂)
      if (nId === SULFUR && rng() < 0.02) {
        grid[ni] = SMOKE; // SO₂
        if (rng() < 0.3) grid[i] = EMPTY;
      }
      // Säure + Carbonat (Kalkstein) -> CO₂
      // 2HCl + CaCO₃ -> CaCl₂ + H₂O + CO₂
      if (nId === STONE && rng() < 0.015) {
        grid[i] = EMPTY; // Säure verbraucht
        // CO₂-Gas entsteht (steigt nicht auf, ist schwerer als Luft)
        if (y < H-1 && grid[(y+1) * W + x] === EMPTY) {
          grid[(y+1) * W + x] = SMOKE; // CO₂ (als Smoke simuliert)
        }
      }
      // Säure zerstört organische Materie
      if (isPlant(nId) || nId === PLANT_DEAD || nId === WOOD || nId === OIL) {
        grid[ni] = ASH;
        if (rng() < 0.3) grid[i] = EMPTY;
      }
      // Säure frisst sich durch Materialien
      if (nMat.id !== ACID && nMat.id !== GLASS && nMat.id !== PLASTIC && rng() < 0.005) {
        grid[ni] = ASH;
      }
    }
    
    // === BASE (ALKALI) REACTIONS (Lauge-Reaktionen) ===
    if (matId === SODA || matId === BLOOD_ALKALI) {
      // Base + Säure (Neutralisation)
      if (nId === ACID) {
        grid[i] = WATER;
        grid[ni] = DIRT; // Salz
        tempGrid[i] = 80;
        tempGrid[ni] = 80;
        phGrid[i] = 7.0;
      }
      // Lauge + Öl -> Seife (Verseifung!)
      // Triglycerid + 3NaOH -> Glycerin + 3 Seifenmoleküle
      if (nId === OIL && rng() < 0.02) {
        grid[ni] = WATER; // Vereinfacht: Wasser
        if (rng() < 0.4) grid[i] = WATER;
      }
      // Lauge löst organische Materie (Holz, Pflanzen)
      if ((nId === WOOD || isPlant(nId)) && rng() < 0.01) {
        grid[ni] = ASH;
        if (rng() < 0.2) grid[i] = EMPTY;
      }
    }
    
    // === pH-SENSITIVE REACTIONS Phase 4.2 ===
    // Säure frisst Metall (schneller bei niedrigem pH)
    if (nId === METAL && phGrid[i] < 4 && matId !== METAL) {
      const phRate = (4 - phGrid[i]) * 0.001;
      if (rng() < phRate) {
        grid[ni] = RUST;
        phGrid[i] = Math.min(7, phGrid[i] + 0.5); // Säure verbraucht
        aclAddNeighbors(nx, ny, 1);
      }
    }
    // Base löst Fett/Öl (schneller bei hohem pH)
    if (nId === OIL && phGrid[i] > 10 && matId !== OIL) {
      const phRate = (phGrid[i] - 10) * 0.001;
      if (rng() < phRate) {
        grid[ni] = WATER; // Verseifung
        phGrid[i] = Math.max(7, phGrid[i] - 0.5);
        aclAddNeighbors(nx, ny, 1);
      }
    }
    
    // === OXIDATION (Rostbildung) ===
    // 4Fe + 3O₂ -> 2Fe₂O₃ (Rost)
    // Benötigt: Metall + Sauerstoff + Feuchtigkeit (beschleunigt)
    if (nId === METAL && matId === OXYGEN) {
      // Feuchtigkeit + pH beschleunigen Rostbildung
      const moistureFactor = (phGrid[i] < 6) ? 3 : 1; // Saures Wasser rostet schneller
      if (rng() < 0.001 * moistureFactor) {
        grid[ni] = RUST;
        tempGrid[i] += 10; // Leicht exotherm
        aclAddNeighbors(nx, ny, 1);
      }
    }
    // Rost kann durch Wasserstoff reduziert werden (bei hoher Temperatur)
    // Fe₂O₃ + 3H₂ -> 2Fe + 3H₂O
    if (nId === RUST && matId === HYDROGEN && tempGrid[i] > 250 && rng() < 0.03) {
      grid[ni] = METAL;
      grid[i] = STEAM;
    }
    // Rost kann durch Säure entfernt werden
    if (nId === RUST && matId === ACID && rng() < 0.02) {
      grid[ni] = EMPTY; // Rost gelöst
      if (rng() < 0.3) grid[i] = EMPTY;
    }
    
    // === HYDROGEN + CHLORINE → HCl REACTION ===
    // H2 + Cl2 → 2HCl (bei Licht oder Hitze)
    if ((matId === HYDROGEN && nId === CHLORINE) || (matId === CHLORINE && nId === HYDROGEN)) {
      if (matId === FIRE || nId === FIRE || tempGrid[i] > 200 || rng() < 0.002) {
        // Produziert HCl-Gas (Säure in Gasform)
        grid[i] = ACID;
        grid[ni] = ACID;
        tempGrid[i] = 100;
        tempGrid[ni] = 100;
      }
    }
    
    // === HYDROGEN + OXYGEN EXPLOSION ===
    if ((matId === HYDROGEN && nId === OXYGEN) || (matId === OXYGEN && nId === HYDROGEN)) {
      if (matId === FIRE || nId === FIRE || tempGrid[i] > 200 || tempGrid[ni] > 200 || rng() < 0.001) {
        // H2+O2 explosion creates water vapor and water droplets (not ash!)
        const explosionRadius = 8;
        for (let dy = -explosionRadius; dy <= explosionRadius; dy++) {
          for (let dx = -explosionRadius; dx <= explosionRadius; dx++) {
            if (dx * dx + dy * dy > explosionRadius * explosionRadius) continue;
            const nx = x + dx, ny = y + dy;
            if (nx < 0 || nx >= W || ny < 0 || ny >= H) continue;
            const ni = ny * W + nx;
            const neighborMat = MATS[grid[ni]];
            
            if (neighborMat && neighborMat.id !== WALL && neighborMat.id !== CLONE) {
              const dist = Math.sqrt(dx * dx + dy * dy);
              const intensity = 1 - dist / explosionRadius;
              
              if (grid[ni] === HYDROGEN || grid[ni] === OXYGEN) {
                // Convert unreacted gases to water
                if (tempGrid[ni] > 200) {
                  grid[ni] = STEAM;
                  tempGrid[ni] = 120;
                } else {
                  grid[ni] = WATER;
                  tempGrid[ni] = 30;
                }
              } else if (neighborMat.id === WATER) {
                // More water created
                tempGrid[ni] = Math.min(tempGrid[ni] + 50, 100);
              } else if (neighborMat.id === FIRE) {
                grid[ni] = STEAM;
                tempGrid[ni] = 100;
              } else if (neighborMat.id === URANIUM) {
                // Nuclear chain reaction!
                explode(nx, ny, explosionRadius * 0.5, false);
              } else if (neighborMat.flammability > 0 && rng() < intensity * 0.3) {
                grid[ni] = FIRE;
                tempGrid[ni] = 600 * intensity;
              } else if (neighborMat.id === WATER) {
                grid[ni] = STEAM;
                tempGrid[ni] = 100;
              }
            }
          }
        }
        // Create water droplets that fall as "rain" from explosion
        for (let k = 0; k < 15; k++) {
          const rx = x + Math.floor(rng() * explosionRadius * 2) - explosionRadius;
          const ry = y + Math.floor(rng() * explosionRadius * 2) - explosionRadius;
          if (rx >= 0 && rx < W && ry >= 0 && ry < H && grid[ry * W + rx] === EMPTY) {
            grid[ry * W + rx] = WATER;
            tempGrid[ry * W + rx] = 25;
          }
        }
        return true;
      }
    }
    
    // === LAVA + WATER -> STONE/OBSIDIAN + STEAM ===
    if (matId === LAVA && nId === WATER) {
      // Rapid cooling creates glass/obsidian, slow cooling creates stone
      grid[ni] = STEAM;
      if (rng() < 0.15) {
        grid[i] = GLASS; // Obsidian-like glass from rapid quenching
        tempGrid[i] = 100;
      } else if (rng() < 0.5) {
        grid[i] = STONE;
        tempGrid[i] = 200;
      }
    }
    // Water + Lava heat transfer
    if (matId === WATER && nId === LAVA) {
      grid[i] = STEAM;
      tempGrid[ni] = Math.max(tempGrid[ni], 500); // Lava stays hot
    }
    
    // === SULFUR + FIRE -> SMOKE (SO2) ===
    if (matId === FIRE && nId === SULFUR) {
      grid[ni] = SMOKE;
    }
    
    // === PHOSPHORUS AUTO-IGNITION ===
    if (nId === PHOSPHORUS && nMat.autoFlammable && tempGrid[i] > 44) {
      grid[ni] = FIRE;
      tempGrid[ni] = 600;
    }
    if (matId === FIRE && nId === PHOSPHORUS) {
      grid[ni] = FIRE;
      tempGrid[ni] = 800;
    }
    
    // === URANIUM RADIATION ===
    if (nId === URANIUM) {
      // Uranium emits radiation continuously - slower, more realistic
      if (rng() < 0.002) {
        // Radiation spreads in a cross pattern (realistic radiation diffusion)
        const radDirs = [{dx:0,dy:-1},{dx:0,dy:1},{dx:-1,dy:0},{dx:1,dy:0}];
        for (const {dx: d2x, dy: d2y} of radDirs) {
          const nnx = nx + d2x, nny = ny + d2y;
          if (nnx >= 0 && nnx < W && nny >= 0 && nny < H && grid[nny * W + nnx] === EMPTY && rng() < 0.15) {
            grid[nny * W + nnx] = RADIATION;
            break;
          }
        }
      }
      
      // Radiation damages nearby organic matter - less aggressive
      for (const {dx: d2x, dy: d2y} of neighbors) {
        const nnx = nx + d2x, nny = ny + d2y;
        if (nnx >= 0 && nnx < W && nny >= 0 && nny < H) {
          const nni = nny * W + nnx;
          const nMatId = grid[nni];
          
          // Radiation damages plants - slower
          if (isPlant(nMatId)) {
            if (rng() < 0.01) {
              grid[nni] = PLANT_DEAD;
              ageGrid[nni] = 0;
            }
          }
          // Radiation accelerates decay of dead plants
          if (nMatId === PLANT_DEAD && rng() < 0.02) {
            // Creates radioactive contaminated soil
            grid[nni] = DIRT;
            // Add radiation on top
            if (nny > 0 && grid[(nny-1) * W + nnx] === EMPTY) {
              grid[(nny-1) * W + nnx] = RADIATION;
            }
          }
          // Radiation damages mold - slower
          if (nMatId === MOLD && rng() < 0.01) {
            grid[nni] = ASH;
          }
          // Radiation affects bacteria - slower
          if (nMatId === BACTERIA && rng() < 0.015) {
            // Bacteria break down into radioactive ash
            grid[nni] = ASH;
            // Spread radiation
            for (const {dx: d3x, dy: d3y} of neighbors) {
              const mnx = nx + d3x, mny = ny + d3y;
              if (mnx >= 0 && mnx < W && mny >= 0 && mny < H && grid[mny * W + mnx] === EMPTY && rng() < 0.1) {
                grid[mny * W + mnx] = RADIATION;
                break;
              }
            }
          }
        }
      }
      
      // Radiation creates radioactive waste from nearby materials - slower
      if (rng() < 0.001) {
        for (const {dx: d2x, dy: d2y} of neighbors) {
          const nnx = nx + d2x, nny = ny + d2y;
          if (nnx >= 0 && nnx < W && nny >= 0 && nny < H) {
            const nMatId = grid[nny * W + nnx];
            // Contaminate ground materials - they become radioactive waste
            if ((nMatId === DIRT || nMatId === SAND || nMatId === SAND_DARK || nMatId === GRAVEL || nMatId === STONE) && rng() < 0.2) {
              // Mark material as contaminated by adding radiation on top
              if (nny > 0 && grid[(nny-1) * W + nnx] === EMPTY) {
                grid[(nny-1) * W + nnx] = RADIATION;
              }
              // The ground material itself slowly becomes radioactive ash
              if (rng() < 0.05) {
                grid[nny * W + nnx] = ASH; // Contaminated ash = radioactive waste
              }
              break;
            }
            // Water becomes radioactive waste water
            if (nMatId === WATER && rng() < 0.08) {
              // Water stays but becomes radioactive (shown by radiation particle)
              if (nny > 0 && grid[(nny-1) * W + nnx] === EMPTY) {
                grid[(nny-1) * W + nnx] = RADIATION;
              }
            }
          }
        }
      }
    }
    
    // Radiation affects living organisms - less aggressive
    if (matId === RADIATION) {
      // Radiation spreads to adjacent cells - slower
      if (rng() < 0.02) {
        const radDirs = [{dx:0,dy:-1},{dx:0,dy:1},{dx:-1,dy:0},{dx:1,dy:0}];
        for (const {dx: d2x, dy: d2y} of radDirs) {
          const nnx = nx + d2x, nny = ny + d2y;
          if (nnx >= 0 && nnx < W && nny >= 0 && nny < H && grid[nny * W + nnx] === EMPTY && rng() < 0.2) {
            grid[nny * W + nnx] = RADIATION;
            break;
          }
        }
      }
      
      // Radiation damages nearby organic matter in a larger radius - slower
      for (let dy = -2; dy <= 2; dy++) {
        for (let dx = -2; dx <= 2; dx++) {
          const nnx = x + dx, nny = y + dy;
          if (nnx >= 0 && nnx < W && nny >= 0 && nny < H) {
            const nMatId = grid[nny * W + nnx];
            const dist = Math.sqrt(dx * dx + dy * dy);
            const damageChance = Math.max(0.01, 0.06 - dist * 0.02);
            
            // Radiation kills plants on contact/nearby
            if (isPlant(nMatId) && rng() < damageChance) {
              grid[nny * W + nnx] = PLANT_DEAD;
              ageGrid[nny * W + nnx] = 0;
            }
            // Radiation kills bacteria on contact/nearby
            if (nMatId === BACTERIA && rng() < damageChance * 1.2) {
              grid[nny * W + nnx] = ASH;
            }
            // Radiation kills mold on contact/nearby
            if (nMatId === MOLD && rng() < damageChance * 0.8) {
              grid[nny * W + nnx] = ASH;
            }
            // Radiation damages organic matter
            if (isOrganic(nMatId) && nMatId !== MOLD && nMatId !== BACTERIA && rng() < damageChance * 0.5) {
              grid[nny * W + nnx] = PLANT_DEAD;
            }
          }
        }
      }
      
      // Radiation decays over time (slower)
      if (rng() < 0.06) grid[i] = EMPTY;
    }
    
    // === ALCOHOL + FIRE ===
    if (matId === FIRE && nId === ALCOHOL) {
      grid[ni] = FIRE;
      tempGrid[ni] = 800;
    }
    
    // === HONEY CARAMELIZATION ===
    if (nId === HONEY && tempGrid[i] > 110 && rng() < 0.02) {
      grid[ni] = ASH;
    }
    
    // === MERCURY + SULFUR -> MERCURY SULFIDE (red powder) ===
    if ((matId === MERCURY && nId === SULFUR) || (matId === SULFUR && nId === MERCURY)) {
      if (rng() < 0.01) {
        grid[i] = RUST; // Simplified: turns to red powder (using rust color)
        grid[ni] = RUST;
      }
    }
  }
  
  return false;
}

/**
 * EXPLOSION SYSTEM - Realistic blast physics
 * Handles TNT, fireballs, and other explosives with proper energy distribution
 */
function explode(cx, cy, radius, isTNT) {
  // TNT produces a more powerful, concentrated blast with different effects by zone
  const blastType = isTNT ? 'tnt' : 'fireball';
  const energy = isTNT ? 1500 : 1000; // TNT has higher energy density
  
  // Phase 1: Blast wave - instant destruction in center, pressure effects outward
  for (let dy = -radius; dy <= radius; dy++) {
    for (let dx = -radius; dx <= radius; dx++) {
      if (dx * dx + dy * dy > radius * radius) continue;
      const nx = cx + dx, ny = cy + dy;
      if (nx < 0 || nx >= W || ny < 0 || ny >= H) continue;
      const ni = ny * W + nx;
      // Active Cell List: Explosions markieren alle betroffenen Zellen
      aclAddNeighbors(nx, ny, 1);
      const mat = MATS[grid[ni]];
      if (!mat) continue;
      
      const dist = Math.sqrt(dx * dx + dy * dy);
      const normDist = dist / radius; // 0 = center, 1 = edge
      
      // Define blast zones
      let intensity;
      if (blastType === 'tnt') {
        // TNT: very intense center, rapid falloff
        intensity = normDist < 0.3 ? 1.0 : Math.max(0, 1.0 - (normDist - 0.3) / 0.7);
      } else {
        // Fireball: more gradual falloff
        intensity = Math.max(0, 1.0 - normDist);
      }
      
      // Zone-based effects
      if (mat.id === WALL || mat.id === CLONE) {
        // Walls resist explosion but can crack
        if (blastType === 'tnt' && intensity > 0.8 && rng() < 0.3) {
          grid[ni] = STONE; // Wall cracks into stone
          tempGrid[ni] = 200;
        }
        continue;
      }
      
      if (mat.id === TNT) {
        // Chain reaction: adjacent TNT detonates
        if (intensity > 0.5) {
          explode(nx, ny, radius * 0.5, true);
        }
        continue;
      }
      
      if (mat.id === URANIUM) {
        // Nuclear chain reaction!
        explode(nx, ny, radius * 0.6, false);
        continue;
      }
      
      // Calculate thermal energy deposited
      const thermalEnergy = intensity * energy;
      
      if (blastType === 'tnt') {
        // TNT blast: crushing pressure + heat
        if (intensity > 0.7) {
          // Center zone: complete vaporization
          if (mat.id !== WALL && mat.id !== CLONE) {
            grid[ni] = SMOKE;
            tempGrid[ni] = thermalEnergy;
          }
        } else if (intensity > 0.4) {
          // Inner zone: combustion and melting
          if (mat.id === WATER) {
            grid[ni] = STEAM;
            tempGrid[ni] = 300;
          } else if (mat.id === ICE) {
            grid[ni] = WATER;
            tempGrid[ni] = 100;
          } else if (mat.oxidizable || mat.id === METAL) {
            if (thermalEnergy > mat.melting * 0.5) {
              grid[ni] = LAVA;
              tempGrid[ni] = thermalEnergy * 0.5;
            } else {
              grid[ni] = RUST;
            }
          } else if (mat.flammability > 0 || mat.id === OIL || mat.id === ALCOHOL || mat.id === HONEY) {
            grid[ni] = FIRE;
            tempGrid[ni] = thermalEnergy;
          } else if (mat.id === PLANT || mat.id === PLANT_FLOWER || mat.id === PLANT_DEAD || mat.id === WOOD) {
            grid[ni] = FIRE;
            tempGrid[ni] = thermalEnergy;
          } else if (mat.id === DIRT || mat.id === SAND || mat.id === SAND_DARK || mat.id === GRAVEL) {
            // Ground is compacted/vitrified
            if (intensity > 0.6 && rng() < 0.3) {
              grid[ni] = GLASS; // Sand vitrifies to glass
              tempGrid[ni] = 500;
            } else {
              grid[ni] = ASH; // Organic content burns
            }
          } else {
            grid[ni] = intensity > 0.6 ? FIRE : SMOKE;
            tempGrid[ni] = thermalEnergy * 0.5;
          }
        } else {
          // Outer zone: heat and smoke only
          if (mat.id === WATER) {
            grid[ni] = STEAM;
          } else if (mat.flammability > 0.5 && thermalEnergy > 200) {
            grid[ni] = FIRE;
            tempGrid[ni] = thermalEnergy;
          } else {
            grid[ni] = SMOKE;
            tempGrid[ni] = thermalEnergy * 0.3;
          }
        }
      } else {
        // Fireball explosion: more heat, less pressure
        if (mat.id === WATER) {
          grid[ni] = STEAM;
          tempGrid[ni] = Math.min(400, thermalEnergy);
        } else if (mat.flammability > 0 || mat.id === OIL || mat.id === ALCOHOL) {
          grid[ni] = FIRE;
          tempGrid[ni] = thermalEnergy;
        } else if (mat.id === PLANT || mat.id === PLANT_FLOWER || mat.id === PLANT_DEAD || mat.id === WOOD) {
          grid[ni] = FIRE;
          tempGrid[ni] = thermalEnergy;
        } else if (rng() < intensity * 0.6) {
          grid[ni] = intensity > 0.5 ? FIRE : SMOKE;
          tempGrid[ni] = thermalEnergy * 0.4;
        }
      }
    }
  }
  
  // TNT produces characteristic mushroom cloud
  if (blastType === 'tnt') {
    // Smoke column rises from explosion
    for (let i = 0; i < radius * 3; i++) {
      const smokeX = cx + Math.floor(rng() * radius * 2) - radius;
      const smokeY = cy - Math.floor(rng() * radius * 4);
      if (smokeX >= 0 && smokeX < W && smokeY >= 0 && smokeY < H && grid[smokeY * W + smokeX] === EMPTY) {
        grid[smokeY * W + smokeX] = SMOKE;
        tempGrid[smokeY * W + smokeX] = 80;
        ageGrid[smokeY * W + smokeX] = 0;
      }
    }
    // Ash falls back down
    for (let i = 0; i < radius; i++) {
      const ashX = cx + Math.floor(rng() * radius * 4) - radius * 2;
      const ashY = cy + Math.floor(rng() * radius);
      if (ashX >= 0 && ashX < W && ashY >= 0 && ashY < H && grid[ashY * W + ashX] === EMPTY) {
        grid[ashY * W + ashX] = ASH;
      }
    }
  }
}

// Special TNT detonation function
function detonateTNT(x, y) {
  const i = y * W + x;
  grid[i] = EMPTY; // TNT consumed
  explode(x, y, 12, true); // TNT has radius 12
}

/**
 * ÖKOSYSTEM-BODEN: Generiert eine zusammenhängende Erdeschicht am unteren Rand,
 * die NICHT aus dem Bild rieselt. Der Boden besteht aus mehreren Schichten:
 * - Unten: Stein (unveränderlich)
 * - Mitte: Erde (Bodenmaterial)
 * - Oben: Sand_Wet (feuchte Erde für Pflanzen)
 * 
 * Pflanzen erscheinen NUR auf diesem Boden und wachsen NACH OBEN.
 * Kein Material rieselt heraus, weil die unterste Schicht Stein ist.
 */
function generateEcosystemBase() {
  seedRng(Date.now());
  
  // Mindestens 9 Reihen für kompletten Boden (3 Stein + 4 Erde + 2 feucht)
  const minRows = 9;
  if (H < minRows) return; // Grid zu klein
  
  // Untere 3 Reihen = Stein (unveränderlich, rieselt nicht)
  const stoneRows = 3;
  for (let y = H - stoneRows; y < H; y++) {
    for (let x = 0; x < W; x++) {
      if (grid[y * W + x] === EMPTY) {
        grid[y * W + x] = STONE;
        tempGrid[y * W + x] = 20;
        ageGrid[y * W + x] = 0;
      }
    }
  }
  
  // Mittlere 4 Reihen = Erde (Bodenmaterial für Pflanzen)
  const dirtRows = 4;
  for (let y = H - stoneRows - dirtRows; y < H - stoneRows; y++) {
    for (let x = 0; x < W; x++) {
      if (grid[y * W + x] === EMPTY) {
        // Leichte Oberflächenunebenheit für natürlicheres Aussehen
        const bump = rng() < 0.15 ? (rng() < 0.5 ? 1 : -1) : 0;
        const ty = Math.max(0, Math.min(H - 1, y + bump));
        grid[ty * W + x] = DIRT;
        tempGrid[ty * W + x] = 20;
        ageGrid[ty * W + x] = 0;
      }
    }
  }
  
  // Oberste 2 Reihen = feuchte Erde (SAND_WET) direkt über der normalen Erde
  const wetRows = 2;
  for (let y = H - stoneRows - dirtRows - wetRows; y < H - stoneRows - dirtRows; y++) {
    for (let x = 0; x < W; x++) {
      if (grid[y * W + x] === EMPTY) {
        grid[y * W + x] = SAND_WET;
        tempGrid[y * W + x] = 20;
        ageGrid[y * W + x] = 0;
      }
    }
  }
  
  // Initial-Bewuchs: Samen, Sporen, Pilze UND BÄUME auf dem feuchten Boden
  // Diese erscheinen NUR auf der Oberfläche des Bodens
  for (let x = 0; x < W; x++) {
    // Finde die oberste Bodenschicht an dieser Position
    let topSoilY = -1;
    for (let y = H - 1; y >= 0; y--) {
      const m = grid[y * W + x];
      if (m === DIRT || m === SAND_WET || m === SAND || m === SAND_DARK) {
        topSoilY = y;
        break;
      }
    }
    if (topSoilY <= 0) continue; // Nichts drüber zum Wachsen
    
    // Nur an einigen Stellen (nicht überall) Bewuchs
    if (rng() < 0.35) {
      const aboveY = topSoilY - 1;
      if (aboveY >= 0 && grid[aboveY * W + x] === EMPTY) {
        const r = rng();
        if (r < 0.02) {
          // 2% Chance: Kleiner Baum-Setzling (statt Samen)
          stampTree(x, topSoilY);
        } else if (r < 0.4) {
          grid[aboveY * W + x] = PLANT_SEED;
          plantTypeGrid[aboveY * W + x] = 1 + Math.floor(rng() * 2);
          plantStageGrid[aboveY * W + x] = 0;
          plantHealthGrid[aboveY * W + x] = 50;
          plantIdGrid[aboveY * W + x] = nextPlantId++;
        } else if (r < 0.7) {
          grid[aboveY * W + x] = FLOWER_SEED;
          plantTypeGrid[aboveY * W + x] = 1 + Math.floor(rng() * 2);
          plantStageGrid[aboveY * W + x] = 0;
          plantHealthGrid[aboveY * W + x] = 50;
          plantIdGrid[aboveY * W + x] = nextPlantId++;
        } else if (r < 0.85) {
          grid[aboveY * W + x] = MUSHROOM;
          plantTypeGrid[aboveY * W + x] = 3;
          plantStageGrid[aboveY * W + x] = 0;
          plantHealthGrid[aboveY * W + x] = 50;
          plantIdGrid[aboveY * W + x] = nextPlantId++;
        } else {
          grid[aboveY * W + x] = SPORE;
        }
        ageGrid[aboveY * W + x] = 0;
        aclAddNeighbors(x, aboveY, 1);
      }
    }
  }
  
  // Initial-Wolken
  for (let k = 0; k < 8; k++) {
    const sx = Math.floor(rng() * W);
    const cy = 1 + Math.floor(rng() * Math.max(3, Math.floor(H * 0.12)));
    const cw = 4 + Math.floor(rng() * 10);
    const ch = 1 + Math.floor(rng() * 2);
    for (let ck = 0; ck < cw; ck++) {
      const cx = sx + ck;
      for (let cdy = 0; cdy < ch; cdy++) {
        const yy = cy + cdy;
        if (cx >= 0 && cx < W && yy >= 0 && yy < H && grid[yy * W + cx] === EMPTY) {
          grid[yy * W + cx] = CLOUD;
          tempGrid[yy * W + cx] = 10 + Math.floor(rng() * 5);
          ageGrid[yy * W + cx] = 0;
          aclAddNeighbors(cx, yy, 1);
        }
      }
    }
  }
}

/**
 * THERMAL PHYSICS - coupled to sun cycle and seasons
 */
/**
 * WETTERSYSTEM UPDATE Phase 5.1
 */
function updateWeather() {
  weatherTimer++;
  
  // Wetter ändert sich periodisch
  if (weatherTimer >= weatherDuration) {
    weatherTimer = 0;
    weatherDuration = 4000 + Math.floor(rng() * 5000); // Längere Zyklen (war 1500-3500)
    
    // Saisonabhängige Wetterwahrscheinlichkeiten - DEUTlich weniger Regen
    const r = rng();
    
    if (season === 0) { // Frühling
      weather = r < 0.15 ? 'rain' : 'clear';
    } else if (season === 1) { // Sommer
      weather = r < 0.05 ? 'storm' : (r < 0.12 ? 'rain' : 'clear');
    } else if (season === 2) { // Herbst
      weather = r < 0.15 ? 'rain' : 'clear';
    } else { // Winter
      weather = r < 0.1 ? 'snow' : (r < 0.18 ? 'rain' : 'clear');
    }
    
    // Wind
    windSpeed = weather === 'storm' ? 0.8 : (rng() < 0.3 ? 0.3 : 0.1);
    windDirection = rng() < 0.5 ? 1 : -1;
  }
}

function updateThermal(x, y, matId) {
  const i = y * W + x;
  const mat = MATS[matId];
  if (!mat || mat.heatCapacity === 0) return;

  // Heat conduction to neighbors
  if (mat.conductivity > 0 && rng() < 0.15) {
    const neighbors = [];
    if (x > 0) neighbors.push(i - 1);
    if (x < W - 1) neighbors.push(i + 1);
    if (y > 0) neighbors.push(i - W);
    if (y < H - 1) neighbors.push(i + W);

    if (neighbors.length > 0) {
      const ni = neighbors[Math.floor(rng() * neighbors.length)];
      const nMat = MATS[grid[ni]];
      if (!nMat) return;

      const tempDiff = tempGrid[i] - tempGrid[ni];
      if (Math.abs(tempDiff) > 0.5) {
        const transfer = tempDiff * 0.05 * Math.sqrt(mat.conductivity * nMat.conductivity);
        tempGrid[i] -= transfer;
        tempGrid[ni] += transfer;
      }
    }
  }

  // Ambient temperature influenced by sun cycle and season
  let ambientBase = 20;

  if (sunCycleEnabled) {
    // Season effect
    const s = getCurrentSeason();
    if (s === 0) ambientBase += 2;    // Frühling
    else if (s === 1) ambientBase += 8; // Sommer
    else if (s === 2) ambientBase -= 2; // Herbst
    else if (s === 3) ambientBase -= 10; // Winter

    // Day/night effect
    const sunlight = getSunlightIntensity();
    ambientBase += (sunlight - 0.5) * 6; // +3 at day, -3 at night
  }

  const ambientRate = 0.0015 / mat.heatCapacity;
  if (tempGrid[i] > ambientBase + 3) {
    tempGrid[i] -= ambientRate;
  } else if (tempGrid[i] < ambientBase - 3) {
    tempGrid[i] += ambientRate;
  }
  
  // === EGG COAGULATION - Realistic protein denaturation ===
  // Eggs coagulate at 62°C (albumen) and 70°C (yolk)
  if (matId === EGGS && mat.raw) {
    const coagTemp = mat.coagulationTemp || 62;
    if (tempGrid[i] >= coagTemp) {
      // Egg white coagulates - turns from transparent liquid to opaque solid
      grid[i] = COOKED_EGG;
      tempGrid[i] = Math.max(tempGrid[i], 62); // Keep current temperature
      // Cooked egg is now a solid that can be further processed
    }
    // Eggs can also freeze at very low temperatures
    if (tempGrid[i] < -2 && rng() < 0.01) {
      // Frozen egg becomes a solid powder-like substance
      grid[i] = COOKED_EGG;
      tempGrid[i] = -2;
    }
  }
  
  // Phase transitions
  // Melting
  if (mat.melting > 0 && tempGrid[i] >= mat.melting) {
    if (matId === ICE) grid[i] = WATER;
    else if (matId === STONE || matId === METAL || matId === WALL) grid[i] = LAVA;
    else if (matId === GLASS) grid[i] = EMPTY;
    else if (matId === WOOD) { grid[i] = FIRE; tempGrid[i] = 400; }
    else if (matId === RUST) grid[i] = METAL;
    else if (matId === BRASS) grid[i] = LAVA;
    else if (matId === COOKED_EGG) { grid[i] = FIRE; tempGrid[i] = 500; } // Cooked egg burns
  }
  
  // Freezing
  if (mat.melting > 0 && tempGrid[i] <= mat.melting && isLiquid(matId)) {
    if (matId === WATER) grid[i] = ICE;
    else if (matId === LAVA) { grid[i] = STONE; tempGrid[i] = 100; }
  }
  
  // Boiling
  if (mat.boiling > 0 && tempGrid[i] >= mat.boiling) {
    if (matId === WATER || matId === BLOOD) grid[i] = STEAM;
    else if (matId === OIL) { grid[i] = FIRE; tempGrid[i] = 500; }
    else if (matId === ACID) grid[i] = SMOKE;
    else if (matId === COOKED_EGG) { grid[i] = ASH; } // Cooked egg chars
    else if (matId === HONEY) { grid[i] = ASH; }
    else if (matId === ALCOHOL) { grid[i] = FIRE; tempGrid[i] = 600; }
    else if (matId === MERCURY) grid[i] = STEAM;
  }
  
  // === LAVA PHYSICS - Realistic cooling and crystallization ===
  if (matId === LAVA) {
    // Lava cools based on contact with other materials
    if (tempGrid[i] <= 700 && y + 1 < H) {
      // Cooling rate depends on surrounding materials
      const below = grid[(y + 1) * W + x];
      let coolingRate = 0.1; // Base cooling
      
      if (below === WATER || below === ICE) {
        // Rapid cooling on water/ice - forms obsidian-like glass
        coolingRate = 2.0;
        if (tempGrid[i] <= 800 && rng() < 0.05) {
          grid[i] = GLASS; // Obsidian formation
          tempGrid[i] = 100;
        }
      } else if (below === DIRT || below === SAND || below === SAND_DARK) {
        // Slow cooling on ground - forms stone
        coolingRate = 0.3;
        if (tempGrid[i] <= 600 && rng() < 0.02) {
          grid[i] = STONE;
          tempGrid[i] = 200;
        }
      } else {
        // Air cooling
        coolingRate = 0.05;
        if (tempGrid[i] <= 500 && rng() < 0.01) {
          grid[i] = STONE;
          tempGrid[i] = 150;
        }
      }
      
      tempGrid[i] -= coolingRate;
    }
    
    // Lava glows brighter when hotter
    if (tempGrid[i] > 1000) {
      tempGrid[i] = Math.min(1200, tempGrid[i]); // Max temperature
    }
    
    // Lava flows faster when hotter (lower viscosity)
    const viscosityFactor = Math.max(1, (tempGrid[i] - 500) / 200);
  }
  
  // Wet sand formation - water mixes with powder
  if (matId === WATER && y + 1 < H) {
    const below = grid[(y + 1) * W + x];
    if ((below === SAND || below === SAND_DARK || below === GRAVEL) && rng() < 0.02) {
      // Water soaks into powder, creating wet powder
      if (MATS[below] && MATS[below].capillary) {
        grid[(y + 1) * W + x] = SAND_WET;
        tempGrid[(y + 1) * W + x] = tempGrid[i]; // Share temperature
      }
    }
  }
  
  // Condensation
  if (matId === STEAM && tempGrid[i] <= 90) {
    grid[i] = WATER;
    tempGrid[i] = 80;
  }
  
  // Fire behavior
  if (matId === FIRE) {
    tempGrid[i] = Math.max(tempGrid[i], 600);
    ageGrid[i]++;
    
    // Fire produces smoke
    if (rng() < 0.3) {
      const dir = rng() < 0.5 ? -1 : 1;
      for (const d of [dir, -dir]) {
        if (x + d >= 0 && x + d < W && y - 1 >= 0 && grid[(y - 1) * W + x + d] === EMPTY && rng() < 0.2) {
          grid[(y - 1) * W + x + d] = SMOKE;
          tempGrid[(y - 1) * W + x + d] = 80;
          break;
        }
      }
    }
    
    // Fire dies out
    if (ageGrid[i] > 15 + rng() * 25 || rng() < 0.03) {
      grid[i] = rng() < 0.6 ? SMOKE : EMPTY;
      tempGrid[i] = 40;
    }
  }
  
  // Smoke behavior
  if (matId === SMOKE) {
    ageGrid[i]++;
    // Soot settles
    if (mat.soot && rng() < 0.01 && y + 1 < H && grid[(y + 1) * W + x] !== EMPTY) {
      grid[i] = ASH;
    }
    if (ageGrid[i] > 80 + rng() * 120) {
      grid[i] = EMPTY;
      tempGrid[i] = 20;
    }
  }
  
  // Radiation decay
  if (matId === RADIATION) {
    if (rng() < 0.1) grid[i] = EMPTY;
  }
}

/**
 * MAIN SIMULATION - Optimiert mit Active Cell List (Phase 1.1 + 1.3)
 * Konsolidiert 5 Grid-Passes in 2 konsolidierte Passes über Active Cells
 */
// Weht ein leichtes Partikel in Windrichtung; an der offenen Seite hinaus.
// FIX: Mehr Partikeltypen werden vom Wind erfasst, besonders Blätter
function windAdvectCell(x, y, strength) {
  const m = grid[y * W + x];
  if (m === EMPTY) return;
  // Leichte/fliegende Partikel die vom Wind erfasst werden
  const blowable = m === SMOKE || m === STEAM || m === CLOUD || m === SPORE ||
                   m === POLLEN || m === PLANT_SEED || m === FLOWER_SEED ||
                   m === ASH || m === SEED_SUNFLOWER || m === SEED_WHEAT ||
                   m === PLANT_LEAF ||
                   (m === LEAF_OAK && leafDetached(x, y)) ||
                   (m === LEAF_MAPLE && leafDetached(x, y));
  if (!blowable) return;
  if (rng() > strength) return;
  tryMove(x, y, x + windDir, y, m);
}
// Ist ein Blatt von Stamm/Ast gelöst (kein Holz/Stamm direkt benachbart)?
// FIX: Auch PLANT (generic Stamm) und PLANT_ROOT zählen als Halt
function leafDetached(x, y) {
  const holdsLeaf = (m) => m === TREE_WOOD || m === PLANT_STEM || m === PLANT_MATURE ||
                           m === PLANT || m === PLANT_ROOT || m === ROOT_SYSTEM;
  for (let dy = -1; dy <= 1; dy++) for (let dx = -1; dx <= 1; dx++) {
    if (dx === 0 && dy === 0) continue;
    const nx = x + dx, ny = y + dy;
    if (nx < 0 || nx >= W || ny < 0 || ny >= H) continue;
    const nm = grid[ny * W + nx];
    if (holdsLeaf(nm)) return false;
  }
  return true;
}

function simulate() {
  tick++;
  // BUGFIX + PERF: Wake-Scan reaktiviert hängengebliebene Partikel, aber mit
  // Ruhe-Backoff. Solange die Aktivliste lebt, läuft der Voll-Scan nur als
  // seltenes Auffangnetz. Wird die Liste leer (ruhende Szene), prüfen wir, ob
  // sich überhaupt noch etwas bewegen KANN – wenn nicht, vergrößern wir den
  // Scan-Abstand exponentiell (bis ~64 Ticks). So bleibt eine ruhige Szene
  // billig, ein neues Partikel/Mausstrich weckt sofort alles wieder auf.
  if (grid && W && H) {
    const basePeriod = N > 120000 ? 31 : (N > 40000 ? 15 : 7);
    const listEmpty = activeCellsCount === 0;
    const due = listEmpty ? (tick >= __nextScanTick) : ((tick & basePeriod) === 0);
    if (due) {
      const woke = wakeScan();
      aclSwapBuffers();
      if (woke === 0 && listEmpty) {
        // Nichts Bewegliches/Lebendiges -> Szene ruht: Abstand vergrößern.
        __quietScans = Math.min(__quietScans + 1, 6);
        __nextScanTick = tick + (1 << __quietScans); // 2,4,8,...,64 Ticks
      } else {
        __quietScans = 0;
        __nextScanTick = tick + 1;
      }
    }
  }
  
  // Safety check to prevent crashes
  if (!grid || !tempGrid || !ageGrid || !W || !H) {
    return;
  }
  
  // PERF-FIX: Der Spatial-Hash wurde früher jeden Tick über das GESAMTE Grid neu
  // aufgebaut, aber von keiner Funktion abgefragt (spatialHashQuery/CountInRadius
  // werden nirgends genutzt). Dieser Voll-Scan + die Map-Allokationen waren der
  // größte Kostenpunkt pro Tick und wurden ersatzlos entfernt.

  // Wind direction changes with persistence (Trägheit)
  if (windActive) {
    windDirTimer++;
    if (windDirTimer >= windDirDuration) {
      windDirTimer = 0;
      windDirDuration = 200 + Math.floor(rng() * 400);
      if (rng() < 0.15) {
        windDir = -windDir;
      }
      windSpeedVariation = (rng() - 0.5) * 0.3;
    }
  } else {
    windDirTimer = 0;
  }
  
  // === Saison-System aktualisieren ===
  if (sunCycleEnabled) {
    seasonTime++;
    if (seasonTime >= seasonLength) {
      seasonTime = 0;
      season = (season + 1) % 4;
    }
    seasonProgress = seasonTime / seasonLength;
  }
  
  // === WETTERSYSTEM Phase 5.1 ===
  // Nur aktivieren, wenn Ökosystem aktiv ist
  if (ecosystemActive) {
    updateWeather();
    
    // Wettereffekte anwenden - Reduzierte Intensität für stabiles Ökosystem
    if (weather === 'rain' || weather === 'storm') {
      const intensity = weather === 'storm' ? 3 : 1; // Deutlich reduziert - weniger Wasser
      for (let i = 0; i < intensity; i++) {
        const rx = Math.floor(rng() * W);
        const ry = 0;
        if (grid[ry * W + rx] === EMPTY) {
          grid[ry * W + rx] = WATER;
          tempGrid[ry * W + rx] = weather === 'storm' ? 8 : 15;
          aclAddNeighbors(rx, ry, 1);
        }
      }
      humidity = Math.min(100, humidity + 0.1); // Reduzierte Feuchtigkeitszunahme
    } else if (weather === 'snow') {
      // Schnee: Eis-Partikel von oben
      for (let i = 0; i < 50; i++) {
        const rx = Math.floor(rng() * W);
        const ry = 0;
        if (grid[ry * W + rx] === EMPTY) {
          grid[ry * W + rx] = ICE;
          tempGrid[ry * W + rx] = -5;
          aclAddNeighbors(rx, ry, 1);
        }
      }
      humidity = Math.min(100, humidity + 0.2);
    }
    
    // Verdunstung bei klarem Wetter + Sonne
    if (weather === 'clear' && sunIntensity > 0.5) {
      for (let i = 0; i < 20; i++) {
        const rx = Math.floor(rng() * W);
        const ry = Math.floor(rng() * H);
        const ri = ry * W + rx;
        if (grid[ri] === WATER && tempGrid[ri] > 25 && rng() < 0.001 * sunIntensity) {
          grid[ri] = STEAM;
          tempGrid[ri] = 100;
          aclAddNeighbors(rx, ry, 1);
          humidity = Math.max(0, humidity - 0.05);
        }
      }
    }
  }
  
  // Manuelles Regen (backward compatibility) - natürlicher mit Lücken
  if (rainActive) {
    for (let i = 0; i < 5; i++) {
      const rx = Math.floor(rng() * W);
      const ry = 0;
      if (grid[ry * W + rx] === EMPTY) {
        grid[ry * W + rx] = WATER;
        tempGrid[ry * W + rx] = 15;
        aclAddNeighbors(rx, ry, 1);
      }
    }
  }
  
  // Fire rain effect - FIX: Lava-Brocken statt explodierender Feuerbälle
  // Lava-Brocken fallen langsam, glühen, und hinterlassen Stein wenn sie abkühlen
  if (fireActive) {
    for (let i = 0; i < 15; i++) {
      const rx = Math.floor(rng() * W);
      const ry = 0;
      if (grid[ry * W + rx] === EMPTY) {
        // LAVA mit hoher Temperatur – fällt wie ein glühender Lavabrocken
        grid[ry * W + rx] = LAVA;
        tempGrid[ry * W + rx] = 1100 + Math.floor(rng() * 200);
        ageGrid[ry * W + rx] = 0;
        aclAddNeighbors(rx, ry, 1);
      }
    }
  }
  
  // === WOLKEN (nur bei Ökosystem): häufiger und variabler ===
  if (ecosystemActive) {
    // Regelmäßig Wolken am windzugewandten Rand erzeugen
    if (tick % 45 === 0 && rng() < 0.6) {
      const fromLeft = windActive ? (windDir > 0) : (rng() < 0.5);
      const sx = fromLeft ? 0 : W - 1;
      const cy = 1 + Math.floor(rng() * Math.max(3, Math.floor(H * 0.15)));
      const cw = 4 + Math.floor(rng() * 12);
      const ch = 1 + Math.floor(rng() * 3);
      for (let k = 0; k < cw; k++) {
        const cx = sx + (fromLeft ? k : -k);
        for (let cdy = 0; cdy < ch; cdy++) {
          const waveOffset = Math.sin(k * 0.5 + cdy * 0.8) > 0.1 ? -1 : 0;
          const yy = cy + cdy + waveOffset;
          if (cx >= 0 && cx < W && yy >= 0 && yy < H && grid[yy * W + cx] === EMPTY) {
            grid[yy * W + cx] = CLOUD;
            tempGrid[yy * W + cx] = 10 + Math.floor(rng() * 6);
            ageGrid[yy * W + cx] = 0;
            aclAddNeighbors(cx, yy, 1);
          }
        }
      }
    }
    // Zusätzliche kleine Wolken in der Mitte
    if (tick % 120 === 0 && rng() < 0.5) {
      const sx = 3 + Math.floor(rng() * (W - 6));
      const cy = 1 + Math.floor(rng() * Math.max(2, Math.floor(H * 0.1)));
      const cw = 3 + Math.floor(rng() * 5);
      for (let k = 0; k < cw; k++) {
        const cx = sx + k;
        if (cx >= 0 && cx < W && grid[cy * W + cx] === EMPTY) {
          grid[cy * W + cx] = CLOUD;
          tempGrid[cy * W + cx] = 12;
          ageGrid[cy * W + cx] = 0;
          aclAddNeighbors(cx, cy, 1);
        }
      }
    }
  }

  // === GLOBALE WIND-ADVEKTION: weht leichte Partikel (Sporen, Pollen, Samen,
  //     Rauch, Dampf, abgelöste Blätter) horizontal – und über die offene Seite hinaus.
  if (windActive) {
    const strength = 0.5;
    for (let yy = 0; yy < H; yy++) {
      // in Windrichtung iterieren, damit Partikel nicht doppelt verschoben werden
      if (windDir > 0) {
        for (let xx = W - 1; xx >= 0; xx--) windAdvectCell(xx, yy, strength);
      } else {
        for (let xx = 0; xx < W; xx++) windAdvectCell(xx, yy, strength);
      }
    }
  }

  // === PASS 1: Bottom-Up (Powder, Liquid, Gas, Fireball, TNT) ===
  // PERF: Counting-Sort der aktiven Zellen nach Y in wiederverwendete Puffer.
  ensureSortBuffers();
  __rowStart.fill(0, 0, H + 1);
  // Zählen pro Reihe
  let __valid = 0;
  for (let i = 0; i < activeCellsCount; i++) {
    const idx = activeCells[i];
    const y = (idx - (idx % W)) / W;
    if (y >= 0 && y < H) { __rowStart[y + 1]++; __valid++; }
  }
  // Präfixsumme -> CSR-Offsets
  for (let y = 0; y < H; y++) { __rowStart[y + 1] += __rowStart[y]; __rowFill[y] = __rowStart[y]; }
  // Einsortieren
  for (let i = 0; i < activeCellsCount; i++) {
    const idx = activeCells[i];
    const y = (idx - (idx % W)) / W;
    if (y >= 0 && y < H) __sortedCells[__rowFill[y]++] = idx;
  }
  
  // Bottom-up: Process from H-1 to 0
  for (let y = H - 1; y >= 0; y--) {
    const s0 = __rowStart[y], s1 = __rowStart[y + 1];
    if (s1 === s0) continue;

    for (let c = s0; c < s1; c++) {
      const idx = __sortedCells[c];
      const x = idx % W;
      const matId = grid[idx];

      if (matId === EMPTY) continue;

      // Thermal physics
      updateThermal(x, y, matId);

      // Chemical reactions
      checkChemicalReactions(x, y, matId);

      // Material-specific physics
      if (matId === CLOUD) {
        updateCloud(x, y, matId);
      } else if (isPowder(matId)) {
        updatePowder(x, y, matId);
      } else if (isLiquid(matId)) {
        updateLiquid(x, y, matId);
      } else if (isGas(matId) || matId === SMOKE || matId === STEAM) {
        updateGas(x, y, matId);
      } else if (matId === FIREBALL) {
        // FIREBALL: explodiert wenn es nicht fallen kann
        ageGrid[idx]++;
        if (y + 1 < H && grid[(y + 1) * W + x] === EMPTY && rng() < 0.5) {
          swap(x, y, x, y + 1);
        } else if (rng() < 0.3) {
          explode(x, y, 12, false);
        }
        if (ageGrid[idx] > 100) {
          explode(x, y, 8, false);
        }
      } else if (matId === TNT) {
        if (tempGrid[idx] > 300 || idx > 0 && grid[idx-1] === FIRE || idx < N-1 && grid[idx+1] === FIRE ||
            idx >= W && grid[idx-W] === FIRE || idx < N-W && grid[idx+W] === FIRE ||
            idx > 0 && grid[idx-1] === FIREBALL || idx < N-1 && grid[idx+1] === FIREBALL ||
            idx >= W && grid[idx-W] === FIREBALL || idx < N-W && grid[idx+W] === FIREBALL) {
          detonateTNT(x, y);
        }
        if (ageGrid[idx] > 10000 && rng() < 0.001) {
          grid[idx] = ASH;
          aclAddNeighbors(x, y, 1);
        }
      }
    }
  }
  
  // === PASS 2: Top-Down (Plants, Organic, Biology) ===
  // PERF: gleiche sortierte Puffer wiederverwenden (von oben nach unten).
  for (let y = 0; y < H; y++) {
    const s0 = __rowStart[y], s1 = __rowStart[y + 1];
    if (s1 === s0) continue;
    
    for (let c = s0; c < s1; c++) {
      const idx = __sortedCells[c];
      const x = idx % W;
      const matId = grid[idx];
      
      if (matId === EMPTY) continue;
      
      // === Biologie-Erweiterung: Dispatch zu spezifischen Update-Funktionen ===
      if (matId === TREE_WOOD) {
        updateTree(x, y, matId);
      } else if (matId === SEAWEED) {
        updateSeaweed(x, y, matId);
      } else if (matId === PLANT_SEED) {
        updatePlantSeed(x, y, matId);
      } else if (matId === PLANT_SPROUT) {
        updatePlantSprout(x, y, matId);
      } else if (matId === PLANT_STEM) {
        updatePlantStem(x, y, matId);
      } else if (matId === PLANT_MATURE) {
        updatePlantMature(x, y, matId);
      } else if (matId === FLOWER_DANDELION || matId === FLOWER_TULIP || matId === FLOWER_POPPY) {
        updateFlower(x, y, matId);
      } else if (matId === LEAF_OAK || matId === LEAF_MAPLE) {
        updateLeaf(x, y, matId);
      } else if (matId === ROOT_SYSTEM) {
        updateRootSystem(x, y, matId);
      } else if (matId === POLLEN) {
        ageGrid[idx]++;
        if (ageGrid[idx] > 30 || rng() < 0.05) {
          grid[idx] = EMPTY;
        } else if (y > 0 && grid[(y - 1) * W + x] === EMPTY && rng() < 0.1) {
          swap(x, y, x, y - 1);
        }
      } else if (matId === PLANT_DEAD) {
        updatePlantDead(x, y, matId);
      } else if (isPlant(matId)) {
        updatePlant(x, y, matId);
      } else if (matId === SPORE) {
        updateSpore(x, y, matId);
      } else if (matId === MOLD) {
        updateMold(x, y, matId);
      } else if (matId === BACTERIA) {
        updateBacteria(x, y, matId);
      } else if (matId === FLOWER_SEED) {
        updateFlowerSeed(x, y, matId);
      } else if (matId === MUSHROOM) {
        updateMushroom(x, y, matId);
      } else if (matId === MYCELIUM) {
        updateMycelium(x, y, matId);
      }
      // BUGFIX: Nur biologische Zellen, die noch AKTIV arbeiten, halten sich wach.
      // Myzel/Pilz/Seegras/Samen immer; Stamm/Holz nur an der Wachstumsspitze;
      // sehr junge Zellen kurz nach Entstehung. Ausgereifte ruhende Teile schlafen.
      const m2 = grid[idx];
      if (m2 !== EMPTY && m2 === matId) {
        const veryYoung = ageGrid[idx] < 30;
        const tip = (y > 0 && grid[(y - 1) * W + x] === EMPTY);
        if (m2 === MYCELIUM || m2 === MUSHROOM || m2 === SEAWEED ||
            m2 === PLANT_SEED || m2 === PLANT_SPROUT || m2 === FLOWER_SEED ||
            ((m2 === TREE_WOOD || m2 === PLANT_STEM || m2 === SEED_SUNFLOWER) && tip) ||
            veryYoung) {
          aclAdd(x, y);
        }
      }
    }
  }
  
  // Ökosystem: WIND TRÄGT LEBEN HEREIN – Samen/Sporen fallen auf Boden und keimen
  //    REGELMÄSSIG AUCH BÄUME (als kleine Setzlinge)
  if (ecosystemActive) {
    // 1) Vom Himmel/Wind hereingetragene Samen & Sporen + Bäume
    //    NEU: Samen werden direkt auf den Boden gesetzt (nicht aus der Luft fallen lassen)
    if (tick % 25 === 0 && rng() < 0.8) {
      const count = 1 + (rng() * 2 | 0);
      for (let k = 0; k < count; k++) {
        // Zufällige X-Position
        const ex = (rng() * W) | 0;
        // Finde die oberste Bodenschicht an dieser Position
        const gy = groundYat(ex);
        if (gy > 1 && grid[(gy - 1) * W + ex] === EMPTY) {
          const gm = grid[gy * W + ex];
          // Nur auf geeignetem Boden (Erde, Sand, feuchte Erde)
          if (gm === DIRT || gm === SAND || gm === SAND_WET || gm === SAND_DARK) {
            const r = rng();
            if (r < 0.03) {
              // 3% Chance: Kleiner Baum-Setzling (statt Samen)
              stampTree(ex, gy);
            } else {
              const seed = r < 0.4 ? FLOWER_SEED : (r < 0.7 ? PLANT_SEED : (r < 0.9 ? SEED_SUNFLOWER : SPORE));
              grid[(gy - 1) * W + ex] = seed;
              plantTypeGrid[(gy - 1) * W + ex] = 1 + (rng() * 2 | 0);
              ageGrid[(gy - 1) * W + ex] = 0;
              plantStageGrid[(gy - 1) * W + ex] = 0;
              aclAddNeighbors(ex, gy - 1, 1);
            }
          }
        }
      }
    }
    // 2) Spontane Keimung auf bestehendem Boden (Samenbank im Boden)
    if (tick % 70 === 0 && rng() < 0.5) {
      const sx = 2 + (rng() * (W - 4) | 0);
      const gy = groundYat(sx);
      if (gy > 1 && grid[(gy - 1) * W + sx] === EMPTY) {
        const gm = grid[gy * W + sx];
        if (gm === DIRT || gm === SAND || gm === SAND_WET || gm === SAND_DARK) {
          const r = rng();
          const seed = r < 0.5 ? PLANT_SEED : FLOWER_SEED;
          grid[(gy - 1) * W + sx] = seed;
          plantTypeGrid[(gy - 1) * W + sx] = 1 + (rng() * 2 | 0);
          ageGrid[(gy - 1) * W + sx] = 0;
          plantStageGrid[(gy - 1) * W + sx] = 0;
          aclAddNeighbors(sx, gy - 1, 1);
        }
      }
    }
  }

  // === Sonnenzyklus-Simulation ===
  if (sunCycleEnabled) {
    sunCycleTime += sunCycleSpeed;
    const cycleLength = 600; // Vollständiger Tag/Nacht-Zyklus (langsamer)
    const phase = (sunCycleTime % cycleLength) / cycleLength;
    isDaytime = phase < 0.5;
    
    // Sonnenintensität berechnen (sinusförmig für sanften Übergang)
    if (isDaytime) {
      // Tag: 0% am Horizont -> 100% mittags -> 0% am Horizont
      const dayPhase = phase * 2; // 0-1 für den Tag
      sunIntensity = Math.sin(dayPhase * Math.PI);
    } else {
      // Nacht: schwaches Mondlicht
      const nightPhase = (phase - 0.5) * 2; // 0-1 für die Nacht
      sunIntensity = Math.sin(nightPhase * Math.PI) * 0.15; // 15% Mondlicht
    }
    sunIntensity = Math.max(0, Math.min(1, sunIntensity));
    
    // UI aktualisieren
    const sunIndicator = document.getElementById("sunCycleIndicator");
    const sunText = document.getElementById("sunCycleText");
    const sunProgress = document.getElementById("sunCycleProgress");
    
    sunText.textContent = isDaytime ? "Tag" : "Nacht";
    sunProgress.textContent = `(${Math.round(sunIntensity * 100)}%)`;
    sunIndicator.className = "sun-cycle-indicator " + (isDaytime ? "day" : "night");
    
    // === Saison-Anzeiger aktualisieren ===
    const seasonNames = ['🌸 Frühling', '☀️ Sommer', '🍂 Herbst', '❄️ Winter'];
    const seasonIndicator = document.getElementById('seasonIndicator');
    if (seasonIndicator) {
      seasonIndicator.textContent = seasonNames[getCurrentSeason()];
    }
  }
  
  // Swap Active Cell List buffers für nächsten Tick
  aclSwapBuffers();
}

/**
 * RENDERING
 */
function render() {
  // Global brightness based on sun cycle
  const nightFactor = sunCycleEnabled ? (1.0 - getSunlightIntensity()) * 0.25 : 0;

  for (let i = 0; i < N; i++) {
    const matId = grid[i];
    const ci = i * 4;

    if (matId === EMPTY) {
      // Slightly adjust background for day/night
      let r = 12, g = 12, b = 15;
      if (sunCycleEnabled && nightFactor > 0) {
        r = Math.max(0, r - nightFactor * 10);
        g = Math.max(0, g - nightFactor * 10);
        b = Math.max(0, b + nightFactor * 5);
      }
      pix[ci] = r; pix[ci+1] = g; pix[ci+2] = b; pix[ci+3] = 255;
      continue;
    }
    
    const mat = MATS[matId];
    let r = mat.color[0];
    let g = mat.color[1];
    let b = mat.color[2];
    
    // Temperature effects
    const t = tempGrid[i];
    const seed = colorSeedGrid[i];
    const baseNoise = (seed % 25) - 12;
    
    if (t > 30) {
      const heatFactor = Math.min(1, Math.max(0, (t - 30) / 600));
      
      // Incandescence: red -> orange -> yellow -> white
      r += heatFactor * 150;
      g += heatFactor * (heatFactor > 0.5 ? 100 : 40);
      b += heatFactor * (heatFactor > 0.8 ? 80 : 0);
      
      // Glow effect for very hot objects
      if (t > 400) {
        const glow = (heatFactor - 0.5) * 60;
        r += glow; g += glow * 0.7; b += glow * 0.3;
      }
    }
    
    // Cold effects
    if (t < 0) {
      const coldFactor = Math.min(1, Math.abs(t) / 50);
      b = Math.min(255, b + coldFactor * 40);
      r = Math.max(0, r - coldFactor * 20);
    }
    
    // Base texture noise
    r += baseNoise;
    g += baseNoise;
    b += baseNoise;
    
    // pH visualization
    const ph = phGrid[i];
    if (ph !== undefined && ph !== null && mat.ph !== 7.0) {
      if (ph < 4) {
        r = Math.min(255, r + (4 - ph) * 15);
      } else if (ph > 10) {
        b = Math.min(255, b + (ph - 10) * 15);
      }
    }
    
    // Sonnenzyklus-Effekte auf Pflanzen (Photosynthese vs. Respiration)
    if (sunCycleEnabled && !isDaytime && (matId === PLANT || matId === PLANT_LEAF)) {
      // Nachts: Pflanzen atmen CO2 aus statt O2 zu produzieren
      // Leicht dunkleres Grün für nächtliche Pflanzen
      g *= 0.7;
      r *= 0.8;
    }
    
    // Radiation visualization
    if (radiationGrid[i] > 0) {
      const rad = Math.min(1, radiationGrid[i] / 50);
      r = r * (1 - rad) + 50 * rad;
      g = g * (1 - rad) + 255 * rad;
      b = b * (1 - rad) + 50 * rad;
    }
    
    // Special rendering
    if (matId === FIRE) {
      const flicker = Math.sin(tick * 0.3 + seed) * 40;
      r = 255;
      g = 120 + flicker;
      b = 20 + flicker * 0.3;
    }
    
    if (matId === LAVA) {
      const bubble = Math.sin(tick * 0.05 + seed * 0.1) * 30;
      r = 255;
      g = 60 + bubble;
      b = 10 + bubble * 0.2;
    }
    
    if (matId === PLANT) {
      // Health-based green intensity
      const health = Math.max(0, Math.min(1, 1 - Math.abs(t - 25) / 50));
      g = 184 + health * 40;
      // Variation based on age
      const ageVar = Math.sin(ageGrid[i] * 0.1) * 15;
      g += ageVar;
    }
    
    // === Biologie-Erweiterung: Neue Pflanzen-Darstellung ===
    if (matId === PLANT_SEED) {
      // Samen: Braun mit kleiner Variation
      r = 139 + baseNoise;
      g = 90 + baseNoise;
      b = 43 + baseNoise;
    }
    
    if (matId === PLANT_SPROUT) {
      // Keimling: Helles Grün
      const health = plantHealthGrid[i] / 100 || 0.5;
      r = 120 * health + 50;
      g = 200 * health + 55;
      b = 80 * health + 30;
    }
    
    if (matId === PLANT_STEM) {
      // Stamm: Mittelgrün mit Gesundheits-Abhängigkeit
      const health = plantHealthGrid[i] / 100 || 0.5;
      r = 34 * health + 20;
      g = 139 * health + 45;
      b = 34 * health + 10;
      // Herbst-Färbung
      const autumn = getAutumnColorFactor();
      if (autumn > 0) {
        r = r * (1 - autumn * 0.5) + 180 * autumn * 0.5;
        g = g * (1 - autumn * 0.7) + 100 * autumn * 0.7;
      }
    }
    
    if (matId === PLANT_MATURE) {
      // Erwachsene Pflanze: Dunkles Grün
      const health = plantHealthGrid[i] / 100 || 0.5;
      r = 0 * health + 20;
      g = 100 * health + 84;
      b = 0 * health + 20;
      // Herbst-Färbung
      const autumn = getAutumnColorFactor();
      if (autumn > 0) {
        r = r * (1 - autumn * 0.6) + 160 * autumn * 0.6;
        g = g * (1 - autumn * 0.5) + 80 * autumn * 0.5;
      }
    }
    
    if (matId === FLOWER_DANDELION) {
      // Gänseblümchen: Gelb
      r = 255;
      g = 255;
      b = 100 + baseNoise;
    }
    
    if (matId === FLOWER_TULIP) {
      // Tulpe: Rot
      r = 255;
      g = 50 + baseNoise;
      b = 50 + baseNoise;
    }
    
    if (matId === FLOWER_POPPY) {
      // Mohn: Orange-Rot
      r = 220 + baseNoise;
      g = 50 + baseNoise;
      b = 30 + baseNoise;
    }
    
    if (matId === LEAF_OAK || matId === LEAF_MAPLE) {
      // Blätter: Grün mit Gesundheits- und Herbst-Effekt
      const health = plantHealthGrid[i] / 100 || 0.5;
      const isMaple = matId === LEAF_MAPLE;
      
      if (isMaple) {
        r = 40 * health + 30;
        g = 140 * health + 50;
        b = 40 * health + 20;
      } else {
        r = 34 * health + 25;
        g = 120 * health + 40;
        b = 34 * health + 20;
      }
      
      // Herbst-Färbung
      const autumn = getAutumnColorFactor();
      if (autumn > 0) {
        const autumnR = isMaple ? 220 : 180;
        const autumnG = isMaple ? 60 : 100;
        const autumnB = 20;
        r = r * (1 - autumn) + autumnR * autumn;
        g = g * (1 - autumn) + autumnG * autumn;
        b = b * (1 - autumn) + autumnB * autumn;
      }
    }
    
    if (matId === ROOT_SYSTEM) {
      // Wurzeln: Hellbraun
      r = 160 + baseNoise;
      g = 120 + baseNoise;
      b = 60 + baseNoise;
    }
    
    if (matId === PLANT_DEAD) {
      // Tote Pflanze: Braun/Gelb
      r = 139 + baseNoise;
      g = 115 + baseNoise;
      b = 55 + baseNoise;
    }
    
    if (matId === POLLEN) {
      // Pollen: Hellgelb, transparent
      r = 255;
      g = 255;
      b = 150 + baseNoise;
    }
    
    if (matId === SEED_SUNFLOWER) {
      // Sonnenblumensamen: Dunkel
      r = 60 + baseNoise;
      g = 40 + baseNoise;
      b = 20 + baseNoise;
    }
    
    if (matId === SEED_WHEAT) {
      // Weizen: Goldgelb
      r = 218 + baseNoise;
      g = 165 + baseNoise;
      b = 32 + baseNoise;
    }

    if (matId === FLOWER_SEED) {
      // Blumen-Samen: warmes Braun
      r = 180 + baseNoise;
      g = 120 + baseNoise;
      b = 60 + baseNoise;
    }

    if (matId === MUSHROOM) {
      // Pilz: cremefarben mit Variation
      const age = ageGrid[i];
      if (age < 30) {
        r = 230 + baseNoise;
        g = 220 + baseNoise;
        b = 200 + baseNoise;
      } else {
        r = 200 + baseNoise;
        g = 180 + baseNoise;
        b = 150 + baseNoise;
      }
    }
    
    if (matId === TREE_WOOD) {
      // Holz mit Jahresringen: konzentrische Helligkeitsvariation über colorSeed.
      const ring = (colorSeedGrid[i] % 90) / 90; // 0..1 Ringposition
      const ringMod = Math.sin(ring * Math.PI * 2) * 18; // helle/dunkle Ringe
      const ageDark = Math.min(20, ageGrid[i] / 60); // älteres Holz dunkler
      r = 120 - ageDark + ringMod + baseNoise * 0.5;
      g = 80 - ageDark * 0.7 + ringMod * 0.7 + baseNoise * 0.5;
